                              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:700}},fmt(r.toplam)),
                              div({style:{display:"flex",gap:4,justifyContent:"flex-end",marginTop:3}},
                                kk>0&&h("span",{style:{fontSize:11,color:"var(--mu)"}},"💳"+fmt(kk)),
                                ib>0&&h("span",{style:{fontSize:11,color:"var(--mu)"}},"🏦"+fmt(ib)),
                                nk>0&&h("span",{style:{fontSize:11,color:"var(--mu)"}},"💵"+fmt(nk))
                              )
                            )
                          )
                        );
                      })
                    );
                  }),

                  // Genel toplam
                  div({style:{background:"var(--bg2)",border:"1.5px solid var(--br)",borderRadius:12,padding:13,marginTop:8}},
                    div({style:{fontSize:12,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},"Genel Toplam"),
                    div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}},
                      [["💳","K.Kartı",genKK],["🏦","IBAN",genIB],["💵","Nakit",genNK]].map(([ic,lb,v])=>
                        div({key:lb,style:{background:"var(--bg)",borderRadius:8,padding:"8px 5px",textAlign:"center"}},
                          div({style:{fontSize:14,marginBottom:2}},ic),
                          div({style:{fontSize:10,color:"var(--di)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}},lb),
                          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:v>0?"var(--g)":"var(--br)",fontWeight:700}},fmt(v))
                        )
                      )
                    ),
                    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:"1px solid #1e4244"}},
                      span({style:{fontSize:12,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase"}},"TOPLAM"),
                      span({style:{fontFamily:"Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:22,color:"var(--g)",fontWeight:700}},fmt(genTop))
                    )
                  )
                );
              })(),

              [
                {b:"Iletisim",i:"📞",a:[
                  ["Telefon",pDetay.telefon],["Ev Adresi",pDetay.adres],
                  ["Acil Kisi",pDetay.acilKisi],["Acil Tel",pDetay.acilTel]
                ]},
                {b:"Kimlik",i:"🪪",a:[
                  ["TC Kimlik",pDetay.tcNo],["Dogum Tarihi",pDetay.dogumTarihi],["Kan Grubu",pDetay.kanGrubu]
                ]},
                {b:"Is Bilgileri",i:"💼",a:[
                  ["Pozisyon",pDetay.pozisyon],["Ise Baslama",pDetay.isBaslama],
                  ["Calisma Sekli",pDetay.calismaSekli],["Maas / Oran",pDetay.maas],
                  ["Calisma Saatleri",pDetay.saatler]
                ]},
                {b:"Sistem",i:"⚙️",a:[
                  ["Uygulama PIN",pDetay.pin],
                  ["Rol",pDetay.rol==="yonetici"?"Yonetici":"Personel"]
                ]}
              ].map(bolum=>div({key:bolum.b,style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:14,marginBottom:10}},
                div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10,marginTop:4}},bolum.i+" "+bolum.b),
                bolum.a.map(([lb,val])=>
                  div({key:lb,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}},
                    span({style:{fontSize:13,color:"var(--di)"}},lb),
                    span({style:{fontSize:15,color:val?"var(--tx)":"var(--br)"}},val||"—")
                  )
                )
              )),

              // Maaş/Komisyon Hesabı
              h(PersonelMaasGorunum,{
                personel:pDetay,
                tumK,
                formul:pDetay.maasFormulu||[],
                onChange:(yeniFormul)=>{
                  setPersoneller(prev=>prev.map(x=>x.id===pDetay.id?{...x,maasFormulu:yeniFormul}:x));
                  setPDetay(prev=>({...prev,maasFormulu:yeniFormul}));
                  showToast("Formül güncellendi");
                },
                showToast,
                tumPersoneller:personeller,
                giderler,
                avanslar,
                setAvanslar
              }),

              div({className:"btn-r",style:{marginTop:14}},
                btn({className:"btn-k",onClick:()=>{setPHata("");setPDuz({...pDetay});setPDetay(null);}},"Düzenle")
              )
            )
          ),

          btn({className:"epb",onClick:()=>{setYeniP({ad:"",pin:"",rol:"personel"});setPHata("");setPEkle(true);}},"+ Yeni Personel Ekle"),

          personeller.filter(p=>!p.aktif&&p.rol!=="yonetici").length>0&&div(null,
            div({className:"sek",style:{color:"#c08040",marginBottom:9}},"Onay Bekleyenler"),
            personeller.filter(p=>!p.aktif&&p.rol!=="yonetici").map(p=>
              div({key:p.id,className:"pk",style:{cursor:"pointer"},onClick:()=>setPDetay(p)},
                div({className:"pav pa"},p.ad[0]),
                div({className:"pi"},div({className:"pad"},p.ad),div({className:"ppin"},"PIN: "+p.pin)),
                div({className:"pak"},
                  btn({className:"pbt ok2",onClick:ev=>{ev.stopPropagation();setPersoneller(prev=>prev.map(x=>x.id===p.id?{...x,aktif:true}:x));}},"Aktifleştir"),
                  btn({className:"pbt",onClick:ev=>{ev.stopPropagation();setPHata("");setPDuz({...p});}},"Düzenle"),
                  btn({className:"pbt th",onClick:ev=>{ev.stopPropagation();setPersoneller(prev=>prev.filter(x=>x.id!==p.id));}},"Sil")
                )
              )
            ),
            div({style:{height:1,background:"var(--bg3)",margin:"12px 0"}})
          ),

          div({className:"sek",style:{marginBottom:9}},"Aktif Personel"),


          // Gruplarına göre personel listesi
          pGruplar.map(g=>{
            const gruptakiler = personeller.filter(p=>p.aktif&&p.grup===g.id);
            return div({key:g.id,style:{marginBottom:16}},
              gruptakiler.length>0&&div(null,
                div({style:{fontSize:12,color:"#9a7a3a",letterSpacing:2,textTransform:"uppercase",
                  marginBottom:8,paddingBottom:6,borderBottom:"1px solid var(--br)"}},g.ad),
                gruptakiler.map(p=>{

                  return div({key:p.id,className:"pk",style:{cursor:"pointer"},onClick:()=>setPDetay(p)},
                    div({className:"pav ak"},p.ad[0]),
                    div({className:"pi"},
                      div({className:"pad"},p.ad),
                      p.pozisyon&&div({style:{fontSize:12,color:"var(--g)",marginTop:1}},p.pozisyon),
                      div({className:"ppin"},"PIN: "+p.pin),

                      p.telefon&&div({style:{fontSize:12,color:"var(--di)",marginTop:2}},"📞 "+p.telefon),
                      p.isBaslama&&div({style:{fontSize:12,color:"var(--di)"}},"📅 "+p.isBaslama)
                    ),
                    div({className:"pak"},
                      btn({className:"pbt",onClick:ev=>{ev.stopPropagation();setPHata("");setPDuz({...p});}},"Düzenle"),
                      btn({className:"pbt th",onClick:ev=>{ev.stopPropagation();setPersoneller(prev=>prev.map(x=>x.id===p.id?{...x,aktif:false}:x));}},"Pasife Al")
                    )
                  );
                })
              )
            );
          }),

          // Grubu olmayan aktif personel
          personeller.filter(p=>p.aktif&&(!p.grup||!pGruplar.find(g=>g.id===p.grup))).length>0&&div({style:{marginBottom:16}},
            div({style:{fontSize:12,color:"var(--di)",letterSpacing:2,textTransform:"uppercase",
              marginBottom:8,paddingBottom:6,borderBottom:"1px solid var(--br)"}},"Grup Atanmamis"),
            personeller.filter(p=>p.aktif&&(!p.grup||!pGruplar.find(g=>g.id===p.grup))).map(p=>{
              const pk=tumK.filter(r=>r.staffId===p.id);
              const bugunC=pk.filter(r=>r.tarih===TODAY()).reduce((a,r)=>a+r.toplam,0);
              const topC=pk.reduce((a,r)=>a+r.toplam,0);
              return div({key:p.id,className:"pk",style:{cursor:"pointer"},onClick:()=>setPDetay(p)},
                div({className:"pav ak"},p.ad[0]),
                div({className:"pi"},
                  div({className:"pad"},p.ad),
                  p.pozisyon&&div({style:{fontSize:12,color:"var(--g)",marginTop:1}},p.pozisyon),
                  div({className:"ppin"},"PIN: "+p.pin),
                  div({style:{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}},
                    div({style:{fontSize:12,color:"var(--di)"}},"Bugün: ",h("span",{style:{color:"var(--g)",fontFamily:"Cormorant Garamond,serif",fontSize:15}},fmt(bugunC))),
                    div({style:{fontSize:12,color:"var(--di)"}},"Toplam: ",h("span",{style:{color:"var(--g)",fontFamily:"Cormorant Garamond,serif",fontSize:15}},fmt(topC)))
                  ),
                  p.telefon&&div({style:{fontSize:12,color:"var(--di)",marginTop:2}},"📞 "+p.telefon),
                  p.isBaslama&&div({style:{fontSize:12,color:"var(--di)"}},"📅 "+p.isBaslama)
                ),
                div({className:"pak"},
                  btn({className:"pbt",onClick:ev=>{ev.stopPropagation();setPHata("");setPDuz({...p});}},"Düzenle"),
                  btn({className:"pbt th",onClick:ev=>{ev.stopPropagation();setPersoneller(prev=>prev.map(x=>x.id===p.id?{...x,aktif:false}:x));}},"Pasife Al")
                )
              );
            })
          )
        ),
            aySek==="gruplar"&&div(null,
              div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},"👥 Personel Grupları"),
              div({style:{fontSize:13,color:"var(--di)",marginBottom:14}},"Personeli gruplara ayırın."),
              pGruplar.map(g=>
                div({key:g.id,style:{display:"flex",gap:8,alignItems:"center",marginBottom:10}},
                  inp({className:"fi",style:{flex:1},value:g.ad,
                    onChange:e=>setPGruplar(p=>p.map(x=>x.id===g.id?{...x,ad:e.target.value}:x))}),
                  pGruplar.length>1&&btn({style:{background:"rgba(160,40,40,.1)",border:"1px solid #1e3a3a",
                    borderRadius:7,color:"#c05050",fontSize:13,padding:"6px 12px",cursor:"pointer"},
                    onClick:()=>setPGruplar(p=>p.filter(x=>x.id!==g.id))},"Sil")
                )
              ),
              btn({style:{width:"100%",padding:"10px",borderRadius:9,border:"1px dashed #1e4244",
                background:"transparent",color:"var(--di)",fontSize:13,cursor:"pointer",marginTop:4},
                onClick:()=>setPGruplar(p=>[...p,{id:"g"+Date.now(),ad:"Yeni Grup"}])},"+ Yeni Grup Ekle")
            )
          ),


          // ── DİZAYN ──
          aySek==="renklendirme"&&div({style:{padding:"4px 0"}},
            div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:24,marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,.04)",textAlign:"center"}},
              div({style:{width:64,height:64,borderRadius:"50%",background:"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 16px"}},"🎨"),
              div({style:{fontSize:18,fontWeight:700,color:"var(--tx)",marginBottom:8}},"Dizayn Paneli"),
              div({style:{fontSize:14,color:"var(--mu)",lineHeight:1.5,maxWidth:320,margin:"0 auto"}},
                "Yakında bu alanda uygulamanın tüm görsel özelliklerini (renkler, yazı tipi, boyutlar, kart stilleri) tek bir yerden yönetebileceksin."
              )
            )
          ),

          // ── İŞLETME ──
          aySek==="isletme"&&div({style:{padding:"4px 0"}},

            div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14,marginBottom:14}},
              div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},"🏢 Logo"),
              div({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:10,marginBottom:14}},
                div({style:{width:160,height:90,borderRadius:12,background:"var(--bg)",
                  border:"1px solid var(--br)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}},
                  isletme.logo
                    ? img({src:isletme.logo,style:{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}})
                    : div({style:{textAlign:"center",color:"var(--di)",fontSize:13}},"Logo yok")
                ),
                div({style:{display:"flex",gap:8}},
                  btn({style:{padding:"8px 14px",borderRadius:8,border:"1px solid rgba(37,99,168,.3)",
                    background:"rgba(37,99,168,.08)",color:"var(--g)",fontSize:13,cursor:"pointer"},
                    onClick:()=>{
                      const fi=document.createElement("input");
                      fi.type="file"; fi.accept="image/*,.svg,.ico,.webp,.bmp,.avif";
                      fi.onchange=ev=>{
                        const f=ev.target.files[0]; if(!f) return;
                        if(f.size>5242880){showToast("Max 5MB","uy");return;}
                        const rd=new FileReader();
                        rd.onload=e2=>setIsletme(p=>({...p,logo:e2.target.result}));
                        rd.readAsDataURL(f);
                      };
                      fi.click();
                    }},"📁 Logo Yükle"),
                  isletme.logo&&btn({style:{padding:"8px 14px",borderRadius:8,border:"1px solid #1e3a3a",
                    background:"rgba(160,40,40,.08)",color:"#c05050",fontSize:13,cursor:"pointer"},
                    onClick:()=>setIsletme(p=>({...p,logo:null}))},"Kaldır")
                )
              ),
              [
                ["ad","İşletme Adı","APRON"],
                ["altBaslik","Alt Başlık","YÖNETİM SİSTEMİ"],
                ["tel","Telefon","0xxx xxx xx xx"],
                ["adres","Adres",""],
              ].map(([k,lb,ph])=>
                div({key:k,style:{marginBottom:10}},
                  lbl({className:"fl"},lb),
                  inp({className:"fi",placeholder:ph,value:isletme[k]||"",
                    onChange:e=>setIsletme(p=>({...p,[k]:e.target.value}))})
                )
              ),
              btn({style:{width:"100%",marginTop:14,padding:"14px 0",borderRadius:11,border:"none",
                background:"linear-gradient(135deg,#1a5a30,#0e3a1a)",color:"#50b880",
                fontSize:14,fontWeight:700,cursor:"pointer"},
                onClick:()=>{
                  const v=localStorage.getItem("apron_v3")||"{}";
                  const bl=new Blob([v],{type:"application/json"});
                  const u=URL.createObjectURL(bl);
                  const a=document.createElement("a");
                  a.href=u;a.download="apron_yedek.json";
                  document.body.appendChild(a);a.click();
                  document.body.removeChild(a);URL.revokeObjectURL(u);
                }},"📥 Veriyi İndir")
          )
        )
      )
    )
  );
}

// Düzelt: TODAY kullanımı
const TOP = TODAY();

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,h(App,null)));


</script>

</body>
</html>

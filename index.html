class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = {hasError:false, error:null};
  }
  static getDerivedStateFromError(error) {
    return {hasError:true, error};
  }
  componentDidCatch(error, info) {
    console.error('React hata:', error, info);
  }
  render() {
    if(this.state.hasError) {
      return React.createElement('div', {style:{padding:20,color:'#c05050',background:'#0e1a1a',margin:10,borderRadius:8,fontSize:14}},

        React.createElement('button',{onClick:()=>this.setState({hasError:false,error:null}),style:{marginTop:8,padding:'4px 12px',cursor:'pointer'}},'Yenile')

    }
    return this.props.children;
  }
}

const dbAl = async (t,opts={}) => {
  if(!DB) return [];
  try {
    let q = DB.from(t).select("*");
    if(opts.order) q = q.order(opts.order,{ascending:!!opts.asc});
    const {data,error} = await q;
    if(error) throw error;
    return data||[];
  } catch(e){ console.warn("dbAl",e); return []; }
};

// ── Yardımcı render fonksiyonu ─────────────────────────────────────────
function el(tag, props, ...kids) {
  return h(tag, props, ...kids.flat());
}
function div(props, ...kids) { return el('div', props, ...kids); }
function span(props, ...kids) { return el('span', props, ...kids); }
function btn(props, ...kids) { return el('button', props, ...kids); }
function inp(props) { return el('input', props); }
function img(props) { return el('img', props); }
function sel(props, ...kids) { return el('select', props, ...kids); }
function opt(v, txt) { return el('option', {key:v, value:v}, txt||v); }
function lbl(props, ...kids) { return el('label', props, ...kids); }

// ── Toast ─────────────────────────────────────────────────────────────
function Toast({toast}) {
  if(!toast.g) return null;
  return div({className:`toast ${toast.t}`}, toast.m);
}

// ── ÜRÜN ARAMA BİLEŞENİ (top-level — klavye kapanmasını önler) ──
function UrunAramaBilesen({aramaVal,setAramaVal,onEkle,placeholder}) {
  const q = (aramaVal||"").trim();
  const sonuclar = q.length>=2 ? URUN_DB.filter(u=>{
    const nq=normText(q);
    return u.b.includes(q) || normText(u.a).includes(nq) || normText(u.m).includes(nq);
  }).slice(0,8) : [];

  React.useEffect(()=>{
    if(q.length>=8){
      const tam=URUN_DB.find(u=>u.b===q);
      if(tam){onEkle(tam);setAramaVal("");}
    }
  },[q]);

  const [barkodAc, setBarkodAc] = React.useState(false);

  return div(null,
    barkodAc&&h(BarkodTarayici,{key:"barkod-"+Date.now().toString(36),
      onOku: kod=>{
        setBarkodAc(false);
        const urun=URUN_DB.find(u=>u.b===kod);
        if(urun){onEkle(urun);}else{setAramaVal(kod);}
      },
      onKapat:()=>setBarkodAc(false)
    }),
    div({style:{display:"flex",gap:7,marginBottom:4}},
      inp({className:"fi",style:{flex:1,margin:0},placeholder:placeholder||"Barkod veya ürün adı ile ara...",
        value:aramaVal,onChange:e=>setAramaVal(e.target.value)}),
      btn({style:{background:"var(--bg3)",border:"1px solid var(--br)",borderRadius:9,color:"var(--g)",
        fontSize:20,padding:"0 14px",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center"},
        onClick:()=>setBarkodAc(true)},"📷")
    ),
    sonuclar.length>0&&div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:9,
      overflow:"hidden",maxHeight:220,overflowY:"auto",marginBottom:8}},
      sonuclar.map(u=>div({key:u.b,style:{padding:"9px 11px",borderBottom:"1px solid var(--br)",
        cursor:"pointer",display:"flex",alignItems:"center",gap:7},
        onClick:()=>{onEkle(u);setAramaVal("");}},
        div({style:{flex:1,minWidth:0}},
          div({style:{fontSize:14,color:"var(--tx)"}},u.a),
          div({style:{fontSize:11,color:"var(--di)"}},u.b+" · "+u.m+" · "+(u.ml||""))
        ),
        div({style:{fontSize:13,color:"var(--g)"}},fmt(u.sp))
      ))
    )
  );
}

  // ═══════════════ ÖZET DASHBOARD (YENİ - PROFESYONEL) ═══════════════
function OzetDashboard({stokPartiler,mkArsiv,tumK,personeller}){
  const [periyot,setPeriyot]=React.useState("buAy");
  const periyotBaslangic=React.useMemo(()=>{
    const d=new Date();
    if(periyot==="buHafta"){const g=d.getDay()||7;d.setDate(d.getDate()-g+1);}
    else if(periyot==="buAy"){d.setDate(1);}
    else if(periyot==="son3Ay"){d.setMonth(d.getMonth()-3);}
    else if(periyot==="buYil"){d.setMonth(0);d.setDate(1);}
    d.setHours(0,0,0,0);return d;
  },[periyot]);
  const periyotEtiket={buHafta:"Bu Hafta",buAy:"Bu Ay",son3Ay:"Son 3 Ay",buYil:"Bu Yıl"}[periyot];
  const periyotK=(tumK||[]).filter(r=>{
    if(!r.tarih||r.gonderildi===false)return false;
    return new Date(r.tarih)>=periyotBaslangic;
  });
  const stokOzet=React.useMemo(()=>{
    const oz={};
    (stokPartiler||[]).forEach(p=>{
      if(!oz[p.barkod])oz[p.barkod]={barkod:p.barkod,urunAd:p.urunAd||"",marka:p.marka||"",kalan:0,toplamMaliyet:0};
      oz[p.barkod].kalan+=(p.kalan||0);
      oz[p.barkod].toplamMaliyet+=(p.kalan||0)*(p.alisF||0);
    });
    Object.values(oz).forEach(u=>{
      const dbU=URUN_DB.find(d=>d.b===u.barkod);
      u.satisF=dbU?.sp||0;
    });
    return oz;
  },[stokPartiler]);
  const toplamUrun=periyotK.reduce((s,r)=>s+(r.uKK||0)+(r.uIB||0)+(r.uNK||0),0);
  const stokDeger=Object.values(stokOzet).reduce((s,u)=>s+u.toplamMaliyet,0);
  const stokSatisDeger=Object.values(stokOzet).reduce((s,u)=>s+u.kalan*(u.satisF||0),0);
  const potansiyelKar=stokSatisDeger-stokDeger;
  const tahminiKar=toplamUrun*0.5;
  const urunluK=periyotK.filter(r=>(r.urunler||[]).length>0);
  const ortSepet=urunluK.length>0?toplamUrun/urunluK.length:0;
  const toplamAdet=periyotK.reduce((s,r)=>s+(r.urunler||[]).reduce((ss,u)=>ss+toN(u.qty||1),0),0);
  const tukenmis=Object.values(stokOzet).filter(u=>u.kalan===0).length;
  const azStokSay=Object.values(stokOzet).filter(u=>u.kalan>0&&u.kalan<=2).length;
  const urunGrup={};
  periyotK.forEach(r=>{
    (r.urunler||[]).forEach(u=>{
      if(!u.b)return;
      if(!urunGrup[u.b])urunGrup[u.b]={barkod:u.b,ad:u.a||"",marka:u.m||"",adet:0,gelir:0};
      const adet=toN(u.qty||1),fiyat=toN(u.sf||u.sp||0);
      urunGrup[u.b].adet+=adet;
      urunGrup[u.b].gelir+=adet*fiyat;
    });
  });
  const enCokSatan=Object.values(urunGrup).sort((a,b)=>b.gelir-a.gelir).slice(0,10);
  const enYuksekSatis=enCokSatan[0]?.gelir||1;
  const markaSatis={};
  Object.values(urunGrup).forEach(u=>{
    const m=u.marka||"Diğer";
    if(!markaSatis[m])markaSatis[m]={marka:m,adet:0,gelir:0};
    markaSatis[m].adet+=u.adet;markaSatis[m].gelir+=u.gelir;
  });
  const markaListe=Object.values(markaSatis).sort((a,b)=>b.gelir-a.gelir).slice(0,8);
  const enYukMarka=markaListe[0]?.gelir||1;
  const persPerf={};
  (personeller||[]).filter(p=>p.rol==="personel"&&p.aktif).forEach(p=>{
    const pk=periyotK.filter(r=>r.staffId===p.id);
    const ug=pk.reduce((s,r)=>s+(r.uKK||0)+(r.uIB||0)+(r.uNK||0),0);
    const hg=pk.reduce((s,r)=>s+(r.hizKK||0)+(r.hizIB||0)+(r.hizNK||0),0);
    const ua=pk.reduce((s,r)=>s+(r.urunler||[]).reduce((ss,u)=>ss+toN(u.qty||1),0),0);
    persPerf[p.id]={ad:p.ad,urunGelir:ug,hizGelir:hg,toplam:ug+hg,urunAdet:ua,kayitSay:pk.length};
  });
  const persListe=Object.values(persPerf).sort((a,b)=>b.urunGelir-a.urunGelir);
  const gunluk={};
  periyotK.forEach(r=>{
    if(!r.tarih)return;
    if(!gunluk[r.tarih])gunluk[r.tarih]=0;
    gunluk[r.tarih]+=(r.uKK||0)+(r.uIB||0)+(r.uNK||0);
  });
  const trendV=Object.entries(gunluk).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,v])=>({tarih:t,deger:v}));
  const maxTrend=Math.max(...trendV.map(x=>x.deger),1);
  const azStokta=Object.values(stokOzet).filter(u=>u.kalan>0&&u.kalan<=2).sort((a,b)=>a.kalan-b.kalan).slice(0,8);
  const tumF=mkArsiv||[];
  const tBorc=tumF.reduce((s,ar)=>s+(ar.urunler||[]).reduce((ss,u)=>ss+(u.toplamF||0),0),0);
  const tOd=tumF.reduce((s,ar)=>s+(ar.odemeler||[]).reduce((ss,o)=>ss+toN(o.tutar),0),0);
  const kBorc=tBorc-tOd;

        [["buHafta","Bu Hafta"],["buAy","Bu Ay"],["son3Ay","Son 3 Ay"],["buYil","Bu Yıl"]].map(([id,lb])=>

        )
      )
    ),
    h("div",{style:{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",border:"1.5px solid var(--br)",borderRadius:14,padding:18,marginBottom:14}},
      h("div",{style:{fontSize:11,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}},"💼 Finansal Özet"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}},
        h("div",{style:{borderLeft:"3px solid var(--g)",paddingLeft:14}},
          h("div",{style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"📦 Ürün Satış Geliri"),
          h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:24,color:"var(--g)",fontWeight:700,marginBottom:3}},fmt(toplamUrun)),
          h("div",{style:{fontSize:11,color:"var(--di)"}},toplamAdet+" adet ürün satıldı")
        ),
        h("div",{style:{borderLeft:"3px solid var(--gr)",paddingLeft:14}},
          h("div",{style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"💰 Tahmini Brüt Kâr"),
          h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:24,color:"var(--gr)",fontWeight:700,marginBottom:3}},fmt(tahminiKar)),
          h("div",{style:{fontSize:11,color:"var(--di)"}},"~%50 marj ile")
        ),
        h("div",{style:{borderLeft:"3px solid var(--bl)",paddingLeft:14}},
          h("div",{style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"📊 Stok Değeri"),

// ── PERSONEL PERFORMANSI + SATIŞ ANALİZİ (BİRLEŞİK BİLEŞEN) ──
function PersonelPerformansAnalizi({persListe,enCokSatan,stokOzet,periyotEtiket,toplamUrun,periyotK}){
  const [acikId,setAcikId]=React.useState(null);
  const persDetay=persListe.map(p=>{
    const urunOrani=(p.urunGelir+p.hizGelir)>0?p.urunGelir/(p.urunGelir+p.hizGelir):0;
    const musteriBasi=p.kayitSay>0?p.urunGelir/p.kayitSay:0;
    const hedefDonusum=0.30;
    const hedefAdet=p.kayitSay>0?Math.ceil(p.kayitSay*hedefDonusum):0;
    const skor=Math.min(100,Math.round(urunOrani/0.30*100));
    let durum,renk;
    if(skor>=80){durum="İyi";renk="var(--gr)";}
    else if(skor>=40){durum="Geliştirilmeli";renk="#f0a060";}
    else{durum="Kritik";renk="#c05050";}
    const kisiselNeden=[];
    if(urunOrani<0.05) kisiselNeden.push("Müşterilere hiç ürün önerilmiyor");
    else if(urunOrani<0.15) kisiselNeden.push("Ürün önerisi çok az yapılıyor");
    if(p.kayitSay>20&&(p.urunAdet||0)<3) kisiselNeden.push("Yoğun müşteri trafiğine rağmen ürün satışı yok");
    if(musteriBasi<100&&p.kayitSay>5) kisiselNeden.push("Müşteri başı ürün geliri çok düşük");
    const hizmetBasiGelir=p.kayitSay>0?p.hizGelir/p.kayitSay:0;
    const stratejiler=[];
    if(hizmetBasiGelir>300){
      stratejiler.push("Premium müşteri profilin var — her seansta bakım ürünü mutlaka öner");
      stratejiler.push("Saç/cilt bakımı sonrası evde kullanım için ürün paketle");
    }else{
      stratejiler.push("Orta segment müşterilere en çok satan ürünleri tanıt");
      stratejiler.push("Fiyatı uygun ürünle başla, güven oluştukça set öner");
    }
    if(p.kayitSay>15) stratejiler.push("Düzenli müşterilere 'bir önceki aldığın bitti mi?' diye sor");
    stratejiler.push("Hizmet sonunda ürünü uygulayarak göster, müşteri görünce satın almak ister");
    return {...p,urunOrani:Math.round(urunOrani*100),musteriBasi:Math.round(musteriBasi),
      hedefAdet,skor,durum,renk,kisiselNeden,stratejiler};
  });
  return h("div",{style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14,marginBottom:14}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",{style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:600}},"👥 Personel Performansı & Satış Analizi"),
      h("div",{style:{fontSize:11,color:"var(--mu)"}},"Detay için tıklayın")
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      persDetay.map((p,i)=>{
        const acik=acikId===i;
        return h("div",{key:i,style:{background:"var(--bg3)",border:"1px solid "+(acik?p.renk:"var(--br)"),borderRadius:11,overflow:"hidden",transition:"border-color .2s"}},
          h("div",{style:{padding:12,cursor:"pointer",display:"flex",alignItems:"center",gap:10},
            onClick:()=>setAcikId(acik?null:i)},
            h("div",{style:{width:28,height:28,borderRadius:"50%",background:i===0?"rgba(218,179,128,.2)":"var(--bg2)",color:i===0?"var(--g)":"var(--mu)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}},i+1),
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
                h("div",{style:{fontSize:14,color:"var(--g)",fontWeight:700}},p.ad),
                h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                  h("div",{style:{fontSize:10,color:p.renk,fontWeight:700,background:"rgba(0,0,0,.15)",padding:"2px 7px",borderRadius:5,border:"1px solid "+p.renk}},p.durum),
                  h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"var(--g)",fontWeight:700}},fmt(p.urunGelir))
                )
              ),
              h("div",{style:{height:5,background:"var(--bg2)",borderRadius:3,overflow:"hidden",marginBottom:6}},
                h("div",{style:{height:"100%",width:p.skor+"%",
                  background:p.skor>=80?"linear-gradient(90deg,#2eb85c,#20a050)":p.skor>=40?"linear-gradient(90deg,#f0a060,#e08040)":"linear-gradient(90deg,#c05050,#a03030)",
                  borderRadius:3,transition:"width .5s"}})
              ),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:10}},
                h("div",{style:{padding:"4px 6px",background:"var(--bg2)",borderRadius:5,textAlign:"center"}},
                  h("div",{style:{color:"var(--mu)",marginBottom:1}},"Müşteri"),
                  h("div",{style:{color:"var(--g)",fontWeight:600}},p.kayitSay+" kişi")
                ),
                h("div",{style:{padding:"4px 6px",background:"var(--bg2)",borderRadius:5,textAlign:"center"}},
                  h("div",{style:{color:"var(--mu)",marginBottom:1}},"Ürün Adet"),
                  h("div",{style:{color:"var(--g)",fontWeight:600}},p.urunAdet+" adet")
                ),
                h("div",{style:{padding:"4px 6px",background:"var(--bg2)",borderRadius:5,textAlign:"center"}},
                  h("div",{style:{color:"var(--mu)",marginBottom:1}},"Dönüşüm"),
                  h("div",{style:{color:"var(--g)",fontWeight:600}},"%"+p.urunOrani)
                )
              )
            ),
            h("div",{style:{fontSize:14,color:"var(--mu)",flexShrink:0,transform:acik?"rotate(180deg)":"rotate(0)",transition:"transform .2s"}},"▾")
          ),
          acik&&h("div",{style:{padding:"0 12px 12px",borderTop:"1px solid var(--br)"}},
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10,marginBottom:10}},
              h("div",{style:{padding:"8px 10px",background:"rgba(50,140,100,.06)",border:"1px solid rgba(50,140,100,.15)",borderRadius:7}},
                h("div",{style:{fontSize:10,color:"var(--gr)",letterSpacing:1,textTransform:"uppercase",marginBottom:3}},"🎯 Dönem Hedefi"),
                h("div",{style:{fontSize:13,color:"var(--gr)",fontWeight:600}},p.hedefAdet+" adet ürün")
              ),
              h("div",{style:{padding:"8px 10px",background:"rgba(37,99,168,.06)",border:"1px solid rgba(37,99,168,.15)",borderRadius:7}},
                h("div",{style:{fontSize:10,color:"var(--bl)",letterSpacing:1,textTransform:"uppercase",marginBottom:3}},"💼 Müşteri Başı"),
                h("div",{style:{fontSize:13,color:"var(--bl)",fontWeight:600}},fmt(p.musteriBasi))
              )
            ),
            p.kisiselNeden.length>0&&h("div",{style:{marginBottom:10,padding:"8px 10px",background:"rgba(192,80,80,.05)",border:"1px solid rgba(192,80,80,.15)",borderRadius:7}},
              h("div",{style:{fontSize:10,color:"#c05050",letterSpacing:1,textTransform:"uppercase",marginBottom:5,fontWeight:600}},"⚠ Tespit"),
              p.kisiselNeden.map((n,j)=>h("div",{key:j,style:{fontSize:12,color:"var(--mu)",display:"flex",gap:5,marginBottom:2,lineHeight:1.4}},
                h("span",{style:{color:"#c05050",flexShrink:0}},"•"),n))
            ),
            h("div",{style:{padding:"8px 10px",background:"rgba(37,99,168,.05)",border:"1px solid rgba(37,99,168,.15)",borderRadius:7}},
              h("div",{style:{fontSize:10,color:"var(--g)",letterSpacing:1,textTransform:"uppercase",marginBottom:5,fontWeight:600}},"→ Öneriler"),
              p.stratejiler.map((s,j)=>h("div",{key:j,style:{fontSize:12,color:"var(--tx)",display:"flex",gap:6,lineHeight:1.5,marginBottom:3}},
                h("span",{style:{color:"var(--g)",flexShrink:0}},"✓"),s))
            )
          )
        );
      })
    )
  );
}



// ── ÜRÜN SATIŞLARI MUHASEBESİ ──────────────────────────────────────────────
function UrunSatislariMuhasebe({tumK, personeller, muhAlt, setMuhAlt, pGruplar}){
  const seciliP = personeller.find(p=>p.id===muhAlt) || null;
  const [filAy, setFilAy] = React.useState("");
  const [filYil, setFilYil] = React.useState(new Date().getFullYear().toString());
  const [detayTarih, setDetayTarih] = React.useState(null);

  const gelirGrupId = (pGruplar||[]).find(g=>g.ad.toLowerCase().includes("gelire"))?.id;
  const gelirPersoneller = gelirGrupId
    ? personeller.filter(p=>p.aktif&&p.rol==="personel"&&p.grup===gelirGrupId)
    : [];

  const satirlar = React.useMemo(()=>{
    if(!seciliP) return [];
    const kayitlar = (tumK||[]).filter(r=>{
      if(r.staffId!==seciliP.id && r.staffAd!==seciliP.ad) return false;
      if(!r.tarih) return false;
      if(r.gonderildi===false) return false;
      if(!(r.urunler||[]).length) return false;
      if(filYil && !r.tarih.startsWith(filYil)) return false;
      if(filAy && !r.tarih.startsWith(filYil+"-"+filAy.padStart(2,"0"))) return false;
      return true;
    });
    const gr = {};
    kayitlar.forEach(r=>{
      const t = r.tarih;
      if(!gr[t]) gr[t]={tarih:t,musteriSet:new Set(),urunAdet:0,kk:0,ib:0,nk:0,kayitlar:[]};
      gr[t].musteriSet.add((r.musteri||"").trim().toLowerCase()||r.id);
      gr[t].urunAdet += (r.urunler||[]).reduce((s,u)=>s+toN(u.qty||1),0);
      gr[t].kk += toN(r.uKK||0);
      gr[t].ib += toN(r.uIB||0);
      gr[t].nk += toN(r.uNK||0);
      gr[t].kayitlar.push(r);
    });
    return Object.values(gr).map(g=>({
      tarih:g.tarih, musteriSay:g.musteriSet.size, urunAdet:g.urunAdet,
      kk:g.kk, ib:g.ib, nk:g.nk, toplam:g.kk+g.ib+g.nk, kayitlar:g.kayitlar
    })).sort((a,b)=>b.tarih.localeCompare(a.tarih));

  const topMusteri = satirlar.reduce((s,g)=>s+g.musteriSay,0);

  // ── HİZMET MUHASEBESİ ───────────────────────────────────────────────────────

function HizmetMuhasebeOzet({tumK, personeller, pGruplar}){
  const [periyot,setPeriyot]=React.useState("buAy");
  const [acikPersonel,setAcikPersonel]=React.useState(null);
  const periyotBaslangic=React.useMemo(()=>{
    const d=new Date();
    if(periyot==="buHafta"){const g=d.getDay()||7;d.setDate(d.getDate()-g+1);}
    else if(periyot==="buAy"){d.setDate(1);}
    else if(periyot==="son3Ay"){d.setMonth(d.getMonth()-3);}
    else if(periyot==="buYil"){d.setMonth(0);d.setDate(1);}
    d.setHours(0,0,0,0);
    return d;
  },[periyot]);
  const periyotEtiket={buHafta:"Bu Hafta",buAy:"Bu Ay",son3Ay:"Son 3 Ay",buYil:"Bu Yıl"}[periyot];
  const gelirGrupId=(pGruplar||[]).find(g=>(g.ad||"").toLowerCase().includes("gelire"))?.id;
  const aktifPersoneller=(personeller||[]).filter(p=>p.aktif&&p.rol==="personel"&&(!gelirGrupId||p.grup===gelirGrupId));
  const periyotK=(tumK||[]).filter(r=>{
    if(!r.tarih||r.gonderildi===false) return false;
    if(new Date(r.tarih)<periyotBaslangic) return false;
    return toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0)>0 || (r.hizler||[]).length>0;
  });
  const toplamHizmet=periyotK.reduce((x,r)=>x+toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0),0);
  const toplamKayit=periyotK.length;
  const toplamHizAdet=periyotK.reduce((x,r)=>x+(r.hizler||[]).length,0);
  const toplamMusteri=new Set(periyotK.map(r=>((r.musteri||"").trim().toLowerCase()||r.id))).size;
  const topKK=periyotK.reduce((x,r)=>x+toN(r.hizKK||0),0);
  const topIB=periyotK.reduce((x,r)=>x+toN(r.hizIB||0),0);
  const topNK=periyotK.reduce((x,r)=>x+toN(r.hizNK||0),0);
  const ortIslem=toplamKayit?toplamHizmet/toplamKayit:0;
  const ortMusteri=toplamMusteri?toplamHizmet/toplamMusteri:0;
  const hizmetGrup={};
  periyotK.forEach(r=>(r.hizler||[]).forEach(hz=>{
    const ad=hz.n||hz||"Hizmet";
    if(!hizmetGrup[ad]) hizmetGrup[ad]={ad,adet:0,gelir:0};
    hizmetGrup[ad].adet+=1;
    hizmetGrup[ad].gelir+=toN(hz.f||0);
  }));
  const enCokHizmet=Object.values(hizmetGrup).sort((a,b)=>b.gelir-a.gelir).slice(0,10);
  const enYuksekHizmet=enCokHizmet[0]?.gelir||1;
  const persListe=aktifPersoneller.map(p=>{
    const pk=periyotK.filter(r=>r.staffId===p.id||r.staffAd===p.ad);
    const gelir=pk.reduce((x,r)=>x+toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0),0);
    const adet=pk.reduce((x,r)=>x+(r.hizler||[]).length,0);
    const musteri=new Set(pk.map(r=>((r.musteri||"").trim().toLowerCase()||r.id))).size;
    const hizmetler={};
    pk.forEach(r=>(r.hizler||[]).forEach(hz=>{
      const ad=hz.n||hz||"Hizmet";
      if(!hizmetler[ad]) hizmetler[ad]={ad,adet:0,gelir:0};
      hizmetler[ad].adet+=1;
      hizmetler[ad].gelir+=toN(hz.f||0);
    }));
    const populer=Object.values(hizmetler).sort((a,b)=>b.gelir-a.gelir)[0];
    const kk=pk.reduce((x,r)=>x+toN(r.hizKK||0),0);
    const ib=pk.reduce((x,r)=>x+toN(r.hizIB||0),0);
    const nk=pk.reduce((x,r)=>x+toN(r.hizNK||0),0);
    return {id:p.id,ad:p.ad,gelir,adet,musteri,ort:musteri?gelir/musteri:0,kayit:pk.length,populer,kk,ib,nk};
  }).sort((a,b)=>b.gelir-a.gelir);
  const enYukPers=persListe[0]?.gelir||1;
  const personelDurum=p=>p.gelir<=0?"Kritik":p.gelir>=enYukPers*0.75?"İyi":"Takip";
  const durumRenk=d=>d==="İyi"?"var(--gr)":d==="Takip"?"#f0a060":"#c05050";
  const oneriler=p=>{
    if(p.gelir<=0) return ["Bu dönem hizmet kaydı yok — günlük kayıt disiplinini kontrol et", "Randevu sonrası mutlaka hizmet kaydı oluştur", "Müşteri dönüşü için eski müşterilere kısa hatırlatma yap"];
    const arr=[];
    if(p.ort<ortMusteri) arr.push("Müşteri başı gelir ortalamanın altında — bakım, renklendirme veya paket hizmet öner");
    if(p.adet<Math.max(1,toplamHizAdet/Math.max(1,persListe.length))) arr.push("Hizmet adedi düşük — boş saatlerde hızlı hizmetleri öne çıkar");
    if((p.kk+p.ib)>p.nk) arr.push("Kart/IBAN yoğunluğu yüksek — gün sonu tahsilat kontrolünü netleştir");
    if(p.populer) arr.push("En güçlü hizmetin “"+p.populer.ad+"” — benzer müşterilere aynı hizmeti sistemli öner");
    arr.push("Her müşteride ikinci hizmet fırsatı ara: saç + sakal, bakım + kesim gibi paketle");
    return arr.slice(0,3);
  };
  const gunluk={};
  periyotK.forEach(r=>{gunluk[r.tarih]=(gunluk[r.tarih]||0)+toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0);});
  const trendV=Object.entries(gunluk).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,v])=>({tarih:t,deger:v}));
  const maxTrend=Math.max(...trendV.map(x=>x.deger),1);
  const kpi=(lb,v,alt,c)=>h("div",{key:lb,style:{borderLeft:"3px solid "+c,paddingLeft:14}},
    h("div",{style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},lb),

    h("div",{style:{fontSize:11,color:"var(--di)"}},alt)
  );
  return h("div",{style:{padding:0}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}},
      h("div",null,
        h("div",{style:{fontSize:13,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:3,fontWeight:700}},"✂️ Hizmet Muhasebesi Özeti"),
        h("div",{style:{fontSize:12,color:"var(--mu)"}},periyotEtiket+" · "+toplamKayit+" hizmet kaydı")
      ),
      h("div",{style:{display:"flex",gap:5,flexWrap:"wrap"}},
        [["buHafta","Bu Hafta"],["buAy","Bu Ay"],["son3Ay","Son 3 Ay"],["buYil","Bu Yıl"]].map(([id,lb])=>
          h("button",{key:id,style:{padding:"6px 11px",borderRadius:7,fontSize:12,cursor:"pointer",background:periyot===id?"rgba(37,99,168,.12)":"var(--bg2)",border:"1px solid "+(periyot===id?"rgba(37,99,168,.4)":"var(--br)"),color:periyot===id?"var(--g)":"var(--mu)",fontWeight:periyot===id?600:400},onClick:()=>setPeriyot(id)},lb)
        )
      )
    ),
    h("div",{style:{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",border:"1.5px solid var(--br)",borderRadius:14,padding:18,marginBottom:14}},
      h("div",{style:{fontSize:11,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:14}},"💼 Finansal Özet"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}},
        kpi("✂️ Hizmet Geliri",fmt(toplamHizmet),toplamHizAdet+" adet hizmet yapıldı","var(--g)"),
        kpi("👥 Müşteri Sayısı",String(toplamMusteri),"Tekil müşteri hesabı","var(--gr)"),
        kpi("📊 Ortalama İşlem",fmt(ortIslem),"Kayıt başına","var(--bl)"),
        kpi("✨ Müşteri Başı Gelir",fmt(ortMusteri),"Hizmet cirosu / müşteri","#f0a060")
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:14}},
      [["💳","K.Kartı",topKK,"var(--g)"],["🏦","IBAN",topIB,"var(--bl)"],["💵","Nakit",topNK,"var(--gr)"]].map(([ic,lb,v,c])=>
        h("div",{key:lb,style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:10,padding:11,textAlign:"center"}},
          h("div",{style:{fontSize:17,marginBottom:3}},ic),
          h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:c,fontWeight:700}},fmt(v)),
          h("div",{style:{fontSize:10,color:"var(--mu)",marginTop:3,textTransform:"uppercase",letterSpacing:1}},lb)
        )
      )
    ),
    trendV.length>0&&h("div",{style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14,marginBottom:14}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",{style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:600}},"📈 Günlük Hizmet Gelir Trendi"),
        h("div",{style:{fontSize:11,color:"var(--mu)"}},trendV.length+" gün")
      ),
      h("svg",{viewBox:"0 0 600 180",style:{width:"100%",height:160,display:"block"}},
        [0,1,2,3,4].map(i=>h("line",{key:"g"+i,x1:0,y1:i*40+10,x2:600,y2:i*40+10,stroke:"var(--br)",strokeWidth:0.5,strokeDasharray:"2,3",opacity:0.5})),
        trendV.length>1&&h("polyline",{fill:"none",stroke:"var(--g)",strokeWidth:2,points:trendV.map((p,i)=>{const x=(i/(trendV.length-1))*580+10;const y=170-(p.deger/maxTrend)*150;return x+","+y;}).join(" ")}),
        trendV.map((p,i)=>{const x=trendV.length>1?(i/(trendV.length-1))*580+10:300;const y=170-(p.deger/maxTrend)*150;return h("circle",{key:"d"+i,cx:x,cy:y,r:3,fill:"var(--g)"});})
      )
    ),
    enCokHizmet.length>0&&h("div",{style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14,marginBottom:14}},
      h("div",{style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:600,marginBottom:12}},"🏆 En Çok Gelir Getiren Hizmetler"),
      h("div",{style:{display:"flex",flexDirection:"column",gap:7}},
        enCokHizmet.map((u,i)=>h("div",{key:u.ad,style:{display:"flex",alignItems:"center",gap:10,padding:8,background:"var(--bg3)",borderRadius:7,border:"1px solid var(--br)"}},
          h("div",{style:{width:24,height:24,borderRadius:6,background:i<3?"rgba(218,179,128,.15)":"var(--bg2)",color:i<3?"var(--g)":"var(--mu)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}},i+1),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:12,color:"var(--g)",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},u.ad),
            h("div",{style:{fontSize:10,color:"var(--mu)",marginTop:1}},u.adet+" adet")

          h("div",{style:{flex:1.3,minWidth:80}},
            h("div",{style:{height:6,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}},
              h("div",{style:{height:"100%",width:(u.gelir/enYuksekHizmet*100)+"%",background:"linear-gradient(90deg,var(--g),var(--gr))",borderRadius:3}})
            )
          ),
          h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,color:"var(--g)",fontWeight:700,minWidth:75,textAlign:"right"}},fmt(u.gelir))

        h("div",{style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:600}},"👥 PERSONEL PERFORMANSI & HİZMET ANALİZİ"),
        h("div",{style:{fontSize:11,color:"var(--mu)",lineHeight:1.4}},"Detay için tıklayın")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        persListe.map((p,i)=>{
          const acik=acikPersonel===p.id;
          const durum=personelDurum(p);
          return h("div",{key:p.id,style:{background:acik?"var(--bg)":"var(--bg3)",border:"1.5px solid "+(acik?"var(--g)":"var(--br)"),borderRadius:12,overflow:"hidden"}},
            h("div",{style:{padding:12,cursor:"pointer"},onClick:()=>setAcikPersonel(acik?null:p.id)},
              h("div",{style:{display:"flex",alignItems:"center",gap:10}},
                h("div",{style:{width:34,height:34,borderRadius:"50%",background:i<3?"rgba(218,179,128,.15)":"var(--bg2)",color:i<3?"var(--g)":"var(--mu)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0}},i+1),
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,marginBottom:7}},
                    h("div",{style:{fontSize:15,color:"var(--tx)",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},p.ad),
                    h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
                      h("span",{style:{border:"1px solid "+durumRenk(durum),color:durumRenk(durum),borderRadius:7,padding:"3px 8px",fontSize:11,fontWeight:700}},durum),
                      h("span",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"var(--g)",fontWeight:700}},fmt(p.gelir)),

                    )

                  ),

                      h("div",{key:a,style:{background:"var(--bg2)",borderRadius:7,padding:"7px 4px",textAlign:"center"}},
                        h("div",{style:{fontSize:10,color:"var(--mu)"}},a),

function HizmetMuhasebe({tumK, personeller, muhAlt, setMuhAlt, pGruplar, devDB}){
  const seciliP = personeller.find(p=>p.id===muhAlt) || null;
  const [filAy, setFilAy] = React.useState("");
  const [filYil, setFilYil] = React.useState(new Date().getFullYear().toString());
  const [detayTarih, setDetayTarih] = React.useState(null);

  const gelirGrupId = (pGruplar||[]).find(g=>g.ad.toLowerCase().includes("gelire"))?.id;
  const gelirPersoneller = gelirGrupId
    ? personeller.filter(p=>p.aktif&&p.rol==="personel"&&p.grup===gelirGrupId)
    : [];


  // Hizmet kayıtları + devamsızlık satırlarını birleştir
  const satirlar = React.useMemo(()=>{
    if(!seciliP) return [];

    // 1. Hizmet kayıtları — sadece hizKK/hizIB/hizNK
    const kayitlar = (tumK||[]).filter(r=>{
      if(r.staffId!==seciliP.id && r.staffAd!==seciliP.ad) return false;
      if(!r.tarih) return false;
      if(r.gonderildi===false) return false;
      if(filYil && !r.tarih.startsWith(filYil)) return false;
      if(filAy && !r.tarih.startsWith(filYil+"-"+filAy.padStart(2,"0"))) return false;
      return true;
    });

    const gr = {};
    kayitlar.forEach(r=>{
      const t=r.tarih;
      if(!gr[t]) gr[t]={tip:"hizmet",tarih:t,hizSay:0,kk:0,ib:0,nk:0,kayitlar:[]};
      gr[t].hizSay+=1;
      gr[t].kk+=toN(r.hizKK||0);
      gr[t].ib+=toN(r.hizIB||0);
      gr[t].nk+=toN(r.hizNK||0);
      gr[t].kayitlar.push(r);
    });

    // 2. Devamsızlık kayıtları — "Çalıştım" içerenleri atla
    const devKeys = Object.keys(devDB||{}).filter(k=>{
      if(!k.endsWith("_"+seciliP.id)) return false;
      const tarih = k.slice(0, k.lastIndexOf("_"));
      if(filYil && !tarih.startsWith(filYil)) return false;
      if(filAy && !tarih.startsWith(filYil+"-"+filAy.padStart(2,"0"))) return false;
      const aciklama = devDB[k]||"";
      // "Çalıştım" içerenleri gösterme — zaten hizmet kaydı var veya olacak
      if(aciklama.toLowerCase().includes("calistim")) return false;
      // O tarihte zaten hizmet kaydı varsa devamsızlığı gösterme
      if(gr[tarih]) return false;
      return true;
    });

    devKeys.forEach(k=>{
      const tarih = k.slice(0, k.lastIndexOf("_"));
      const aciklama = devDB[k]||"";
      gr[tarih] = {tip:"devamsiz",tarih,aciklama};
    });

    return Object.values(gr).map(g=>({...g,kayitlar:g.kayitlar||[]})).sort((a,b)=>b.tarih.localeCompare(a.tarih));
  },[tumK,seciliP,filAy,filYil,devDB]);

  // Sadece hizmet satırlarından toplamlar
  const hizSatirlar = satirlar.filter(s=>s.tip==="hizmet");
  const topKK  = hizSatirlar.reduce((s,g)=>s+g.kk,0);
  const topIB  = hizSatirlar.reduce((s,g)=>s+g.ib,0);
  const topNK  = hizSatirlar.reduce((s,g)=>s+g.nk,0);
  const topTum = topKK+topIB+topNK;
  const topHiz = hizSatirlar.reduce((s,g)=>s+g.hizSay,0);

  // Özet tam sayfa dönüşü hooklardan sonra olmalı; aksi halde React #310 oluşur.
  if(muhAlt==="hizmetOzet"){
    return h("div",{style:{position:"fixed",inset:0,zIndex:901,background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}},
      h("div",{style:{background:"var(--bg2)",borderBottom:"2px solid var(--br)",padding:"12px 14px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:17,color:"var(--g)"}},"📊 Özet"),
        h("button",{style:{background:"transparent",border:"1px solid #3a1010",borderRadius:8,color:"#c05050",fontSize:13,cursor:"pointer",padding:"5px 12px"},onClick:()=>setMuhAlt("")},"✕ Kapat")
      ),
      h("div",{style:{flex:1,overflowY:"auto",padding:"14px"}},
        h(HizmetMuhasebeOzet,{tumK,personeller,pGruplar})
      )
    );
  }
  // ── DETAY MODAL ──
  if(detayTarih && seciliP){
    const dT=detayTarih.tarih;
    const dK=detayTarih.kayitlar||[];
    const dToplam=dK.reduce((s,r)=>s+toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0),0);
    return h("div",{style:{position:"fixed",inset:0,zIndex:903,background:"var(--bg)",
      display:"flex",flexDirection:"column",overflow:"hidden"}},
      h("div",{style:{background:"var(--bg2)",borderBottom:"2px solid var(--br)",
        padding:"12px 14px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",null,
          h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",fontWeight:700}},
            "✂️ "+seciliP.ad+" — "+fmtT(dT)+" Detayı"),
          h("div",{style:{fontSize:12,color:"var(--mu)",marginTop:3}},
            dK.length+" kayıt · "+fmt(dToplam))
        ),
        h("button",{style:{background:"transparent",border:"1px solid #3a1010",
          borderRadius:8,color:"#c05050",fontSize:13,cursor:"pointer",padding:"5px 14px"},
          onClick:()=>setDetayTarih(null)},"✕ Kapat")
      ),
      h("div",{style:{flex:1,overflowY:"auto",padding:14}},
        dK.map(r=>
          h("div",{key:r.id,style:{background:"var(--bg2)",border:"1px solid var(--br)",
            borderRadius:12,padding:14,marginBottom:10}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginBottom:10,paddingBottom:8,borderBottom:"1px solid var(--br)"}},
              h("div",null,
                h("div",{style:{fontSize:15,color:"var(--tx)",fontWeight:600}},
                  (r.musteri||"—")),
                h("div",{style:{fontSize:12,color:"var(--mu)",marginTop:2}},
                  (r.saat||"")+(r.tel?" · 📞 "+r.tel:""))
              ),
              h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,
                color:"var(--g)",fontWeight:700}},
                fmt(toN(r.hizKK||0)+toN(r.hizIB||0)+toN(r.hizNK||0)))
            ),
            h("div",{style:{fontSize:11,color:"var(--g)",letterSpacing:1,
              textTransform:"uppercase",marginBottom:8,fontWeight:600}},"✂️ Verilen Hizmetler"),
            h("div",{style:{marginBottom:12}},
              (r.hizler||[]).map((hz,j)=>
                h("div",{key:j,style:{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"8px 10px",
                  background:"var(--bg3)",borderRadius:7,marginBottom:5}},
                  h("div",{style:{fontSize:13,color:"var(--tx)",fontWeight:500}},hz.n||hz),
                  h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,
                    color:"var(--g)",fontWeight:700}},fmt(toN(hz.f||0)))
                )
              )
            ),
            h("div",{style:{fontSize:11,color:"var(--g)",letterSpacing:1,
              textTransform:"uppercase",marginBottom:6,fontWeight:600}},"💳 Alınan Ödeme"),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
              [["💳","K.Kartı",r.hizKK||0],["🏦","IBAN",r.hizIB||0],["💵","Nakit",r.hizNK||0]].map(([ic,lb,v])=>
                h("div",{key:lb,style:{background:"var(--bg3)",borderRadius:7,
                  padding:"7px 8px",textAlign:"center",opacity:v>0?1:0.4}},
                  h("div",{style:{fontSize:14,marginBottom:2}},ic),
                  h("div",{style:{fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}},lb),
                  h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,
                    color:v>0?"var(--g)":"var(--di)",fontWeight:700}},v>0?fmt(v):"—")
                )
              )
            )
          )
        )
      ),
      h("div",{style:{background:"var(--bg2)",borderTop:"2px solid var(--br)",
        padding:"11px 14px",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",{style:{fontSize:12,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase"}},
          dK.length+" kayıt"),
        h("div",{style:{fontFamily:"Cormorant Garamond,serif",fontSize:22,
          color:"var(--g)",fontWeight:700}},fmt(dToplam))
      )
    );
  }

  if(gelirPersoneller.length===0)
    return h("div",{style:{padding:40,textAlign:"center",color:"var(--mu)",fontSize:13}},
      h("div",{style:{fontSize:32,marginBottom:8,opacity:0.3}},"👥"),
      h("div",null,"Gelire Doğrudan Katkı Sağlayanlar listesi boş."),
      h("div",{style:{fontSize:11,marginTop:6,color:"var(--di)"}},"Ayarlar > Personel bölümünden personel ekleyin.")
    );

  if(!seciliP || !gelirPersoneller.find(p=>p.id===muhAlt))
    return h("div",{style:{padding:40,textAlign:"center",color:"var(--mu)",fontSize:13}},
      h("div",{style:{fontSize:32,marginBottom:8,opacity:0.3}},"✂️"),
      h("div",null,"Hizmet Satışları başlığını açıp bir personel seçin.")
    );

  const thS = sag=>({
    padding:"10px 12px",textAlign:sag?"right":"left",
    fontSize:11,color:"var(--mu)",letterSpacing:2,
    textTransform:"uppercase",fontWeight:700,
    borderBottom:"2px solid var(--br)",
    background:"var(--bg2)",position:"sticky",top:0,whiteSpace:"nowrap"
  });
  const tdS = (sag,bold,c)=>({
    padding:"10px 12px",textAlign:sag?"right":"left",
    color:c||"var(--tx)",fontWeight:bold?700:400,
    fontFamily:sag?"Cormorant Garamond,serif":"inherit",
    fontSize:sag?14:13,borderBottom:"1px solid var(--br)",whiteSpace:"nowrap"
  });

  return h("div",{style:{position:"fixed",inset:0,zIndex:901,background:"var(--bg)",
    display:"flex",flexDirection:"column",overflow:"hidden"}},

    // ── BAŞLIK + FİLTRE ──
    h("div",{style:{background:"var(--bg2)",borderBottom:"2px solid var(--br)",
      padding:"12px 14px",flexShrink:0}},

  // Stok özeti hesapla
  const stokOzet = React.useMemo(()=>{
    const oz = {};
    (stokPartiler||[]).forEach(p=>{
      if(!oz[p.barkod]) oz[p.barkod]={barkod:p.barkod, urunAd:p.urunAd||p.urun_ad||"", marka:p.marka||"",
        kalan:0, partiler:[], toplamMaliyet:0, kdvOran:p.kdvOran||20};
      oz[p.barkod].kalan += (p.kalan||0);
      oz[p.barkod].toplamMaliyet += (p.kalan||0)*(p.alisF||0);
      oz[p.barkod].kdvOran = p.kdvOran||oz[p.barkod].kdvOran||20;
      oz[p.barkod].partiler.push(p);

    Object.values(oz).forEach(u=>{
      const dbU = URUN_DB.find(d=>d.b===u.barkod);

              h("rect",{x:3,y:2,width:15,height:20,rx:2}),

                      div({style:{fontSize:10,color:"var(--mu)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}},"Toplam Borç")
                    ),
                    div({style:{background:"var(--bg3)",borderRadius:8,padding:"9px",textAlign:"center"}},
                      div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"#50b880",fontWeight:600}},fmt(topOdenen)),
                      div({style:{fontSize:10,color:"var(--mu)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}},"Ödenen")
                    ),
                    div({style:{background:"var(--bg3)",borderRadius:8,padding:"9px",textAlign:"center"}},
                      div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:kalan>0?"var(--g)":"#50b880",fontWeight:700}},fmt(kalan)),
                      div({style:{fontSize:10,color:"var(--mu)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}},"Kalan")
                    )
                  )
                ),

                // Geçmiş ödemeler
                gecmisOdemeler.length>0&&div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
                  borderRadius:12,padding:14,marginBottom:14}},
                  div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},
                    "Ödeme Geçmişi"),
                  gecmisOdemeler.map((od,oi)=>
                    div({key:oi,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"8px 0",borderBottom:oi<gecmisOdemeler.length-1?"1px solid var(--br)":"none"}},
                      div(null,
                        div({style:{fontSize:13,color:"var(--tx)"}},(od.tip||"Nakit")+" · "+fmtT(od.tarih)),
                        od.not&&div({style:{fontSize:11,color:"var(--di)",marginTop:1}},od.not)
                      ),
                      div({style:{display:"flex",gap:8,alignItems:"center"}},
                        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"#50b880",fontWeight:600}},fmt(od.tutar)),
                        btn({style:{background:"transparent",border:"none",color:"#c05050",fontSize:13,cursor:"pointer"},
                          onClick:()=>{
                            const yeniArsiv=mkArsiv.map(ar=>ar===secFatura
                              ?{...ar,odemeler:(ar.odemeler||[]).filter((_,j)=>j!==oi)}:ar);
                            setMkArsiv(yeniArsiv);
                            setSecFatura(yeniArsiv.find(ar=>ar.faturaN===secFatura.faturaN&&ar.tarih===secFatura.tarih)||null);
                            try{localStorage.setItem("apron_mk_arsiv",JSON.stringify(yeniArsiv));}catch(e){}
                          }},"✕")
                      )
                    )
                  )
                ),

                // Yeni ödeme formu
                kalan>0&&div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
                  borderRadius:12,padding:14,marginBottom:14}},
                  div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
                    "💳 Yeni Ödeme Ekle"),
                  div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
                    div(null,lbl({className:"fl"},"Ödeme Tarihi"),
                      inp({className:"fi",type:"date",value:cariOdeTarih,
                        onChange:e=>setCariOdeTarih(e.target.value)})),
                    div(null,lbl({className:"fl"},"Ödeme Tipi"),
                      sel({className:"fi",value:cariOdeTip,onChange:e=>setCariOdeTip(e.target.value)},
                        opt("Nakit","💵 Nakit"),opt("Banka","🏦 Banka Havalesi"),
                        opt("EFT","🏧 EFT"),opt("Çek","📝 Çek"),opt("Senet","📋 Senet"),opt("Diğer","Diğer")))
                  ),
                  div({style:{marginBottom:10}},lbl({className:"fl"},"Ödenen Tutar (₺)"),
                    inp({className:"fi",type:"number",inputMode:"decimal",placeholder:"0",
                      value:cariOdeTutar,onChange:e=>setCariOdeTutar(e.target.value)}),
                    kalan>0&&div({style:{fontSize:11,color:"var(--mu)",marginTop:4}},
                      "Kalan: "+fmt(kalan),
                      btn({style:{background:"transparent",border:"none",color:"var(--g)",fontSize:11,cursor:"pointer",
                        marginLeft:8,textDecoration:"underline"},
                        onClick:()=>setCariOdeTutar(String(Math.round(kalan)))},"Tamamını öde")
                    )
                  ),
                  div({style:{marginBottom:14}},lbl({className:"fl"},"Not (isteğe bağlı)"),
                    inp({className:"fi",placeholder:"Ödeme notu...",value:cariOdeNot,
                      onChange:e=>setCariOdeNot(e.target.value)})),
                  btn({style:{width:"100%",padding:"13px 0",borderRadius:10,border:"none",
                    background:toN(cariOdeTutar)>0?"linear-gradient(135deg,var(--g),var(--gd))":"var(--bg3)",
                    color:toN(cariOdeTutar)>0?"var(--bg)":"var(--di)",fontSize:14,fontWeight:700,cursor:"pointer"},
                    disabled:!toN(cariOdeTutar),
                    onClick:()=>{
                      if(!toN(cariOdeTutar)){showToast("Tutar girin","uy");return;}
                      const yeniOdeme={id:uid(),tarih:cariOdeTarih,tip:cariOdeTip,
                        tutar:toN(cariOdeTutar),not:cariOdeNot};
                      const yeniArsiv=mkArsiv.map(ar=>ar===secFatura
                        ?{...ar,odemeler:[...(ar.odemeler||[]),yeniOdeme]}:ar);
                      setMkArsiv(yeniArsiv);
                      const guncel=yeniArsiv.find(ar=>ar.faturaN===secFatura.faturaN&&ar.tarih===secFatura.tarih);
                      setSecFatura(guncel||null);
                      setCariOdeTutar(""); setCariOdeNot("");
                      try{localStorage.setItem("apron_mk_arsiv",JSON.stringify(yeniArsiv));}catch(e){}
                      showToast(fmt(toN(cariOdeTutar))+" ödeme kaydedildi");
                    }},toN(cariOdeTutar)>0?"✅ Ödeme Kaydet":"Tutar Girin")
                ),

                // Tamamen ödendi ise
                kalan<=0&&div({style:{textAlign:"center",padding:"20px 14px",
                  background:"rgba(50,140,100,.06)",border:"1px solid rgba(50,140,100,.2)",
                  borderRadius:12,marginBottom:14}},
                  div({style:{fontSize:30,marginBottom:8}},"✅"),
                  div({style:{fontSize:14,color:"#50b880",fontWeight:600,letterSpacing:1}},
                    "Bu Fatura Tamamen Ödendi"),
                  div({style:{fontSize:12,color:"var(--mu)",marginTop:4}},fmt(topOdenen)+" ödendi")
                )
              );
            })(),

            // Tamamlanmış ödemeler
            odenenFaturalar.length>0&&!secFatura&&div({style:{marginTop:16}},
              div({style:{fontSize:12,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase",
                marginBottom:10,paddingTop:10,borderTop:"1px solid var(--br)"}},"✅ Tamamlanan Ödemeler"),
              odenenFaturalar.map((ar,i)=>{
                const odenecek=ar.urunler.reduce((s,u)=>s+(u.toplamF||0),0);
                const odenen=(ar.odemeler||[]).reduce((s,o)=>s+toN(o.tutar),0);
                const kalan=odenecek-odenen;
                if(kalan>0) return null;
                return div({key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"10px 12px",background:"var(--bg2)",borderRadius:10,marginBottom:7,
                  border:"1px solid rgba(50,140,100,.15)",opacity:.7}},
                  div(null,
                    ar.tedarikci&&div({style:{fontSize:13,color:"var(--tx)",fontWeight:500}},ar.tedarikci),
                    div({style:{fontSize:12,color:"var(--mu)"}},(ar.faturaN||"—")+" · "+fmtT(ar.faturaTarih||ar.tarih))
                  ),
                  div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,color:"#50b880",fontWeight:600}},
                    "✅ "+fmt(odenen))
                );
              })
            )
          )
        );
      })()
    )
  );
}



// ── ÖDÜNÇ MODÜLÜ ──────────────────────────────────────────────────────────
function OduncModul({oduncler,setOduncler,komsular,setKomsular,stokPartiler,setStokPartiler,showToast}) {
  const [sekme, setSekme] = React.useState("aktif"); // aktif | gecmis | komsular
  const [komsuFrm, setKomsuFrm] = React.useState(null);
  const [oduncFrm, setOduncFrm] = React.useState(false);
  const [oduncArama, setOduncArama] = React.useState("");
  const [oduncAramaSon, setOduncAramaSon] = React.useState([]);
  const [oduncUrun, setOduncUrun] = React.useState([]);
  const [oduncKomsu, setOduncKomsu] = React.useState("");
  const [oduncTarih, setOduncTarih] = React.useState(TODAY());
  const [oduncNot, setOduncNot] = React.useState("");

  React.useEffect(()=>{
    if(oduncArama.length < 2){ setOduncAramaSon([]); return; }
    const q = normText(oduncArama);
    setOduncAramaSon(URUN_DB.filter(u=>normText(u.a).includes(q)||u.b.includes(oduncArama)).slice(0,6));
  },[oduncArama]);

  const aktifOduncler = oduncler.filter(o=>!o.geriAlindi);
  const gecmisOduncler = oduncler.filter(o=>o.geriAlindi);

  // Geciken ödünçler (7+ gün)
  const geciken = aktifOduncler.filter(o=>{
    const fark = Math.floor((new Date()-new Date(o.tarih))/(1000*60*60*24));
    return fark >= 7;
  });

  const oduncKaydet = () => {
    if(!oduncKomsu){ showToast("Komşu seçin","uy"); return; }
    if(!oduncUrun.length){ showToast("Ürün ekleyin","uy"); return; }
    const komsu = komsular.find(k=>k.id===oduncKomsu);
    const yeniOduncler = oduncUrun.map(u=>({
      id:uid(), komsuId:oduncKomsu, komsuAd:komsu?.ad||"",
      barkod:u.barkod, urunAd:u.urunAd, marka:u.marka||"",
      miktar:parseInt(u.miktar)||1, tarih:oduncTarih,
      notlar:oduncNot, geriAlindi:false, geriAlindiTarih:""
    }));
    setOduncler(p=>[...p,...yeniOduncler]);
    // Stoktan düş
    yeniOduncler.forEach(od=>{
      let kalan = od.miktar;
      setStokPartiler(p=>{
        const yeni=[...p];
        for(let i=0;i<yeni.length&&kalan>0;i++){
          if(yeni[i].barkod===od.barkod&&yeni[i].kalan>0){
            const dusen=Math.min(yeni[i].kalan,kalan);
            yeni[i]={...yeni[i],kalan:yeni[i].kalan-dusen};
            kalan-=dusen;
          }
        }
        return yeni;
      });
    });
    setOduncUrun([]); setOduncKomsu(""); setOduncNot(""); setOduncFrm(false);
    showToast("Ödünç kaydedildi, stoktan düşüldü");
  };

  const geriAl = (od) => {
    setOduncler(p=>p.map(x=>x.id===od.id?{...x,geriAlindi:true,geriAlindiTarih:TODAY()}:x));
    // Stoka geri ekle
    setStokPartiler(p=>[...p,{
      id:uid(), barkod:od.barkod, urunAd:od.urunAd, marka:od.marka,
      adet:od.miktar, kalan:od.miktar, alisF:0,
      tarih:TODAY(), faturaN:"Ödünç İadesi - "+od.komsuAd, tip:"oduncIade"
    }]);
    showToast("Stoka geri eklendi ✓");
  };

  return div(null,

    // Komşu formu
    komsuFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:18}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:16,
        padding:20,maxWidth:360,width:"100%"}},
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",marginBottom:14}},
          komsuFrm.id?"Komşu Düzenle":"Yeni Komşu"),
        div({style:{marginBottom:10}},lbl({className:"fl"},"İşletme Adı *"),
          inp({className:"fi",placeholder:"Ahmet Berber",value:komsuFrm.ad||"",
            onChange:e=>setKomsuFrm(p=>({...p,ad:e.target.value}))})),
        div({style:{marginBottom:10}},lbl({className:"fl"},"Telefon"),
          inp({className:"fi",placeholder:"05xx...",value:komsuFrm.tel||"",
            onChange:e=>setKomsuFrm(p=>({...p,tel:e.target.value}))})),
        div({style:{marginBottom:14}},lbl({className:"fl"},"Adres / Not"),
          inp({className:"fi",placeholder:"Konum veya not...",value:komsuFrm.adres||"",
            onChange:e=>setKomsuFrm(p=>({...p,adres:e.target.value}))})),
        div({className:"btn-r"},
          btn({className:"btn-i",onClick:()=>setKomsuFrm(null)},"İptal"),
          btn({className:"btn-k",disabled:!(komsuFrm.ad||"").trim(),
            onClick:()=>{
              const k={...komsuFrm,id:komsuFrm.id||uid()};
              setKomsular(p=>komsuFrm.id?p.map(x=>x.id===k.id?k:x):[...p,k]);
              setKomsuFrm(null); showToast("Komşu kaydedildi");
            }},"Kaydet")
        )
      )
    ),

    // Ödünç ver formu
    oduncFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,overflow:"auto"}},
      div({style:{background:"var(--bg)",minHeight:"100vh",paddingBottom:60}},
        div({style:{background:"var(--bg2)",borderBottom:"1px solid var(--br)",padding:"13px 16px",
          display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0}},
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)"}},"🤝 Ödünç Ver"),
          btn({className:"xbtn",onClick:()=>{setOduncFrm(false);setOduncUrun([]);}},"✕")
        ),
        div({style:{padding:16,maxWidth:500,margin:"0 auto"}},
          div({style:{marginBottom:10}},lbl({className:"fl"},"Komşu *"),
            div({style:{display:"flex",gap:8}},
              sel({className:"fi",style:{flex:1},value:oduncKomsu,onChange:e=>setOduncKomsu(e.target.value)},
                opt("","Komşu seç..."),
                komsular.map(k=>opt(k.id,k.ad))
              ),
              btn({style:{padding:"0 12px",borderRadius:9,border:"1px solid rgba(37,99,168,.3)",
                background:"rgba(37,99,168,.08)",color:"var(--g)",fontSize:14,cursor:"pointer",height:44},
                onClick:()=>setKomsuFrm({ad:"",tel:"",adres:""})},"+ Yeni")
            )
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
            div(null,lbl({className:"fl"},"Tarih"),
              h("input",{type:"date",className:"fi",value:oduncTarih,onChange:e=>setOduncTarih(e.target.value)})),
            div(null,lbl({className:"fl"},"Not"),
              inp({className:"fi",placeholder:"Açıklama...",value:oduncNot,onChange:e=>setOduncNot(e.target.value)}))
          ),
          // Ürün arama
          div({style:{marginBottom:10,position:"relative"}},
            lbl({className:"fl"},"Ürün Ekle"),
            inp({className:"fi",placeholder:"Ürün adı veya barkod...",
              value:oduncArama,onChange:e=>setOduncArama(e.target.value)}),
            oduncAramaSon.length>0&&div({style:{position:"absolute",top:"100%",left:0,right:0,
              background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:9,
              zIndex:10,maxHeight:200,overflowY:"auto",marginTop:4}},
              oduncAramaSon.map(u=>{
                const stok = (stokPartiler||[]).filter(p=>p.barkod===u.b).reduce((s,p)=>s+p.kalan,0);
                return div({key:u.b,style:{padding:"9px 12px",cursor:"pointer",
                  borderBottom:"1px solid var(--br)",display:"flex",gap:9,alignItems:"center"},
                  onClick:()=>{
                    setOduncUrun(p=>{
                      const var_=p.find(x=>x.barkod===u.b);
                      if(var_) return p.map(x=>x.barkod===u.b?{...x,miktar:x.miktar+1}:x);
                      return [...p,{barkod:u.b,urunAd:u.a,marka:u.m,miktar:1}];
                    });
                    setOduncArama(""); setOduncAramaSon([]);
                  }},
                  div({style:{flex:1}},
                    div({style:{fontSize:14,color:"var(--tx)"}},(u.a)),
                    div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},u.m+" · Stok: "+stok+" adet")
                  ),
                  div({style:{fontSize:13,color:"var(--g)"}},"+ Ekle")
                );
              })
            )
          ),
          // Eklenen ürünler
          oduncUrun.length>0&&div({style:{marginBottom:14}},
            oduncUrun.map((u,i)=>{
              const stokKalan=(stokPartiler||[]).filter(p=>p.barkod===u.barkod).reduce((s,p)=>s+p.kalan,0);
              return div({key:u.barkod,style:{display:"flex",alignItems:"center",gap:8,
                padding:"8px 0",borderBottom:"1px solid var(--br)"}},
                div({style:{flex:1}},
                  div({style:{fontSize:14,color:"var(--tx)"}},(u.urunAd)),
                  div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},
                    u.marka+" · Stokta: "+stokKalan+" adet")
                ),
                div({style:{display:"flex",gap:6,alignItems:"center",flexShrink:0}},
                  div({style:{fontSize:12,color:"var(--mu)"}},"Adet:"),
                  h("input",{type:"number",min:1,max:stokKalan,value:u.miktar,
                    style:{width:48,background:"var(--bg)",border:"1px solid "+(u.miktar>stokKalan?"#c05050":"var(--br)"),
                      borderRadius:6,color:u.miktar>stokKalan?"#c05050":"var(--tx)",
                      fontSize:15,padding:"3px 5px",textAlign:"center",outline:"none"},
                    onChange:e=>setOduncUrun(p=>p.map((x,j)=>j===i?{...x,miktar:parseInt(e.target.value)||1}:x))}),
                  btn({style:{background:"transparent",border:"none",color:"#c05050",fontSize:16,cursor:"pointer"},
                    onClick:()=>setOduncUrun(p=>p.filter((_,j)=>j!==i))},"✕")
                )
              );
            })
          ),
          oduncUrun.length>0&&div({className:"btn-r"},
            btn({className:"btn-i",onClick:()=>{setOduncFrm(false);setOduncUrun([]);}},"İptal"),
            btn({className:"btn-k",
              disabled:!oduncKomsu||oduncUrun.some(u=>{
                const st=(stokPartiler||[]).filter(p=>p.barkod===u.barkod).reduce((s,p)=>s+p.kalan,0);
                return u.miktar>st;
              }),
              onClick:oduncKaydet},"🤝 Ödünç Ver")
          )
        )
      )
    ),

    // Alt sekme barı
    div({style:{display:"flex",gap:0,borderBottom:"1px solid var(--br)",marginBottom:14}},
      [
        ["aktif","📋 Aktif"+(aktifOduncler.length>0?" ("+aktifOduncler.length+")":"")],
        ["gecmis","✅ Geri Alınanlar"],
        ["komsular","👥 Komşular"],
      ].map(([id,lb])=>
        div({key:id,style:{padding:"8px 14px",cursor:"pointer",fontSize:12,
          letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,
          color:sekme===id?"var(--g)":"var(--mu)",
          borderBottom:"2px solid "+(sekme===id?"var(--g)":"transparent"),transition:"all .2s"},
          onClick:()=>setSekme(id)},lb)
      )
    ),

    // ── AKTİF ÖDÜNÇLER ──
    sekme==="aktif"&&div(null,
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div(null,
          div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Dışarıdaki Ürünler"),
          geciken.length>0&&div({style:{fontSize:12,color:"#e06060",marginTop:3}},
            "⚠ "+geciken.length+" adet 7+ gündür geri alınmadı")
        ),
        btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
          borderRadius:9,color:"var(--g)",fontSize:14,padding:"8px 13px",cursor:"pointer"},
          onClick:()=>setOduncFrm(true)},"+ Ödünç Ver")
      ),
      aktifOduncler.length===0
        ?div({className:"bos"},
            div({style:{fontSize:38,marginBottom:8}},"🤝"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Dışarıda ürün yok"),
            div({style:{fontSize:12,color:"var(--di)",marginTop:6}},"Tüm ürünler stokta")
          )
        :(()=>{
            // Komşuya göre grupla
            const gruplar = {};
            aktifOduncler.forEach(o=>{
              if(!gruplar[o.komsuId]) gruplar[o.komsuId]={komsuAd:o.komsuAd,oduncler:[]};
              gruplar[o.komsuId].oduncler.push(o);
            });
            return div(null,
              Object.entries(gruplar).map(([kId,g])=>{
                const gunler = Math.floor((new Date()-new Date(g.oduncler[0].tarih))/(1000*60*60*24));
                return div({key:kId,style:{background:"var(--bg2)",
                  border:"1px solid "+(gunler>=7?"rgba(224,96,96,.3)":"var(--br)"),
                  borderRadius:12,padding:14,marginBottom:10}},
                  div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                    div(null,
                      div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},(g.komsuAd)),
                      div({style:{fontSize:12,color:gunler>=7?"#e06060":"var(--mu)",marginTop:2}},
                        gunler+" gündür dışarıda"+(gunler>=7?" ⚠":""))
                    ),
                    div({style:{fontSize:13,color:"var(--mu)"}},fmtT(g.oduncler[0].tarih))
                  ),
                  g.oduncler.map(od=>
                    div({key:od.id,style:{display:"flex",alignItems:"center",gap:8,
                      padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}},
                      div({style:{flex:1}},
                        div({style:{fontSize:14,color:"var(--tx)"}},(od.urunAd)),
                        od.notlar&&div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},od.notlar)
                      ),
                      div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,
                        color:"var(--g)",fontWeight:600,marginRight:8}},od.miktar+" adet"),
                      btn({style:{padding:"6px 12px",borderRadius:8,
                        background:"rgba(50,140,100,.1)",border:"1px solid rgba(50,140,100,.25)",
                        color:"var(--gr)",fontSize:13,cursor:"pointer"},
                        onClick:()=>geriAl(od)},"✓ Geri Alındı")
                    )
                  )
                );
              })
            );
          })()
    ),

    // ── GEÇMİŞ ──
    sekme==="gecmis"&&div(null,
      gecmisOduncler.length===0
        ?div({className:"bos"},
            div({style:{fontSize:36,marginBottom:8}},"✅"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Geri alınan ürün yok")
          )
        :gecmisOduncler.sort((a,b)=>b.geriAlindiTarih.localeCompare(a.geriAlindiTarih)).map(od=>
            div({key:od.id,style:{display:"flex",alignItems:"center",gap:10,

            )

    // ── KOMŞULAR ──
    sekme==="komsular"&&div(null,

        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Komşu Listesi"),

              borderRadius:12,padding:13,marginBottom:8}},

                  kOduncler.length>0&&div({style:{fontSize:13,color:"#f0a060",
                    padding:"3px 9px",borderRadius:8,
                    background:"rgba(240,160,60,.1)",border:"1px solid rgba(240,160,60,.25)"}},
                    kOduncler.reduce((s,o)=>s+o.miktar,0)+" adet dışarıda"),
                  div({style:{display:"flex",gap:5}},

// ── ÖDÜNÇ MODÜLÜ ──────────────────────────────────────────────────────────
function OduncModul({oduncler,setOduncler,komsular,setKomsular,stokPartiler,setStokPartiler,showToast}) {
  const [sekme, setSekme] = React.useState("aktif"); // aktif | gecmis | komsular
  const [komsuFrm, setKomsuFrm] = React.useState(null);
  const [oduncFrm, setOduncFrm] = React.useState(false);
  const [oduncArama, setOduncArama] = React.useState("");
  const [oduncAramaSon, setOduncAramaSon] = React.useState([]);
  const [oduncUrun, setOduncUrun] = React.useState([]);
  const [oduncKomsu, setOduncKomsu] = React.useState("");
  const [oduncTarih, setOduncTarih] = React.useState(TODAY());
  const [oduncNot, setOduncNot] = React.useState("");

  React.useEffect(()=>{
    if(oduncArama.length < 2){ setOduncAramaSon([]); return; }
    const q = normText(oduncArama);
    setOduncAramaSon(URUN_DB.filter(u=>normText(u.a).includes(q)||u.b.includes(oduncArama)).slice(0,6));
  },[oduncArama]);

  const aktifOduncler = oduncler.filter(o=>!o.geriAlindi);
  const gecmisOduncler = oduncler.filter(o=>o.geriAlindi);

  // Geciken ödünçler (7+ gün)
  const geciken = aktifOduncler.filter(o=>{
    const fark = Math.floor((new Date()-new Date(o.tarih))/(1000*60*60*24));
    return fark >= 7;
  });

  const oduncKaydet = () => {
    if(!oduncKomsu){ showToast("Komşu seçin","uy"); return; }
    if(!oduncUrun.length){ showToast("Ürün ekleyin","uy"); return; }
    const komsu = komsular.find(k=>k.id===oduncKomsu);
    const yeniOduncler = oduncUrun.map(u=>({
      id:uid(), komsuId:oduncKomsu, komsuAd:komsu?.ad||"",
      barkod:u.barkod, urunAd:u.urunAd, marka:u.marka||"",
      miktar:parseInt(u.miktar)||1, tarih:oduncTarih,
      notlar:oduncNot, geriAlindi:false, geriAlindiTarih:""
    }));
    setOduncler(p=>[...p,...yeniOduncler]);
    // Stoktan düş
    yeniOduncler.forEach(od=>{
      let kalan = od.miktar;
      setStokPartiler(p=>{
        const yeni=[...p];
        for(let i=0;i<yeni.length&&kalan>0;i++){
          if(yeni[i].barkod===od.barkod&&yeni[i].kalan>0){
            const dusen=Math.min(yeni[i].kalan,kalan);
            yeni[i]={...yeni[i],kalan:yeni[i].kalan-dusen};
            kalan-=dusen;
          }
        }
        return yeni;
      });
    });
    setOduncUrun([]); setOduncKomsu(""); setOduncNot(""); setOduncFrm(false);
    showToast("Ödünç kaydedildi, stoktan düşüldü");
  };

  const geriAl = (od) => {
    setOduncler(p=>p.map(x=>x.id===od.id?{...x,geriAlindi:true,geriAlindiTarih:TODAY()}:x));
    // Stoka geri ekle
    setStokPartiler(p=>[...p,{
      id:uid(), barkod:od.barkod, urunAd:od.urunAd, marka:od.marka,
      adet:od.miktar, kalan:od.miktar, alisF:0,
      tarih:TODAY(), faturaN:"Ödünç İadesi - "+od.komsuAd, tip:"oduncIade"
    }]);
    showToast("Stoka geri eklendi ✓");
  };

  return div(null,

    // Komşu formu
    komsuFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:18}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:16,
        padding:20,maxWidth:360,width:"100%"}},
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",marginBottom:14}},
          komsuFrm.id?"Komşu Düzenle":"Yeni Komşu"),
        div({style:{marginBottom:10}},lbl({className:"fl"},"İşletme Adı *"),
          inp({className:"fi",placeholder:"Ahmet Berber",value:komsuFrm.ad||"",
            onChange:e=>setKomsuFrm(p=>({...p,ad:e.target.value}))})),
        div({style:{marginBottom:10}},lbl({className:"fl"},"Telefon"),
          inp({className:"fi",placeholder:"05xx...",value:komsuFrm.tel||"",
            onChange:e=>setKomsuFrm(p=>({...p,tel:e.target.value}))})),
        div({style:{marginBottom:14}},lbl({className:"fl"},"Adres / Not"),
          inp({className:"fi",placeholder:"Konum veya not...",value:komsuFrm.adres||"",
            onChange:e=>setKomsuFrm(p=>({...p,adres:e.target.value}))})),
        div({className:"btn-r"},
          btn({className:"btn-i",onClick:()=>setKomsuFrm(null)},"İptal"),
          btn({className:"btn-k",disabled:!(komsuFrm.ad||"").trim(),
            onClick:()=>{
              const k={...komsuFrm,id:komsuFrm.id||uid()};
              setKomsular(p=>komsuFrm.id?p.map(x=>x.id===k.id?k:x):[...p,k]);
              setKomsuFrm(null); showToast("Komşu kaydedildi");
            }},"Kaydet")
        )
      )
    ),

    // Ödünç ver formu
    oduncFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,overflow:"auto"}},
      div({style:{background:"var(--bg)",minHeight:"100vh",paddingBottom:60}},
        div({style:{background:"var(--bg2)",borderBottom:"1px solid var(--br)",padding:"13px 16px",
          display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0}},
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)"}},"🤝 Ödünç Ver"),
          btn({className:"xbtn",onClick:()=>{setOduncFrm(false);setOduncUrun([]);}},"✕")
        ),
        div({style:{padding:16,maxWidth:500,margin:"0 auto"}},
          div({style:{marginBottom:10}},lbl({className:"fl"},"Komşu *"),
            div({style:{display:"flex",gap:8}},
              sel({className:"fi",style:{flex:1},value:oduncKomsu,onChange:e=>setOduncKomsu(e.target.value)},
                opt("","Komşu seç..."),
                komsular.map(k=>opt(k.id,k.ad))
              ),
              btn({style:{padding:"0 12px",borderRadius:9,border:"1px solid rgba(37,99,168,.3)",
                background:"rgba(37,99,168,.08)",color:"var(--g)",fontSize:14,cursor:"pointer",height:44},
                onClick:()=>setKomsuFrm({ad:"",tel:"",adres:""})},"+ Yeni")
            )
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
            div(null,lbl({className:"fl"},"Tarih"),
              h("input",{type:"date",className:"fi",value:oduncTarih,onChange:e=>setOduncTarih(e.target.value)})),
            div(null,lbl({className:"fl"},"Not"),
              inp({className:"fi",placeholder:"Açıklama...",value:oduncNot,onChange:e=>setOduncNot(e.target.value)}))
          ),
          // Ürün arama
          div({style:{marginBottom:10,position:"relative"}},
            lbl({className:"fl"},"Ürün Ekle"),
            inp({className:"fi",placeholder:"Ürün adı veya barkod...",
              value:oduncArama,onChange:e=>setOduncArama(e.target.value)}),
            oduncAramaSon.length>0&&div({style:{position:"absolute",top:"100%",left:0,right:0,
              background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:9,
              zIndex:10,maxHeight:200,overflowY:"auto",marginTop:4}},
              oduncAramaSon.map(u=>{
                const stok = (stokPartiler||[]).filter(p=>p.barkod===u.b).reduce((s,p)=>s+p.kalan,0);
                return div({key:u.b,style:{padding:"9px 12px",cursor:"pointer",
                  borderBottom:"1px solid var(--br)",display:"flex",gap:9,alignItems:"center"},
                  onClick:()=>{
                    setOduncUrun(p=>{
                      const var_=p.find(x=>x.barkod===u.b);
                      if(var_) return p.map(x=>x.barkod===u.b?{...x,miktar:x.miktar+1}:x);
                      return [...p,{barkod:u.b,urunAd:u.a,marka:u.m,miktar:1}];
                    });
                    setOduncArama(""); setOduncAramaSon([]);
                  }},
                  div({style:{flex:1}},
                    div({style:{fontSize:14,color:"var(--tx)"}},(u.a)),
                    div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},u.m+" · Stok: "+stok+" adet")
                  ),
                  div({style:{fontSize:13,color:"var(--g)"}},"+ Ekle")
                );
              })
            )
          ),
          // Eklenen ürünler
          oduncUrun.length>0&&div({style:{marginBottom:14}},
            oduncUrun.map((u,i)=>{
              const stokKalan=(stokPartiler||[]).filter(p=>p.barkod===u.barkod).reduce((s,p)=>s+p.kalan,0);
              return div({key:u.barkod,style:{display:"flex",alignItems:"center",gap:8,
                padding:"8px 0",borderBottom:"1px solid var(--br)"}},
                div({style:{flex:1}},
                  div({style:{fontSize:14,color:"var(--tx)"}},(u.urunAd)),
                  div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},
                    u.marka+" · Stokta: "+stokKalan+" adet")
                ),
                div({style:{display:"flex",gap:6,alignItems:"center",flexShrink:0}},
                  div({style:{fontSize:12,color:"var(--mu)"}},"Adet:"),
                  h("input",{type:"number",min:1,max:stokKalan,value:u.miktar,
                    style:{width:48,background:"var(--bg)",border:"1px solid "+(u.miktar>stokKalan?"#c05050":"var(--br)"),
                      borderRadius:6,color:u.miktar>stokKalan?"#c05050":"var(--tx)",
                      fontSize:15,padding:"3px 5px",textAlign:"center",outline:"none"},
                    onChange:e=>setOduncUrun(p=>p.map((x,j)=>j===i?{...x,miktar:parseInt(e.target.value)||1}:x))}),
                  btn({style:{background:"transparent",border:"none",color:"#c05050",fontSize:16,cursor:"pointer"},
                    onClick:()=>setOduncUrun(p=>p.filter((_,j)=>j!==i))},"✕")
                )
              );
            })
          ),
          oduncUrun.length>0&&div({className:"btn-r"},
            btn({className:"btn-i",onClick:()=>{setOduncFrm(false);setOduncUrun([]);}},"İptal"),
            btn({className:"btn-k",
              disabled:!oduncKomsu||oduncUrun.some(u=>{
                const st=(stokPartiler||[]).filter(p=>p.barkod===u.barkod).reduce((s,p)=>s+p.kalan,0);
                return u.miktar>st;
              }),
              onClick:oduncKaydet},"🤝 Ödünç Ver")
          )
        )
      )
    ),

    // Alt sekme barı
    div({style:{display:"flex",gap:0,borderBottom:"1px solid var(--br)",marginBottom:14}},
      [
        ["aktif","📋 Aktif"+(aktifOduncler.length>0?" ("+aktifOduncler.length+")":"")],
        ["gecmis","✅ Geri Alınanlar"],
        ["komsular","👥 Komşular"],
      ].map(([id,lb])=>
        div({key:id,style:{padding:"8px 14px",cursor:"pointer",fontSize:12,
          letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,
          color:sekme===id?"var(--g)":"var(--mu)",
          borderBottom:"2px solid "+(sekme===id?"var(--g)":"transparent"),transition:"all .2s"},
          onClick:()=>setSekme(id)},lb)
      )
    ),

    // ── AKTİF ÖDÜNÇLER ──
    sekme==="aktif"&&div(null,
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div(null,
          div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Dışarıdaki Ürünler"),
          geciken.length>0&&div({style:{fontSize:12,color:"#e06060",marginTop:3}},
            "⚠ "+geciken.length+" adet 7+ gündür geri alınmadı")
        ),
        btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
          borderRadius:9,color:"var(--g)",fontSize:14,padding:"8px 13px",cursor:"pointer"},
          onClick:()=>setOduncFrm(true)},"+ Ödünç Ver")
      ),
      aktifOduncler.length===0
        ?div({className:"bos"},
            div({style:{fontSize:38,marginBottom:8}},"🤝"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Dışarıda ürün yok"),
            div({style:{fontSize:12,color:"var(--di)",marginTop:6}},"Tüm ürünler stokta")
          )
        :(()=>{
            // Komşuya göre grupla
            const gruplar = {};
            aktifOduncler.forEach(o=>{
              if(!gruplar[o.komsuId]) gruplar[o.komsuId]={komsuAd:o.komsuAd,oduncler:[]};
              gruplar[o.komsuId].oduncler.push(o);
            });
            return div(null,
              Object.entries(gruplar).map(([kId,g])=>{
                const gunler = Math.floor((new Date()-new Date(g.oduncler[0].tarih))/(1000*60*60*24));
                return div({key:kId,style:{background:"var(--bg2)",
                  border:"1px solid "+(gunler>=7?"rgba(224,96,96,.3)":"var(--br)"),
                  borderRadius:12,padding:14,marginBottom:10}},
                  div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                    div(null,
                      div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},(g.komsuAd)),
                      div({style:{fontSize:12,color:gunler>=7?"#e06060":"var(--mu)",marginTop:2}},
                        gunler+" gündür dışarıda"+(gunler>=7?" ⚠":""))
                    ),
                    div({style:{fontSize:13,color:"var(--mu)"}},fmtT(g.oduncler[0].tarih))
                  ),
                  g.oduncler.map(od=>
                    div({key:od.id,style:{display:"flex",alignItems:"center",gap:8,
                      padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}},
                      div({style:{flex:1}},
                        div({style:{fontSize:14,color:"var(--tx)"}},(od.urunAd)),
                        od.notlar&&div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},od.notlar)
                      ),
                      div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,
                        color:"var(--g)",fontWeight:600,marginRight:8}},od.miktar+" adet"),
                      btn({style:{padding:"6px 12px",borderRadius:8,
                        background:"rgba(50,140,100,.1)",border:"1px solid rgba(50,140,100,.25)",
                        color:"var(--gr)",fontSize:13,cursor:"pointer"},
                        onClick:()=>geriAl(od)},"✓ Geri Alındı")
                    )
                  )
                );
              })
            );
          })()
    ),

    // ── GEÇMİŞ ──
    sekme==="gecmis"&&div(null,
      gecmisOduncler.length===0
        ?div({className:"bos"},
            div({style:{fontSize:36,marginBottom:8}},"✅"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Geri alınan ürün yok")
          )
        :gecmisOduncler.sort((a,b)=>b.geriAlindiTarih.localeCompare(a.geriAlindiTarih)).map(od=>
            div({key:od.id,style:{display:"flex",alignItems:"center",gap:10,
              padding:"10px 12px",background:"var(--bg2)",borderRadius:10,
              marginBottom:7,opacity:.7}},
              div({style:{flex:1}},
                div({style:{fontSize:14,color:"var(--tx)"}},(od.urunAd)+" · "+od.komsuAd),
                div({style:{fontSize:12,color:"var(--mu)",marginTop:1}},
                  "Verildi: "+fmtT(od.tarih)+" · Geri: "+fmtT(od.geriAlindiTarih))
              ),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,
                color:"var(--gr)"}},od.miktar+" adet ✓")
            )
          )
    ),

    // ── KOMŞULAR ──
    sekme==="komsular"&&div(null,
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Komşu Listesi"),
        btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
          borderRadius:9,color:"var(--g)",fontSize:14,padding:"8px 13px",cursor:"pointer"},
          onClick:()=>setKomsuFrm({ad:"",tel:"",adres:""})},"+ Yeni Komşu")
      ),
      komsular.length===0
        ?div({className:"bos"},
            div({style:{fontSize:36,marginBottom:8}},"👥"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Komşu eklenmedi")
          )
        :komsular.map(k=>{
            const kOduncler=aktifOduncler.filter(o=>o.komsuId===k.id);
            return div({key:k.id,style:{background:"var(--bg2)",border:"1px solid var(--br)",
              borderRadius:12,padding:13,marginBottom:8}},
              div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                div(null,
                  div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},(k.ad)),
                  k.tel&&div({style:{fontSize:13,color:"var(--mu)",marginTop:2}},"📞 "+k.tel),
                  k.adres&&div({style:{fontSize:12,color:"var(--di)",marginTop:1}},(k.adres))
                ),
                div({style:{display:"flex",gap:8,alignItems:"center"}},
                  kOduncler.length>0&&div({style:{fontSize:13,color:"#f0a060",
                    padding:"3px 9px",borderRadius:8,
                    background:"rgba(240,160,60,.1)",border:"1px solid rgba(240,160,60,.25)"}},
                    kOduncler.reduce((s,o)=>s+o.miktar,0)+" adet dışarıda"),
                  div({style:{display:"flex",gap:5}},
                    k.tel&&btn({style:{background:"rgba(37,211,102,.1)",border:"1px solid rgba(37,211,102,.25)",
                      borderRadius:7,color:"#25d366",fontSize:15,padding:"6px 9px",cursor:"pointer"},
                      onClick:()=>{
                        const raw=k.tel.replace(/[^0-9]/g,"");
                        const fmt2=raw.startsWith("90")?raw:raw.startsWith("0")?"90"+raw.slice(1):"90"+raw;
                        window.open("https://wa.me/"+fmt2,"_blank");
                      }},""),
                    btn({style:{background:"transparent",border:"1px solid var(--br)",
                      borderRadius:7,color:"var(--mu)",fontSize:13,padding:"5px 9px",cursor:"pointer"},
                      onClick:()=>setKomsuFrm({...k})},"✏"),
                    btn({style:{background:"transparent",border:"1px solid #3a1010",
                      borderRadius:7,color:"#c05050",fontSize:13,padding:"5px 9px",cursor:"pointer"},
                      onClick:()=>setKomsular(p=>p.filter(x=>x.id!==k.id))},"🗑")
                  )
                )
              )
            );
          })
    )
  );
}


// ── GELİR/GİDER MODÜLÜ ─────────────────────────────────────────────────────
function GelirGiderModul({tumK, personeller, giderler, setGiderler, avanslar, setAvanslar, ibanBildirimler, showToast, aktifSekme}) {
  const [sekmeLocal, setSekmeLocal] = React.useState("ozet");
  const sekme = aktifSekme || sekmeLocal;
  const setSekme = aktifSekme ? (()=>{}) : setSekmeLocal;
  const [secAy, setSecAy] = React.useState(new Date().toISOString().slice(0,7));
  const [giderFrm, setGiderFrm] = React.useState(null);
  const GID_KATEGORILER = ["Kira","Elektrik","Su","Doğalgaz","Maaş","SGK/Sigorta","Malzeme","Temizlik","Vergi","Avans Ödemesi","Diğer"];

  // Seçilen ay kayıtları
  const ayKayitlar = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)&&r.gonderildi!==false);
  const ayGiderler = (giderler||[]).filter(g=>g.tarih?.startsWith(secAy));
  const ayAvanslar = (avanslar||[]).filter(a=>a.durum==="onaylandi"&&a.tarih?.startsWith(secAy));

  // Personel bazlı gelir
  const pGelir = {};
  (personeller||[]).filter(p=>p.rol==="personel"&&p.aktif).forEach(p=>{
    const pk = ayKayitlar.filter(r=>r.staffId===p.id);
    pGelir[p.id] = {
      ad:p.ad,
      hizGelir: pk.reduce((s,r)=>s+(r.hizKK||0)+(r.hizIB||0)+(r.hizNK||0),0),
      urunGelir: pk.reduce((s,r)=>s+(r.uKK||0)+(r.uIB||0)+(r.uNK||0),0),
      kayitSay: pk.length,
      kkToplam: pk.reduce((s,r)=>s+(r.hizKK||0)+(r.uKK||0),0),
      ibToplam: pk.reduce((s,r)=>s+(r.hizIB||0)+(r.uIB||0),0),
      nkToplam: pk.reduce((s,r)=>s+(r.hizNK||0)+(r.uNK||0),0),
    };
    pGelir[p.id].toplam = pGelir[p.id].hizGelir + pGelir[p.id].urunGelir;
  });

  const topGelir = Object.values(pGelir).reduce((s,p)=>s+p.toplam,0);
  const topGider = ayGiderler.reduce((s,g)=>s+toN(g.tutar),0);
  const topAvans = ayAvanslar.reduce((s,a)=>s+toN(a.tutar),0);
  const netKar = topGelir - topGider;

  // Ay seçici
  const aylar = [];
  for(let i=0;i<12;i++){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    aylar.push(d.toISOString().slice(0,7));
  }

  return div(null,

    // Gider formu
    giderFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:18,overflowY:"auto"}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:16,
        padding:20,maxWidth:400,width:"100%",margin:"auto"}},
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",marginBottom:14}},
          giderFrm.id?"Gider Düzenle":"Yeni Gider Ekle"),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
          div(null,lbl({className:"fl"},"Tarih *"),
            h("input",{type:"date",className:"fi",value:giderFrm.tarih||"",
              onChange:e=>setGiderFrm(p=>({...p,tarih:e.target.value}))})),
          div(null,lbl({className:"fl"},"Tutar (₺) *"),
            inp({className:"fi",type:"number",placeholder:"0",value:giderFrm.tutar||"",
              onChange:e=>setGiderFrm(p=>({...p,tutar:e.target.value}))}))
        ),
        div({style:{marginBottom:10}},lbl({className:"fl"},"Kategori *"),
          sel({className:"fi",value:giderFrm.kategori||"",
            onChange:e=>setGiderFrm(p=>({...p,kategori:e.target.value}))},
            opt("","Seçin..."),
            GID_KATEGORILER.map(k=>opt(k,k))
          )
        ),
        div({style:{marginBottom:14}},lbl({className:"fl"},"Açıklama"),
          inp({className:"fi",placeholder:"Detay...",value:giderFrm.aciklama||"",
            onChange:e=>setGiderFrm(p=>({...p,aciklama:e.target.value}))})),
        div({className:"btn-r"},
          btn({className:"btn-i",onClick:()=>setGiderFrm(null)},"İptal"),
          btn({className:"btn-k",
            disabled:!giderFrm.tarih||!giderFrm.tutar||!giderFrm.kategori,
            onClick:()=>{
              const g={...giderFrm,id:giderFrm.id||uid(),tutar:toN(giderFrm.tutar)};
              setGiderler(p=>giderFrm.id?p.map(x=>x.id===g.id?g:x):[...p,g]);
              setGiderFrm(null);
              showToast("Gider kaydedildi");
            }},"Kaydet")
        )
      )
    ),

    // Üst kontroller
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      sel({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:9,
        color:"var(--g)",fontSize:14,padding:"7px 12px",outline:"none",cursor:"pointer"},
        value:secAy,onChange:e=>setSecAy(e.target.value)},
        aylar.map(a=>opt(a, new Date(a+"-01").toLocaleDateString("tr-TR",{month:"long",year:"numeric"})))
      )
    ),

    // Alt sekmeler - dışarıdan kontrol edilmiyorsa göster
    !aktifSekme&&div({style:{display:"flex",gap:0,borderBottom:"1px solid var(--br)",marginBottom:14}},
      [["ozet","📊 Özet"],["gelir","💚 Gelir"],["gider","🔴 Gider"],["avans","💵 Avans"]].map(([id,lb])=>
        div({key:id,style:{padding:"8px 14px",cursor:"pointer",fontSize:12,
          letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,
          color:sekme===id?"var(--g)":"var(--mu)",
          borderBottom:"2px solid "+(sekme===id?"var(--g)":"transparent"),transition:"all .2s"},
          onClick:()=>setSekme(id)},lb)
      )
    ),

    // ── ÖZET ──
    sekme==="ozet"&&div(null,
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}},
        [
          {lb:"Toplam Gelir",  v:fmt(topGelir),  ic:"💚",c:"var(--gr)"},
          {lb:"Toplam Gider",  v:fmt(topGider),  ic:"🔴",c:"#e06060"},
          {lb:"Net Kar",       v:fmt(netKar),     ic:"✨",c:netKar>=0?"var(--gr)":"#c05050"},
          {lb:"Avans Ödemeleri",v:fmt(topAvans),  ic:"💵",c:"#f0a060"},
        ].map(({lb,v,ic,c})=>
          div({key:lb,style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:13}},
            div({style:{fontSize:18,marginBottom:5}},ic),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:c,fontWeight:700}},v),
            div({style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginTop:2}},lb)
          )
        )
      ),
      // Gelir vs Gider bar
      topGelir>0&&div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
        borderRadius:12,padding:14,marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10,marginTop:4}},
          "Gelir / Gider Oranı"),
        div({style:{height:10,borderRadius:5,background:"rgba(160,40,40,.3)",overflow:"hidden",marginBottom:6}},
          div({style:{height:"100%",borderRadius:5,background:"var(--gr)",
            width:Math.min(100,Math.round(topGelir/(topGelir+topGider)*100))+"%",transition:"width .5s"}})
        ),
        div({style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--mu)"}},
          h("span",null,"Gelir: "+fmt(topGelir)),
          h("span",null,"Gider: "+fmt(topGider))
        )
      ),
      // Personel özet
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
          "Personel Gelirleri"),
        Object.values(pGelir).sort((a,b)=>b.toplam-a.toplam).map(p=>
          div({key:p.ad,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 0",borderBottom:"1px solid var(--br)"}},
            div({style:{fontSize:14,color:"var(--tx)"}},(p.ad)),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:700}},fmt(p.toplam))
          )
        )
      )
    ),

    // ── GELİR ──
    sekme==="gelir"&&div(null,
      div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
        "Personel Bazlı Gelir Detayı"),
      Object.values(pGelir).sort((a,b)=>b.toplam-a.toplam).map(p=>
        div({key:p.ad,style:{background:"var(--bg2)",border:"1px solid var(--br)",
          borderRadius:12,padding:14,marginBottom:10}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
            div(null,
              div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},(p.ad)),
              div({style:{fontSize:12,color:"var(--mu)",marginTop:2}},p.kayitSay+" kayıt")
            ),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--g)",fontWeight:700}},
              fmt(p.toplam))
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
            [
              ["✂ Hizmet Geliri",p.hizGelir,"var(--gr)"],
              ["📦 Ürün Geliri",p.urunGelir,"var(--bl)"],
            ].map(([lb,v,c])=>
              div({key:lb,style:{background:"var(--bg3)",borderRadius:8,padding:"9px 10px"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:c,fontWeight:600}},fmt(v)),
                div({style:{fontSize:11,color:"var(--mu)",marginTop:1,textTransform:"uppercase",letterSpacing:1}},lb)
              )
            )
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}},
            [["💳 K.Kartı",p.kkToplam],["🏦 IBAN",p.ibToplam],["💵 Nakit",p.nkToplam]].map(([lb,v])=>
              div({key:lb,style:{background:"var(--bg3)",borderRadius:7,padding:"6px 8px",textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(v)),
                div({style:{fontSize:10,color:"var(--mu)",marginTop:1,textTransform:"uppercase"}},lb)
              )
            )
          )
        )
      ),
      // İşletme toplam
      div({style:{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",
        border:"1.5px solid rgba(37,99,168,.3)",borderRadius:12,padding:14,marginTop:4}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10,marginTop:4}},
          "İşletme Toplam Geliri"),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
          [
            ["Hizmet",Object.values(pGelir).reduce((s,p)=>s+p.hizGelir,0),"var(--gr)"],
            ["Ürün",Object.values(pGelir).reduce((s,p)=>s+p.urunGelir,0),"var(--bl)"],
            ["Toplam",topGelir,"var(--g)"],
          ].map(([lb,v,c])=>
            div({key:lb,style:{background:"var(--bg3)",borderRadius:8,padding:"10px 8px",textAlign:"center"}},
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:17,color:c,fontWeight:700}},fmt(v)),
              div({style:{fontSize:11,color:"var(--mu)",marginTop:2,textTransform:"uppercase",letterSpacing:1}},lb)
            )
          )
        ),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}},
          [
            ["💳 K.Kartı", Object.values(pGelir).reduce((s,p)=>s+p.kkToplam,0)],
            ["🏦 IBAN",    Object.values(pGelir).reduce((s,p)=>s+p.ibToplam,0)],
            ["💵 Nakit",   Object.values(pGelir).reduce((s,p)=>s+p.nkToplam,0)],
          ].map(([lb,v])=>
            div({key:lb,style:{background:"var(--bg3)",borderRadius:7,padding:"6px 8px",textAlign:"center"}},
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(v)),
              div({style:{fontSize:10,color:"var(--mu)",marginTop:1,textTransform:"uppercase"}},lb)
            )
          )
        )
      )
    ),

    // ── GİDER ──
    sekme==="gider"&&div(null,
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div(null,
          div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Giderler"),
          div({style:{fontSize:13,color:"var(--mu)",marginTop:2}},
            ayGiderler.length+" kayıt · "+fmt(topGider))
        ),
        btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
          borderRadius:9,color:"var(--g)",fontSize:14,padding:"8px 13px",cursor:"pointer"},
          onClick:()=>setGiderFrm({tarih:TODAY(),tutar:"",kategori:"",aciklama:""})},"+ Gider Ekle")
      ),
      // Kategori özeti
      ayGiderler.length>0&&(()=>{
        const katOzet = {};
        ayGiderler.forEach(g=>{
          if(!katOzet[g.kategori]) katOzet[g.kategori]=0;
          katOzet[g.kategori]+=toN(g.tutar);
        });
        return div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
          borderRadius:12,padding:12,marginBottom:12}},
          div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:8}},"KATEGORİ DAĞILIMI"),
          Object.entries(katOzet).sort((a,b)=>b[1]-a[1]).map(([kat,tutar])=>
            div({key:kat,style:{display:"flex",justifyContent:"space-between",
              padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}},
              div({style:{fontSize:13,color:"var(--tx)"}},(kat)),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,
                color:"#e06060",fontWeight:600}},fmt(tutar))
            )
          )
        );
      })(),
      // Gider listesi
      ayGiderler.length===0
        ?div({className:"bos"},
            div({style:{fontSize:36,marginBottom:8}},"📋"),
            div({style:{fontSize:13,color:"var(--mu)",letterSpacing:2}},"Bu ay gider girilmedi"),
            btn({style:{marginTop:12,padding:"9px 18px",borderRadius:9,
              background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
              color:"var(--g)",fontSize:14,cursor:"pointer"},
              onClick:()=>setGiderFrm({tarih:TODAY(),tutar:"",kategori:"",aciklama:""})},"+ İlk Gideri Ekle")
          )
        :ayGiderler.sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(g=>
            div({key:g.id,style:{display:"flex",alignItems:"center",gap:10,
              padding:"10px 12px",background:"var(--bg2)",borderRadius:11,
              marginBottom:7,border:"1px solid var(--br)"}},
              div({style:{flex:1}},
                div({style:{display:"flex",alignItems:"center",gap:7,marginBottom:3}},
                  h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:7,
                    background:"rgba(224,96,96,.1)",border:"1px solid rgba(224,96,96,.2)",
                    color:"#e06060"}},g.kategori),
                  div({style:{fontSize:12,color:"var(--mu)"}},fmtT(g.tarih))
                ),
                g.aciklama&&div({style:{fontSize:13,color:"var(--di)"}},(g.aciklama))
              ),
              div({style:{textAlign:"right",flexShrink:0}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,
                  color:"#e06060",fontWeight:700}},fmt(toN(g.tutar))),
                div({style:{display:"flex",gap:5,marginTop:4,justifyContent:"flex-end"}},
                  btn({style:{background:"transparent",border:"1px solid var(--br)",
                    borderRadius:6,color:"var(--mu)",fontSize:12,padding:"3px 8px",cursor:"pointer"},
                    onClick:()=>setGiderFrm({...g})},"✏"),
                  btn({style:{background:"transparent",border:"1px solid #3a1010",
                    borderRadius:6,color:"#c05050",fontSize:12,padding:"3px 8px",cursor:"pointer"},
                    onClick:()=>setGiderler(p=>p.filter(x=>x.id!==g.id))},"🗑")
                )
              )
            )
          )
    ),

    // ── AVANS ──
    sekme==="avans"&&div(null,

      // Personel bazlı IBAN ve Avans özeti
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,
        padding:14,marginBottom:14}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",
          marginBottom:12}},"👤 Personel Bazlı Detay"),
        (personeller||[]).filter(p=>p.rol==="personel"&&p.aktif).map(p=>{
          // IBAN kuralı:
          // - Normal personel: kendi kayıtlarındaki hizIB (hizIbanId kendisi veya boş)
          // - Maniküristten gelen: ibanBildirimler'de onaylananlar
          const normalHizIban = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)
            &&r.staffId===p.id&&(!r.hizIbanId||r.hizIbanId===p.id))
            .reduce((s,r)=>s+(r.hizIB||0),0);
          const onaylananIban = (ibanBildirimler||[]).filter(b=>b.hedefId===p.id
            &&b.durum==="onaylandi"&&b.tarih?.startsWith(secAy))
            .reduce((s,b)=>s+toN(b.tutar),0);
          const pUrunIban = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)&&r.staffId===p.id)
            .reduce((s,r)=>s+(r.uIB||0),0);
          const toplamIban = normalHizIban + onaylananIban + pUrunIban;
          const pIban = toplamIban;
          const manIban = onaylananIban;
          const pAvans = (avanslar||[]).filter(a=>a.staffId===p.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(secAy))
            .reduce((s,a)=>s+toN(a.tutar),0);
          return div({key:p.id,style:{background:"var(--bg3)",borderRadius:10,padding:12,marginBottom:8}},
            div({style:{fontSize:15,color:"var(--tx)",fontWeight:500,marginBottom:8}},(p.ad)),
            div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              div({style:{background:"rgba(37,99,168,.06)",borderRadius:8,padding:"9px 10px"}},
                div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:4}},"🏦 IBAN GELİRİ"),
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"var(--bl)",fontWeight:600}},fmt(toplamIban)),
                pIban>0&&div({style:{fontSize:11,color:"var(--mu)",marginTop:2}},"Hizmet: "+fmt(pIban)),
                (()=>{
              // Maniküristlerin isimlerini bul
              const manKayitlar = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)
                &&r.hizIbanId===p.id&&r.staffId!==p.id);
              const manIsimleri = [...new Set(manKayitlar.map(r=>r.staffAd||"?"))];
              return onaylananIban>0&&div(null,
                manIsimleri.map(ad=>
                  div({key:ad,style:{fontSize:11,color:"var(--bl)",marginTop:1}},
                    ad+": +"+fmt(manKayitlar.filter(r=>(r.staffAd||"?")=== ad)
                      .reduce((s,r)=>s+toN(r.hizIB),0)))
                )
              );
            })()
              ),
              div({style:{background:"rgba(240,160,60,.06)",borderRadius:8,padding:"9px 10px"}},
                div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:4}},"💵 AVANS"),
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,
                  color:pAvans>0?"#f0a060":"var(--mu)",fontWeight:600}},fmt(pAvans)),
                (avanslar||[]).filter(a=>a.staffId===p.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(secAy))
                  .map(a=>div({key:a.id,style:{fontSize:11,color:"var(--di)",marginTop:1}},
                    fmtT(a.tarih)+" · "+fmt(a.tutar)))
              )
            )
          );
        })
      )
    )
  );
}



// ── VERGİ MUHASEBESİ MODÜLÜ ─────────────────────────────────────────────────
// Şahıs şirketi için 2026 kademeli gelir vergisi tarifesi
// Matrah = KDV hariç seçili ciro − KDV hariç giderler
// Gelir vergisi YILLIK beyan edilir, bu yüzden yıllık kümülatif gösteriyoruz
function VergiMuhasebesiModul({tumK, faturalar, giderler}) {
  const [secAy, setSecAy] = React.useState(new Date().toISOString().slice(0,7));
  const [kdvOran, setKdvOran] = React.useState(20);
  const [secimler, setSecimler] = React.useState({kk:true, ib:true, nk:true});

  const oran = Math.max(0, toN(kdvOran)) / 100;
  const kdvIcinden = React.useCallback((brut)=>{
    const n = toN(brut);
    return oran > 0 ? n - (n / (1 + oran)) : 0;
  }, [oran]);

  // 2026 Şahıs Şirketi Gelir Vergisi Tarifesi (kademeli)
  const GV_TARIFE_2026 = [
    {ust: 158000,   oran: 0.15, sabit: 0},
    {ust: 330000,   oran: 0.20, sabit: 23700},      // 158000 × %15
    {ust: 1200000,  oran: 0.27, sabit: 58100},      // 23700 + (330000-158000)×%20
    {ust: 4300000,  oran: 0.35, sabit: 293000},     // 58100 + (1200000-330000)×%27
    {ust: Infinity, oran: 0.40, sabit: 1378000}     // 293000 + (4300000-1200000)×%35
  ];

  // Kademeli gelir vergisi hesaplama
  const hesaplaGV = React.useCallback((matrah)=>{
    const m = Math.max(0, toN(matrah));
    if(m <= 0) return {vergi: 0, dilimler: []};
    let kalan = m;
    let oncekiUst = 0;
    let toplamVergi = 0;
    const dilimler = [];
    for(const dilim of GV_TARIFE_2026) {
      if(kalan <= 0) break;
      const dilimGenisligi = dilim.ust === Infinity ? kalan : Math.min(kalan, dilim.ust - oncekiUst);
      if(dilimGenisligi > 0) {
        const dilimVergi = dilimGenisligi * dilim.oran;
        toplamVergi += dilimVergi;
        dilimler.push({
          alt: oncekiUst,
          ust: dilim.ust === Infinity ? null : Math.min(m, dilim.ust),
          oran: dilim.oran,
          tutar: dilimGenisligi,
          vergi: dilimVergi
        });
        kalan -= dilimGenisligi;
      }
      oncekiUst = dilim.ust;
    }
    return {vergi: toplamVergi, dilimler};
  }, []);

  // Ortalama efektif vergi oranı
  const efektifOran = (vergi, matrah) => {
    const m = toN(matrah);
    return m > 0 ? (toN(vergi) / m) * 100 : 0;
  };

  // ── AYLIK VERİLER ──
  const ayKayitlar = React.useMemo(()=>
    (tumK||[]).filter(r => (r.tarih||"").startsWith(secAy) && r.gonderildi !== false)
  ,[tumK, secAy]);

  const ayGiderler = React.useMemo(()=>
    (giderler||[]).filter(g => (g.tarih||"").startsWith(secAy))
  ,[giderler, secAy]);

  const ayHesap = React.useMemo(()=>{
    const o = {
      kk:{ad:"Kredi Kartı", ikon:"💳", toplam:0, hizmet:0, urun:0},
      ib:{ad:"IBAN", ikon:"🏦", toplam:0, hizmet:0, urun:0},
      nk:{ad:"Nakit", ikon:"💵", toplam:0, hizmet:0, urun:0}
    };
    ayKayitlar.forEach(r=>{
      o.kk.hizmet += toN(r.hizKK); o.kk.urun += toN(r.uKK);
      o.ib.hizmet += toN(r.hizIB); o.ib.urun += toN(r.uIB);
      o.nk.hizmet += toN(r.hizNK); o.nk.urun += toN(r.uNK);
    });
    Object.keys(o).forEach(k=>{
      o[k].toplam = o[k].hizmet + o[k].urun;
      o[k].kdv = kdvIcinden(o[k].toplam);
      o[k].net = o[k].toplam - o[k].kdv;
    });
    const seciliBrut = (secimler.kk?o.kk.toplam:0) + (secimler.ib?o.ib.toplam:0) + (secimler.nk?o.nk.toplam:0);
    const seciliKdv  = (secimler.kk?o.kk.kdv:0)    + (secimler.ib?o.ib.kdv:0)    + (secimler.nk?o.nk.kdv:0);
    const seciliNet  = seciliBrut - seciliKdv;
    const giderBrut = ayGiderler.reduce((s,g)=>s+toN(g.tutar),0);
    const giderKdv  = kdvIcinden(giderBrut);
    const giderNet  = giderBrut - giderKdv;
    const alisFaturalar = (faturalar||[]).filter(f => (f.tarih||"").startsWith(secAy));
    const alisBrut = alisFaturalar.reduce((s,f)=>s+toN(f.tutar),0);
    const alisKdv  = kdvIcinden(alisBrut);
    const odenecekKdv = Math.max(0, seciliKdv - alisKdv);
    // Aylık matrah (KDV hariç ciro − KDV hariç giderler)
    const aylikMatrah = Math.max(0, seciliNet - giderNet);
    const aylikGV = hesaplaGV(aylikMatrah);
    return {odeme:o, seciliBrut, seciliKdv, seciliNet, giderBrut, giderKdv, giderNet,
      alisBrut, alisKdv, odenecekKdv, aylikMatrah, aylikGV};
  }, [ayKayitlar, ayGiderler, faturalar, kdvIcinden, secimler, hesaplaGV]);

  // ── YILLIK KÜMÜLATİF VERİLER (gelir vergisi yıllık beyan edilir) ──
  const secYil = secAy.slice(0,4);
  const yilHesap = React.useMemo(()=>{
    const yilKayit = (tumK||[]).filter(r => (r.tarih||"").startsWith(secYil) && r.gonderildi !== false);
    const yilGider = (giderler||[]).filter(g => (g.tarih||"").startsWith(secYil));
    let brut = 0;
    yilKayit.forEach(r=>{
      if(secimler.kk) brut += toN(r.hizKK) + toN(r.uKK);
      if(secimler.ib) brut += toN(r.hizIB) + toN(r.uIB);
      if(secimler.nk) brut += toN(r.hizNK) + toN(r.uNK);
    });
    const kdv = kdvIcinden(brut);
    const net = brut - kdv;
    const giderBrut = yilGider.reduce((s,g)=>s+toN(g.tutar),0);
    const giderNet = giderBrut - kdvIcinden(giderBrut);
    const matrah = Math.max(0, net - giderNet);
    const gv = hesaplaGV(matrah);
    return {brut, kdv, net, giderBrut, giderNet, matrah, gv};
  }, [tumK, giderler, secYil, kdvIcinden, secimler, hesaplaGV]);

  // SVG ikonlar (personel panelindeki ile aynı)
  const ikKK = h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"},
    h("rect",{x:1,y:4,width:22,height:16,rx:2,ry:2}),
    h("line",{x1:1,y1:10,x2:23,y2:10})
  );
  const ikIB = h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"},
    h("line",{x1:3,y1:22,x2:21,y2:22}),
    h("line",{x1:6,y1:18,x2:6,y2:11}),
    h("line",{x1:10,y1:18,x2:10,y2:11}),
    h("line",{x1:14,y1:18,x2:14,y2:11}),
    h("line",{x1:18,y1:18,x2:18,y2:11}),
    h("polygon",{points:"12 2 20 7 4 7"})
  );
  const ikNK = h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"},
    h("rect",{x:1,y:4,width:22,height:16,rx:2,ry:2}),
    h("circle",{cx:12,cy:12,r:3})
  );
  const KART_IKONLAR = {kk:ikKK, ib:ikIB, nk:ikNK};
  const KART_LABELS  = {kk:"K.K", ib:"IBAN", nk:"Nakit"};

  const Kart = ({id}) => {
    const x   = ayHesap.odeme[id];
    const gv  = hesaplaGV(x.net);
    const ikon = KART_IKONLAR[id];
    const lb   = KART_LABELS[id];
    return div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:13,marginBottom:10}},
      // Başlık — personel panelindeki bolum() stiline benzer
      div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}},
        div({style:{display:"flex",alignItems:"center",gap:10}},
          div({style:{width:34,height:34,borderRadius:9,background:"rgba(0,113,227,.08)",
            display:"flex",alignItems:"center",justifyContent:"center",color:"#0071E3",flexShrink:0}},
            ikon),
          div(null,
            div({style:{fontSize:14,color:"var(--tx)",fontWeight:700,fontFamily:"'Inter',-apple-system,sans-serif"}},lb),
            div({style:{fontSize:11,color:"var(--mu)",marginTop:2,fontFamily:"'Inter',-apple-system,sans-serif"}},
              "Hizmet: "+fmt(x.hizmet)+" · Ürün: "+fmt(x.urun))
          )
        ),
        div({style:{fontSize:15,color:"#0071E3",fontWeight:700,fontFamily:"'Inter',-apple-system,sans-serif"}},fmt(x.toplam))
      ),
      // Detay kutular — personel panelindeki odemeSatir stiline benzer
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7}},
        [
          {lb:"Tahsilat",  v:fmt(x.toplam), c:"#0071E3"},
          {lb:"KDV Hariç", v:fmt(x.net),    c:"var(--tx)"},
          {lb:"KDV",       v:fmt(x.kdv),    c:"#f0a060"},
          {lb:"GV Est.",   v:fmt(gv.vergi), c:"#e06060"}
        ].map(function(item,i){
          return div({key:i,style:{background:"rgba(0,113,227,.04)",border:"1px solid rgba(0,113,227,.10)",
            borderRadius:9,padding:"8px 5px",textAlign:"center"}},
            div({style:{fontSize:10,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,
              marginBottom:3,fontWeight:600,fontFamily:"'Inter',-apple-system,sans-serif"}},item.lb),
            div({style:{fontSize:13,color:item.c,fontWeight:700,
              fontFamily:"'Inter',-apple-system,sans-serif"}},item.v)
          );
        })
      )
    );
  };

  return div(null,
    // BAŞLIK
    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:16,marginBottom:12}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}},
        div(null,
          div({style:{fontSize:22,color:"var(--g)",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontWeight:700}},"🧾 Vergi Muhasebesi"),
          div({style:{fontSize:12,color:"var(--mu)",marginTop:3}},"Şahıs şirketi · Kademeli gelir vergisi tarifesi (2026)")
        ),
        div({style:{display:"flex",gap:8,alignItems:"center"}},
          inp({type:"month",className:"fi",style:{width:150},value:secAy,onChange:e=>setSecAy(e.target.value)}),
          inp({type:"number",className:"fi",style:{width:78},value:kdvOran,onChange:e=>setKdvOran(e.target.value),placeholder:"KDV %"})
        )
      ),
      div({style:{fontSize:12,color:"#f0a060",lineHeight:1.5,background:"rgba(180,90,0,.08)",border:"1px solid rgba(180,90,0,.22)",borderRadius:10,padding:10}},
        "Not: Bu ekran yönetim ve takip amaçlıdır. Gelir vergisi YILLIK beyan edilir, aylık tutarlar tahminidir. Resmi beyan için muhasebecinin onayı gerekir."
      )
    ),

    // ÖZET KARTLAR
    div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:12}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Aylık KDV"),
        div({style:{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:26,color:"#f0a060",fontWeight:700}},fmt(ayHesap.odenecekKdv))
      ),
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Aylık Matrah (KDV hariç)"),
        div({style:{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:26,color:"var(--g)",fontWeight:700}},fmt(ayHesap.aylikMatrah))
      ),
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Aylık GV (tahmini)"),
        div({style:{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:26,color:"#e06060",fontWeight:700}},fmt(ayHesap.aylikGV.vergi))
      )
    ),

    // ÖDEME TÜRÜ KARTLARI
    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:14,marginBottom:12}},
      div({style:{fontSize:14,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}},"💳 Ödeme Türüne Göre Aylık Vergi"),
      h(Kart,{id:"kk"}),
      h(Kart,{id:"ib"}),
      h(Kart,{id:"nk"})
    ),

    // AYLIK ÖZET TABLO
    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:14,marginBottom:12}},
      div({style:{fontSize:14,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}},"📌 Aylık Hesap Detayı"),
      div({style:{display:"grid",gridTemplateColumns:"1fr 130px",gap:8,alignItems:"center",fontSize:13,color:"var(--mu)"}},
        div(null,"Seçili brüt tahsilat"),               div({style:{textAlign:"right",color:"var(--tx)",fontWeight:700}},fmt(ayHesap.seciliBrut)),
        div(null,"KDV hariç ciro"),                     div({style:{textAlign:"right",color:"var(--g)",fontWeight:700}},fmt(ayHesap.seciliNet)),
        div(null,"Satış KDV"),                          div({style:{textAlign:"right",color:"#f0a060",fontWeight:700}},fmt(ayHesap.seciliKdv)),
        div({style:{borderTop:"1px solid var(--br)",paddingTop:9}},"Toplam gider (brüt)"),
          div({style:{borderTop:"1px solid var(--br)",paddingTop:9,textAlign:"right",color:"var(--tx)",fontWeight:700}},fmt(ayHesap.giderBrut)),
        div(null,"KDV hariç gider"),                    div({style:{textAlign:"right",color:"var(--gr)",fontWeight:700}},"- "+fmt(ayHesap.giderNet)),
        div(null,"Alış KDV (düşülecek)"),               div({style:{textAlign:"right",color:"var(--gr)",fontWeight:700}},"- "+fmt(ayHesap.alisKdv)),
        div({style:{borderTop:"1px solid var(--br)",paddingTop:9,color:"var(--tx)",fontWeight:700}},"Ödenecek aylık KDV"),
          div({style:{borderTop:"1px solid var(--br)",paddingTop:9,textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:20,color:"#f0a060",fontWeight:700}},fmt(ayHesap.odenecekKdv)),
        div({style:{color:"var(--tx)",fontWeight:700,marginTop:6}},"Aylık matrah"),
          div({style:{textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:20,color:"var(--g)",fontWeight:700,marginTop:6}},fmt(ayHesap.aylikMatrah)),
        div({style:{color:"var(--tx)",fontWeight:700}},"Aylık GV (tahmini)"),
          div({style:{textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:22,color:"#e06060",fontWeight:700}},fmt(ayHesap.aylikGV.vergi))
      )
    ),

    // YILLIK KÜMÜLATİF + KADEME TABLOSU
    div({style:{background:"var(--bg2)",border:"1.5px solid rgba(224,96,96,.35)",borderRadius:14,padding:14,marginBottom:12}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}},
        div({style:{fontSize:14,color:"#e06060",letterSpacing:2,textTransform:"uppercase",fontWeight:700}},"📅 "+secYil+" Yıllık Kümülatif"),
        div({style:{fontSize:11,color:"var(--mu)"}},"Gelir vergisi yıllık beyan edilir")
      ),
      div({style:{display:"grid",gridTemplateColumns:"1fr 130px",gap:8,alignItems:"center",fontSize:13,color:"var(--mu)",marginBottom:14}},
        div(null,"Yıllık seçili ciro (brüt)"),    div({style:{textAlign:"right",color:"var(--tx)",fontWeight:700}},fmt(yilHesap.brut)),
        div(null,"Yıllık KDV hariç ciro"),         div({style:{textAlign:"right",color:"var(--g)",fontWeight:700}},fmt(yilHesap.net)),
        div(null,"Yıllık KDV hariç gider"),        div({style:{textAlign:"right",color:"var(--gr)",fontWeight:700}},"- "+fmt(yilHesap.giderNet)),
        div({style:{borderTop:"1px solid var(--br)",paddingTop:9,color:"var(--tx)",fontWeight:700}},"YILLIK MATRAH"),
          div({style:{borderTop:"1px solid var(--br)",paddingTop:9,textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:22,color:"var(--g)",fontWeight:700}},fmt(yilHesap.matrah)),
        div({style:{color:"#e06060",fontWeight:700}},"YILLIK GELİR VERGİSİ"),
          div({style:{textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:26,color:"#e06060",fontWeight:700}},fmt(yilHesap.gv.vergi)),
        div({style:{fontSize:11,color:"var(--mu)"}},"Efektif vergi oranı"),
          div({style:{textAlign:"right",fontSize:13,color:"var(--mu)",fontWeight:600}},"%"+efektifOran(yilHesap.gv.vergi, yilHesap.matrah).toFixed(2))
      ),

      // Dilim detayı
      yilHesap.gv.dilimler.length > 0 && div(null,
        div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8,fontWeight:600}},"Kademe Detayı"),
        yilHesap.gv.dilimler.map((d,i)=>
          div({key:i,style:{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:8,alignItems:"center",padding:"7px 10px",background:"var(--bg3)",borderRadius:8,marginBottom:5,fontSize:12}},
            div({style:{color:"var(--g)",fontWeight:700,minWidth:50}},"%"+(d.oran*100).toFixed(0)),
            div({style:{color:"var(--tx)"}},
              fmt(d.alt) + " - " + (d.ust === null ? "∞" : fmt(d.ust)) + " arası dilim",
              div({style:{fontSize:10,color:"var(--mu)",marginTop:2}},"Bu dilimde matrah: "+fmt(d.tutar))
            ),
            div({style:{textAlign:"right",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",fontSize:15,color:"#e06060",fontWeight:700}},fmt(d.vergi))
          )
        )
      )
    ),

    // TARİFE BİLGİ
    div({style:{background:"rgba(37,99,168,.05)",border:"1px solid rgba(37,99,168,.18)",borderRadius:11,padding:12}},
      div({style:{fontSize:11,color:"var(--g)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:8}},"📖 2026 Gelir Vergisi Tarifesi (Şahıs)"),
      div({style:{fontSize:12,color:"var(--tx)",lineHeight:1.7}},
        "• 158.000 ₺'ye kadar: ",h("b",null,"%15"),h("br"),
        "• 158.000 - 330.000 ₺ arası: ",h("b",null,"%20"),h("br"),
        "• 330.000 - 1.200.000 ₺ arası: ",h("b",null,"%27"),h("br"),
        "• 1.200.000 - 4.300.000 ₺ arası: ",h("b",null,"%35"),h("br"),
        "• 4.300.000 ₺ üzeri: ",h("b",null,"%40")
      )
    )
  );
}


// ── HESAP ÖZETİ MODÜLÜ ─────────────────────────────────────────────────────
function HesapOzetiModul({tumK, bankalar, hesapSaglama, setHesapSaglama, showToast}) {
  // Renklendirme sisteminden kalan referanslar için varsayılan boş stil
  const genelToplamBolumStili = {};
  const [secTarih, setSecTarih] = React.useState(TODAY());
  const [girisBankalar, setGirisBankalar] = React.useState({});
  const [girisIban, setGirisIban] = React.useState("");
  const [girisNakit, setGirisNakit] = React.useState("");

  // Seçilen tarihin kaydedilmiş sağlamasını yükle
  React.useEffect(() => {
    const kayit = hesapSaglama[secTarih];
    if (kayit) {
      setGirisBankalar(kayit.kk || {});
      setGirisIban(String(kayit.iban || ""));
      setGirisNakit(String(kayit.nakit || ""));
    } else {
      setGirisBankalar({});
      setGirisIban("");
      setGirisNakit("");
    }
  }, [secTarih]);

  // Sistem verileri - seçilen tarih
  const gunKayitlar = (tumK||[]).filter(r => r.tarih === secTarih && r.gonderildi !== false);
  const sistemKK = gunKayitlar.reduce((s,r) => s+(r.hizKK||0)+(r.uKK||0), 0);
  const sistemIban = gunKayitlar.reduce((s,r) => s+(r.hizIB||0)+(r.uIB||0), 0);
  const sistemNakit = gunKayitlar.reduce((s,r) => s+(r.hizNK||0)+(r.uNK||0), 0);
  const sistemTop = sistemKK + sistemIban + sistemNakit;

  // Gerçek veriler
  const gercekKK = Object.values(girisBankalar).reduce((s,v) => s+toN(v), 0);
  const gercekIban = toN(girisIban);
  const gercekNakit = toN(girisNakit);
  const gercekTop = gercekKK + gercekIban + gercekNakit;

  // Eşleşme kontrolleri
  const kkEslesti = gercekKK > 0 && Math.abs(gercekKK - sistemKK) < 1;
  const ibanEslesti = gercekIban > 0 && Math.abs(gercekIban - sistemIban) < 1;
  const nakitEslesti = gercekNakit > 0 && Math.abs(gercekNakit - sistemNakit) < 1;
  const tumEslesti = kkEslesti && ibanEslesti && nakitEslesti;

  // Son 30 günün sağlama durumu
  const gunler = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const tarih = d.toISOString().split("T")[0];
    const kayitVar = (tumK||[]).some(r => r.tarih === tarih && r.gonderildi !== false);
    const saglama = hesapSaglama[tarih];
    if (kayitVar) gunler.push({ tarih, saglama });
  }
  const yapilmayanGunler = gunler.filter(g => !g.saglama);
  const yapılanGunler = gunler.filter(g => g.saglama);

  const kaydet = () => {
    if (!gercekKK && !gercekIban && !gercekNakit) {
      showToast("Gerçek tutarları girin", "uy"); return;
    }
    const yeniKayit = {
      tarih: secTarih,
      kk: {...girisBankalar},
      iban: gercekIban,
      nakit: gercekNakit,
      sistemKK, sistemIban, sistemNakit,
      gercekKK, gercekIban, gercekNakit,
      tumEslesti,
      kayitTarihi: TODAY(),
      saat: new Date().toTimeString().slice(0,5)
    };
    setHesapSaglama(p => ({...p, [secTarih]: yeniKayit}));
    showToast(tumEslesti ? "✓ Bugünkü hesap doğru — kaydedildi" : "⚠ Hesap kaydedildi (eşleşme yok)");
  };

  const EslesmeRozeti = ({eslesti, gercek, sistem}) => {
    if (!gercek) return null;
    const fark = gercek - sistem;
    return div({style:{display:"inline-flex",alignItems:"center",gap:5,
      padding:"3px 9px",borderRadius:8,fontSize:12,fontWeight:600,
      background:eslesti?"rgba(50,140,100,.12)":"rgba(224,60,60,.12)",
      border:"1px solid "+(eslesti?"rgba(50,140,100,.3)":"rgba(224,60,60,.3)"),
      color:eslesti?"var(--gr)":"#e06060"}},
      eslesti ? "✓ Eşleşiyor" : "✕ Eşleşmiyor"+(fark!==0?" ("+( fark>0?"+":"")+fmt(fark)+")":"")
    );
  };

  return div(null,

    // Yapılmayan günler uyarısı
    yapilmayanGunler.length > 0 && div({style:{background:"rgba(240,160,60,.06)",
      border:"1px solid rgba(240,160,60,.25)",borderRadius:12,padding:12,marginBottom:14}},
      div({style:{fontSize:12,color:"#f0a060",letterSpacing:2,textTransform:"uppercase",marginBottom:8}},
        "⚠ Sağlaması Yapılmayan Günler ("+yapilmayanGunler.length+")"),
      div({style:{display:"flex",flexWrap:"wrap",gap:6}},
        yapilmayanGunler.slice(0,10).map(g =>
          btn({key:g.tarih,style:{padding:"5px 10px",borderRadius:7,fontSize:13,cursor:"pointer",
            background:"rgba(240,160,60,.1)",border:"1px solid rgba(240,160,60,.3)",
            color:"#f0a060"},
            onClick:()=>setSecTarih(g.tarih)},
            new Date(g.tarih).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})
          )
        )
      )
    ),

    // Tarih seçici
    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,
      padding:14,marginBottom:12,overflow:"hidden"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)"}},"🔍 Hesap Sağlaması"),
        hesapSaglama[secTarih] && h("span",{style:{fontSize:12,padding:"3px 8px",borderRadius:7,
          background:hesapSaglama[secTarih].tumEslesti?"rgba(50,140,100,.12)":"rgba(224,60,60,.12)",
          border:"1px solid "+(hesapSaglama[secTarih].tumEslesti?"rgba(50,140,100,.3)":"rgba(224,60,60,.3)"),
          color:hesapSaglama[secTarih].tumEslesti?"var(--gr)":"#e06060"}},
          hesapSaglama[secTarih].tumEslesti ? "✓ Hesap Doğru" : "✕ Fark Var")
      ),
      h("input",{type:"date",className:"fi",style:{width:"100%",boxSizing:"border-box"},value:secTarih,
        onChange:e=>setSecTarih(e.target.value)}),
      gunKayitlar.length === 0 && div({style:{fontSize:13,color:"var(--mu)",marginTop:8,textAlign:"center"}},
        "Bu tarihte kayıt bulunamadı")
    ),

    gunKayitlar.length > 0 && div(null,

      // Personel bazlı ciro kartları
      div({style:{marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10,marginTop:4}},
          "👥 Personel Bazlı Ciro — "+new Date(secTarih).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})),
        (()=>{
          const pGruplar = {};
          gunKayitlar.forEach(r => {
            if(!pGruplar[r.staffId]) pGruplar[r.staffId] = {
              ad:r.staffAd, hizCiro:0, urunCiro:0, kayitSay:0
            };
            pGruplar[r.staffId].hizCiro += (r.hizKK||0)+(r.hizIB||0)+(r.hizNK||0);
            pGruplar[r.staffId].urunCiro += (r.uKK||0)+(r.uIB||0)+(r.uNK||0);
            pGruplar[r.staffId].kayitSay += 1;
          });
          return div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
            Object.values(pGruplar).sort((a,b)=>b.hizCiro+b.urunCiro-a.hizCiro-a.urunCiro).map(p=>
              div({key:p.ad,style:{background:"var(--bg2)",border:"1px solid var(--br)",
                borderRadius:12,padding:12}},
                div({style:{fontSize:14,color:"var(--tx)",fontWeight:500,marginBottom:8,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(p.ad)),
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,
                  color:"var(--g)",fontWeight:700,marginBottom:4}},
                  fmt(p.hizCiro+p.urunCiro)),
                div({style:{display:"flex",gap:6,flexWrap:"wrap"}},
                  p.hizCiro>0&&h("span",{style:{fontSize:11,padding:"2px 6px",borderRadius:5,
                    background:"rgba(128,192,64,.08)",border:"1px solid rgba(128,192,64,.2)",
                    color:"var(--gr)"}},"✂ "+fmt(p.hizCiro)),
                  p.urunCiro>0&&h("span",{style:{fontSize:11,padding:"2px 6px",borderRadius:5,
                    background:"rgba(37,99,168,.08)",border:"1px solid rgba(37,99,168,.2)",
                    color:"var(--bl)"}},"📦 "+fmt(p.urunCiro))
                ),
                div({style:{fontSize:11,color:"var(--di)",marginTop:4}},p.kayitSay+" kayıt")
              )
            )
          );
        })()
      ),

      // SİSTEM VERİLERİ
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,
        padding:14,marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
          "📊 Sistem Verileri — "+new Date(secTarih).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
          [["💳 K.Kartı",sistemKK,"var(--bl)"],["🏦 IBAN",sistemIban,"var(--bl)"],["💵 Nakit",sistemNakit,"var(--gr)"]].map(([lb,v,c])=>
            div({key:lb,style:{background:"var(--bg3)",borderRadius:8,padding:"9px 7px",textAlign:"center"}},
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:c,fontWeight:700}},fmt(v)),
              div({style:{fontSize:10,color:"var(--mu)",marginTop:2,textTransform:"uppercase",letterSpacing:1}},lb)
            )
          )
        ),
        div({style:{display:"flex",justifyContent:"space-between",padding:"8px 10px",
          background:"rgba(37,99,168,.06)",borderRadius:8}},
          div({style:{fontSize:14,color:"var(--mu)"}},"Sistem Toplamı"),
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"var(--g)",fontWeight:700}},fmt(sistemTop))
        )
      ),

      // GERÇEK VERİLER GİRİŞİ
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,
        padding:14,marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
          "✍ Gerçek Veriler"),

        // Kredi Kartı - banka bazlı
        div({style:{marginBottom:14}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},"💳 Kredi Kartı (POS)"),
            h(EslesmeRozeti,{eslesti:kkEslesti,gercek:gercekKK,sistem:sistemKK})
          ),
          (bankalar||[]).map(b=>
            div({key:b,style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,alignItems:"center",marginBottom:7}},
              div({style:{fontSize:14,color:"var(--mu)"}},(b)),
              inp({className:"fi",style:{margin:0},type:"number",placeholder:"0",
                value:girisBankalar[b]||"",
                onChange:e=>setGirisBankalar(p=>({...p,[b]:e.target.value}))})
            )
          ),
          bankalar.length > 0 && div({style:{display:"flex",justifyContent:"flex-end",
            padding:"6px 10px",background:"var(--bg3)",borderRadius:7,marginTop:4}},
            div({style:{fontSize:13,color:"var(--mu)",marginRight:8}},"Toplam:"),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,
              color:kkEslesti?"var(--gr)":"var(--tx)",fontWeight:700}},fmt(gercekKK))
          )
        ),

        // IBAN
        div({style:{marginBottom:14}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},"🏦 IBAN"),
            h(EslesmeRozeti,{eslesti:ibanEslesti,gercek:gercekIban,sistem:sistemIban})
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,alignItems:"center"}},
            div({style:{fontSize:14,color:"var(--mu)"}},"Toplam IBAN"),
            inp({className:"fi",style:{margin:0},type:"number",placeholder:"0",
              value:girisIban,onChange:e=>setGirisIban(e.target.value)})
          )
        ),

        // Nakit
        div({style:{marginBottom:14}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},"💵 Nakit"),
            h(EslesmeRozeti,{eslesti:nakitEslesti,gercek:gercekNakit,sistem:sistemNakit})
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,alignItems:"center"}},
            div({style:{fontSize:14,color:"var(--mu)"}},"Kasadaki Nakit"),
            inp({className:"fi",style:{margin:0},type:"number",placeholder:"0",
              value:girisNakit,onChange:e=>setGirisNakit(e.target.value)})
          )
        ),

        // Genel toplam karşılaştırma
        (gercekTop > 0||sistemTop > 0) && div({style:{borderTop:"1px solid var(--br)",paddingTop:12,marginTop:4}},
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
            div({style:{background:"var(--bg3)",borderRadius:8,padding:"10px",textAlign:"center"}},
              div({style:{fontSize:11,color:genelToplamBolumStili.textColor||"var(--mu)",letterSpacing:1,marginBottom:3}},"SİSTEM TOPLAMI"),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:genelToplamBolumStili.titleColor||"var(--g)",fontWeight:700}},fmt(sistemTop))
            ),
            div({style:{background:"var(--bg3)",borderRadius:8,padding:"10px",textAlign:"center"}},
              div({style:{fontSize:11,color:genelToplamBolumStili.textColor||"var(--mu)",letterSpacing:1,marginBottom:3}},"GERÇEK TOPLAM"),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,
                color:tumEslesti?"var(--gr)":"#e06060",fontWeight:700}},fmt(gercekTop))
            )
          ),
          div({style:{textAlign:"center",padding:"12px",borderRadius:10,
            background:tumEslesti?"rgba(50,140,100,.08)":"rgba(224,60,60,.08)",
            border:"1px solid "+(tumEslesti?"rgba(50,140,100,.25)":"rgba(224,60,60,.25)")}},
            div({style:{fontSize:tumEslesti?18:15,color:tumEslesti?"var(--gr)":"#e06060",fontWeight:700,marginBottom:4}},
              tumEslesti ? "✓ Bugünkü Hesap Doğru!" : "✕ Hesap Eşleşmiyor"),
            !tumEslesti && div({style:{fontSize:13,color:genelToplamBolumStili.textColor||"var(--mu)"}},
              "Fark: "+fmt(Math.abs(gercekTop-sistemTop)))
          )
        ),

        div({className:"btn-r",style:{marginTop:12}},
          hesapSaglama[secTarih]&&btn({className:"btn-i",
            onClick:()=>{
              setHesapSaglama(p=>{const y={...p};delete y[secTarih];return y;});
              setGirisBankalar({}); setGirisIban(""); setGirisNakit("");
              showToast("Sağlama silindi");
            }},"Sıfırla"),
          btn({className:"btn-k",
            disabled:!gercekTop&&!gercekKK&&!gercekIban&&!gercekNakit,
            onClick:kaydet},
            hesapSaglama[secTarih]?"Güncelle":"Kaydet")
        )
      ),

      // Geçmiş sağlamalar
      Object.keys(hesapSaglama).length > 0 && div({style:{background:"var(--bg2)",
        border:"1px solid var(--br)",borderRadius:12,padding:14}},
        div({style:{fontSize:12,color:genelToplamBolumStili.titleColor||"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
          "📅 Geçmiş Sağlamalar"),
        Object.entries(hesapSaglama)
          .sort((a,b)=>b[0].localeCompare(a[0]))
          .slice(0,10)
          .map(([tarih,kayit])=>
            div({key:tarih,style:{display:"flex",alignItems:"center",gap:10,
              padding:"9px 0",borderBottom:"1px solid var(--br)",cursor:"pointer"},
              onClick:()=>setSecTarih(tarih)},
              div({style:{fontSize:13,color:"var(--tx)",flex:1}},
                new Date(tarih).toLocaleDateString("tr-TR",{day:"numeric",month:"long"})),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:genelToplamBolumStili.titleColor||"var(--g)"}},
                fmt(kayit.gercekKK+kayit.gercekIban+kayit.gercekNakit)),
              h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:7,
                background:kayit.tumEslesti?"rgba(50,140,100,.1)":"rgba(224,60,60,.1)",
                border:"1px solid "+(kayit.tumEslesti?"rgba(50,140,100,.3)":"rgba(224,60,60,.3)"),
                color:kayit.tumEslesti?"var(--gr)":"#e06060"}},
                kayit.tumEslesti?"✓ Doğru":"✕ Fark Var")
            )
          )
      )
    )
  );
}



// ── BARKOD TARAYICI COMPONENT ──────────────────────────────────────────────
function BarkodTarayici({onOku, onKapat}) {
  // Renklendirme sisteminden kalan referanslar için varsayılan boş stil
  const genelToplamBolumStili = {};
  const divId = "qr-" + React.useRef(Math.random().toString(36).slice(2)).current;
  const scannerRef = React.useRef(null);
  const kapandiRef = React.useRef(false);
  const [zoom, setZoom] = React.useState(1);
  const [hata, setHata] = React.useState(null);

  const bip = () => {
    try {
      const ac = new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type="square"; o.frequency.value=1500;
      g.gain.setValueAtTime(0.5, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.15);
      o.start(ac.currentTime); o.stop(ac.currentTime+0.15);
      setTimeout(()=>ac.close(), 400);
    } catch(e){}
  };

  const kapat = React.useCallback(() => {
    if(kapandiRef.current) return;
    kapandiRef.current = true;
    try {
      if(scannerRef.current) {
        scannerRef.current.stop().catch(()=>{});
        scannerRef.current = null;
      }
    } catch(e){}
    onKapat();
  }, [onKapat]);

  React.useEffect(() => {
    kapandiRef.current = false;
    let zoomTimer = null;

    const taraBaslat = async () => {
      if(typeof Html5Qrcode === "undefined") { setHata("genel"); return; }
      try {
        const scanner = new Html5Qrcode(divId);
        scannerRef.current = scanner;
        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 15,
            qrbox: (w, h) => ({ width: Math.min(w-20, 300), height: Math.min(h*0.3, 110) }),
          },
          (kod) => {
            bip();
            if(kapandiRef.current) return;
            kapandiRef.current = true;
            try { scanner.stop().catch(()=>{}); } catch(e){}
            scannerRef.current = null;
            onOku(kod);
          },
          () => {}
        );
        zoomTimer = setTimeout(() => {
          try {
            const vid = document.querySelector("#"+divId+" video");
            const track = vid && vid.srcObject && vid.srcObject.getVideoTracks && vid.srcObject.getVideoTracks()[0];
            const caps = track && track.getCapabilities && track.getCapabilities();
            if(caps && caps.zoom) {
              const zv = caps.zoom.min + (caps.zoom.max - caps.zoom.min) * 0.3;
              track.applyConstraints({ advanced: [{ zoom: zv }] }).catch(()=>{});
            }
          } catch(e){}
        }, 1000);
      } catch(err) {
        const ad = (err && err.name) || "";
        console.warn("Kamera hatasi:", ad, err && err.message);
        if(ad === "NotAllowedError" || ad === "PermissionDeniedError") {
          setHata("izin");
        } else if(ad === "NotFoundError" || ad === "DevicesNotFoundError") {
          setHata("bulunamadi");
        } else {
          setHata("genel");
        }
      }
    };

    const t = setTimeout(taraBaslat, 150);
    return () => {
      clearTimeout(t);
      if(zoomTimer) clearTimeout(zoomTimer);
      if(scannerRef.current) {
        try { scannerRef.current.stop().catch(()=>{}); } catch(e){}
        scannerRef.current = null;
      }
    };
  }, []);

  const zoomDegistir = async (val) => {
    setZoom(val);
    try {
      const vid = document.querySelector("#"+divId+" video");
      const track = vid && vid.srcObject && vid.srcObject.getVideoTracks && vid.srcObject.getVideoTracks()[0];
      if(track && track.applyConstraints) {
        await track.applyConstraints({ advanced: [{ zoom: val }] });
      }
    } catch(e){}
  };

  // Hata ekranı - izin reddi, kamera yok veya genel hata
  if(hata) {
    const mesajlar = {
      izin: {
        ikon:"🔒", baslik:"Kamera İzni Gerekli",
        aciklama:"Kamera izni reddedilmiş. Barkod okumak için izin vermelisiniz.",
        adimlar:["📱 Telefon Ayarları'nı açın","Safari > Kamera > İzin Ver","Sayfayı yenileyip tekrar deneyin"]
      },
      bulunamadi: {
        ikon:"📵", baslik:"Kamera Bulunamadı",
        aciklama:"Cihazda kullanılabilir kamera yok.",
        adimlar:[]
      },
      genel: {
        ikon:"⚠️", baslik:"Kamera Başlatılamadı",
        aciklama:"Başka bir uygulama kamerayı kullanıyor olabilir.",
        adimlar:["Diğer uygulamaları kapatın","Sayfayı yenileyip tekrar deneyin"]
      }
    };
    const m = mesajlar[hata] || mesajlar.genel;
    return h('div', {style:{position:"fixed",inset:0,zIndex:9999,background:"var(--bg)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}},
      h('div', {style:{maxWidth:320,width:"100%",textAlign:"center"}},
        h('div', {style:{fontSize:48,marginBottom:16}}, m.ikon),
        h('div', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--tx)",marginBottom:10}}, m.baslik),
        h('div', {style:{fontSize:14,color:genelToplamBolumStili.textColor||"var(--mu)",lineHeight:1.7,marginBottom:20}}, m.aciklama),
        m.adimlar.length>0 && h('div', {style:{background:"var(--bg3)",border:"1px solid var(--br)",borderRadius:10,
          padding:"14px 16px",textAlign:"left",marginBottom:16}},
          h('div', {style:{fontSize:12,color:"var(--di)",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}, "ÇÖZÜM"),
          m.adimlar.map((a,i)=>h('div', {key:i, style:{fontSize:14,color:genelToplamBolumStili.titleColor||"var(--g)",padding:"4px 0",
            borderTop:i>0?"1px solid #1e4244":"none"}}, (i+1)+". "+a))
        ),
        h('button', {
          style:{background:"var(--bg3)",border:"1px solid #3a3020",borderRadius:10,
            color:"var(--tx)",fontSize:15,padding:"11px 32px",cursor:"pointer"},
          onClick: kapat
        }, "← Geri Dön")
      )
    );
  }

  return h('div', {
    style:{position:"fixed",inset:0,zIndex:9999,background:"#000",
      display:"flex",flexDirection:"column"}},
    h('div', {id: divId, style:{width:"100%",flex:1,background:"#000",overflow:"hidden"}}),
    h('div', {style:{padding:"12px 20px 20px",display:"flex",flexDirection:"column",
      alignItems:"center",gap:8,background:"#000",width:"100%"}},
      h('div', {style:{color:"#9a9a9a",fontSize:13,letterSpacing:1,textAlign:"center",marginBottom:2}},
        "🔍 Barkodu çerçeveye getirin"),
      h('div', {style:{display:"flex",alignItems:"center",gap:10,width:"100%",maxWidth:320}},
        h('span', {style:{color:"#5a5a5a",fontSize:13}},"1x"),
        h('input', {
          type:"range", min:1, max:3, step:0.1, value:zoom,
          style:{flex:1,accentColor:"var(--g)",height:3},
          onChange: e => zoomDegistir(parseFloat(e.target.value))
        }),
        h('span', {style:{color:genelToplamBolumStili.titleColor||"var(--g)",fontSize:13,minWidth:28}}, zoom.toFixed(1)+"x")
      ),
      h('button', {
        style:{background:"#1a0808",border:"1px solid #6a2020",borderRadius:10,
          color:"#c05050",fontSize:14,padding:"10px 40px",cursor:"pointer",marginTop:2},
        onClick: kapat
      }, "İptal")
    )
  );
}


function KayitForm({ilk, musteriDB, personeller, aktifKullanici, baslik, buttonText, onKaydet, onIptal, hizListeleri, hatirlatmalar, setHatirlatmalar, bolumStilleri, devirBildirim, setDevirBildirim, gotoMusteriKart, showToast, pGruplar}) {

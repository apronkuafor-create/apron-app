const dbGuncelle=(t,r,id) => DB && DB.from(t).update(r).eq("id",id).then(()=>{}).catch(e=>console.warn(e));

const rawHizler = r => Array.isArray(r.hizmetler) ? r.hizmetler : [];
const recordMeta = r => rawHizler(r).find(x=>x&&x.__tip==="meta") || {};
const actualServices = r => rawHizler(r).filter(x=>!(x&&x.__tip==="meta"));
const servicePayments = r => {
  const m = recordMeta(r);
  return {
    kk: toN(m.hizKK ?? m.kk ?? r.hiz_kk ?? 0),
    ib: toN(m.hizIB ?? m.ib ?? r.hiz_ib ?? 0),
    nk: toN(m.hizNK ?? m.nk ?? r.hiz_nk ?? 0),
    ibanAlanId: m.hizIbanAlanId || m.ibanAlanId || "",
    ibanAlanAd: m.hizIbanAlanAd || m.ibanAlanAd || ""
  };
};
const productPayments = r => {
  const m = recordMeta(r);
  return {
    kk: toN(m.uKK ?? r.urun_kk ?? 0),
    ib: toN(m.uIB ?? r.urun_ib ?? 0),
    nk: toN(m.uNK ?? r.urun_nk ?? 0),
    ibanAlanId: m.uIbanAlanId || "",
    ibanAlanAd: m.uIbanAlanAd || ""
  };
};
const recordPayments = r => {
  const hp = servicePayments(r);
  const up = productPayments(r);
  return {
    kk: hp.kk + up.kk,
    ib: hp.ib + up.ib,
    nk: hp.nk + up.nk,
    ibanAlanId: hp.ibanAlanId || up.ibanAlanId || "",
    ibanAlanAd: hp.ibanAlanAd || up.ibanAlanAd || "",
    hizmet: hp,
    urun: up
  };
};
const serviceTotal = r => actualServices(r).reduce((s,h)=>s+toN(h.f),0);
const productTotal = r => (r.urunler||[]).reduce((s,u)=>s+toN(u.sf||u.sp)*toN(u.qty||1),0);
const involvedStaffIds = r => {
  const ids = new Set();
  actualServices(r).forEach(h=>h?.pId&&ids.add(h.pId));
  (r.urunler||[]).forEach(u=>u?.saticiId&&ids.add(u.saticiId));
  const pm = recordPayments(r);
  if(pm.hizmet?.ibanAlanId) ids.add(pm.hizmet.ibanAlanId);
  if(pm.urun?.ibanAlanId) ids.add(pm.urun.ibanAlanId);
  if(pm.ibanAlanId) ids.add(pm.ibanAlanId);
  if(r.staff_id) ids.add(r.staff_id);
  return [...ids];
};
const mapR = r => {
  const pay = recordPayments(r);
  const top = toN(r.toplam || (pay.kk+pay.ib+pay.nk) || (serviceTotal(r)+productTotal(r)));
  return {
    id:r.id, staffId:r.staff_id, staffAd:r.staff_name,
    musteri:r.musteri, tel:r.telefon||"",
    gelisTipi: recordMeta(r).gelisTipi || "Direkt",
    hizler: actualServices(r),
    hizKK: pay.hizmet.kk, hizIB: pay.hizmet.ib, hizNK: pay.hizmet.nk,
    urunler:r.urunler||[], uKK:pay.urun.kk, uIB:pay.urun.ib, uNK:pay.urun.nk,
    toplam:top, tarih:r.tarih, saat:r.saat, gonderildi:r.gonderildi,
    ibanAlanId: pay.ibanAlanId, ibanAlanAd: pay.ibanAlanAd,
    hizIbanAlanId: pay.hizmet.ibanAlanId, hizIbanAlanAd: pay.hizmet.ibanAlanAd,
    uIbanAlanId: pay.urun.ibanAlanId, uIbanAlanAd: pay.urun.ibanAlanAd
  };
};

.det-top{display:flex;justify-content:space-between;align-items:center;padding-top:9px;margin-top:5px;border-top:1px solid rgba(255,255,255,.07);}
.o3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.ok2{background:rgba(0,0,0,.28);border-radius:9px;padding:9px 5px;text-align:center;}

.conf-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:flex;align-items:center;justify-content:center;padding:18px;}
.conf-k{background:var(--bg2);border:1px solid var(--br);border-radius:17px;padding:24px;max-width:300px;width:100%;text-align:center;}
.conf-t{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--tx);margin-bottom:7px;}
.conf-m{font-size:11px;color:var(--mu);margin-bottom:18px;line-height:1.6;}
.gs-k{background:var(--bg2);border:1.5px solid #2a4a10;border-radius:17px;padding:24px;max-width:310px;width:100%;text-align:center;}
.gs-oz{background:rgba(80,160,0,.06);border:1px solid rgba(80,160,0,.18);border-radius:9px;padding:12px;margin-bottom:18px;text-align:left;}
.gsl{font-size:10px;color:#5a7a30;margin-bottom:3px;}
.gsv{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gr);}

.dev-ov{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:700;display:flex;align-items:center;justify-content:center;padding:18px;}
.dev-k{background:var(--bg2);border:1.5px solid var(--br);border-radius:19px;padding:24px 18px;max-width:350px;width:100%;}
.dev-o{background:var(--bg3);border:1.5px solid var(--br);border-radius:9px;padding:11px 13px;cursor:pointer;margin-bottom:7px;font-size:12px;color:var(--mu);transition:all .2s;}
.dev-o.s{border-color:var(--g);background:#1e1a08;color:var(--g);}

.toast{position:fixed;top:15px;left:50%;transform:translateX(-50%);border-radius:10px;padding:10px 18px;font-size:11px;z-index:1000;white-space:nowrap;animation:tin .3s ease;}
.toast.ba{background:#1a3a1a;border:1px solid #2d5a2d;color:#5dba5d;}
.toast.ha{background:#3a1010;border:1px solid #6a2020;color:#e07070;}
.toast.uy{background:#2a2010;border:1px solid #5a4a20;color:#c0a050;}
@keyframes tin{from{transform:translateX(-50%) translateY(-18px);opacity:0;}}

.bos{text-align:center;padding:44px 18px;color:var(--br);}
.mus-on{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg2);border:1px solid var(--br);border-radius:9px;overflow:hidden;margin-top:3px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.mus-oi{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--br);}
.mus-oi:last-child{border-bottom:none;}
.mus-oi:hover{background:var(--br);}
.yk-ekran{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
`;

// Odeme Gir
// ══════════════════════════════════════════════════════════════════════════
const OdemeGir = React.memo(({baslik="Odeme Dagilimi", kk, ib, nk, ibanAlanId, personeller, onChange, toplam, showIbanSelect=true}) => {
  const girilen = toN(kk)+toN(ib)+toN(nk);
  const fark = Math.abs(girilen-toN(toplam));
  return (
    <div className="sc sc-g" style={{marginTop:14}}>
      <div className="sc-hd">
        <div className="sc-n" style={{background:"linear-gradient(135deg,#d4a017,#b8860b)",color:"#0a0805"}}>₺</div>
        <div className="sc-t" style={{color:"#d4a017"}}>{baslik}</div>
      </div>
      <div className="o3" style={{marginBottom:12}}>
        {[["Kredi Karti","kk",kk],["IBAN","ib",ib],["Nakit","nk",nk]].map(([lb,key,val])=>(
          <div key={key} className="ok2" style={{background:"rgba(0,0,0,.25)",border:"1px solid var(--br)"}}>
            <div style={{fontSize:9,color:"#7a6a4a",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{lb}</div>
            <input className="oin" type="number" inputMode="numeric" placeholder="0" value={val} onChange={e=>onChange(key,e.target.value)} style={{borderBottom:"1px solid var(--br)",color:"#d4a017"}}/>
          </div>
        ))}
      </div>
      {showIbanSelect && toN(ib)>0 && (
        <div style={{marginBottom:12}}>
          <label className="fl">IBAN Kime Gitti? *</label>
          <select className="fi" value={ibanAlanId} onChange={e=>onChange("ibanAlanId",e.target.value)}>
            <option value="">Personel sec</option>
            {personeller.filter(p=>p.rol==="personel"&&p.aktif).map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}
          </select>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:"1px solid var(--br)"}}>
        <div>
          <div style={{fontSize:9,color:"#7a6a4a",letterSpacing:2,textTransform:"uppercase"}}>Beklenen</div>
          <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:23,color:"#d4a017",fontWeight:700}}>{fmt(toplam)}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:9,color:"#7a6a4a",letterSpacing:2,textTransform:"uppercase"}}>Girilen</div>
          <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:23,color:fark<1?"#80c040":"#c06060",fontWeight:700}}>{fmt(girilen)}</div>
        </div>
      </div>
      {fark>=1 && <div className="uyari">⚠ Toplam odeme ile beklenen toplam eslesmiyor.</div>}
    </div>
  );
});

// KayitForm Bileşeni
// ══════════════════════════════════════════════════════════════════════════
function KayitForm({ilk, musteriDB, personeller, aktifKullanici, onKaydet, onIptal}) {
  const aktifPersoneller = personeller.filter(p=>p.rol==="personel"&&p.aktif);
  const secilebilirHizmetler = HIZMETLER;
  const [musteri,  setMusteri]  = useState(ilk?.musteri||"");
  const [tel,      setTel]      = useState(ilk?.tel||"");
  const [gelisTipi,setGelisTipi]= useState(ilk?.gelisTipi||"Direkt");
  const bosHizmet = () => ({id:uid(),n:"",f:"",pId:aktifKullanici?.id||"",pAd:aktifKullanici?.ad||""});
  const hazirHizler = (liste=[]) => {
    const temiz = (liste||[]).filter(x=>x && (x.n || x.f));
    return temiz.some(x=>!x.n) ? temiz : [...temiz, bosHizmet()];
  };
  const [hizler,   setHizler]   = useState(ilk?.hizler?.length ? hazirHizler(ilk.hizler) : [bosHizmet()]);
  const [urunler,  setUrunler]  = useState(ilk?.urunler||[]);
  const [hKK, setHKK] = useState(String(ilk?.hizKK||""));
  const [hIB, setHIB] = useState(String(ilk?.hizIB||""));
  const [hNK, setHNK] = useState(String(ilk?.hizNK||""));
  const [hIbanAlanId, setHIbanAlanId] = useState(ilk?.hizIbanAlanId || ilk?.ibanAlanId || "");
  const [uKK, setUKK] = useState(String(ilk?.uKK||""));
  const [uIB, setUIB] = useState(String(ilk?.uIB||""));
  const [uNK, setUNK] = useState(String(ilk?.uNK||""));
  const [uIbanAlanId, setUIbanAlanId] = useState(ilk?.uIbanAlanId||"");
  const [barkod,   setBarkod]   = useState("");
  const [bSonuc,   setBSonuc]   = useState([]);
  const [bHata,    setBHata]    = useState("");
  const [arama,    setArama]    = useState("");
  const [aMarka,   setAMarka]   = useState("all");
  const [moneri,   setMoneri]   = useState([]);
  const bRef = useRef(null);

  const seciliHizIban = aktifPersoneller.find(p=>p.id===hIbanAlanId);
  const seciliUrunIban = aktifPersoneller.find(p=>p.id===uIbanAlanId);

  const hSil = id => setHizler(p=>{
    const kalan = p.filter(x=>x.id!==id);
    return kalan.length ? (kalan.some(x=>!x.n) ? kalan : [...kalan, bosHizmet()]) : [bosHizmet()];
  });
  const hGuncelle = (id,alan,deger) => setHizler(p=>{
    let next = p.map(x=>{
      if(x.id!==id) return x;
      if(alan==="pId"){
        const pp = aktifPersoneller.find(a=>a.id===deger);
        return {...x,pId:deger,pAd:pp?.ad||""};
      }
      return {...x,[alan]:deger};
    });
    const guncel = next.find(x=>x.id===id);
    if(alan==="n" && deger && guncel && !next.some(x=>!x.n)) next = [...next, bosHizmet()];
    return next;
  });

  const uGuncelle = (id,alan,deger) => setUrunler(p=>p.map(x=>{
    if(x.id!==id) return x;
    if(alan==="saticiId"){
      const pp = aktifPersoneller.find(a=>a.id===deger);
      return {...x,saticiId:deger,saticiAd:pp?.ad||""};
    }
    return {...x,[alan]:deger};
  }));
  const uSil = id => setUrunler(p=>p.filter(x=>x.id!==id));

  const barkodSonuc = barkod.trim().length>=2
    ? URUN_DB.filter(u=>u.b.includes(barkod.trim())).slice(0,8)
    : [];
  useEffect(()=>{
    setBSonuc(barkodSonuc);
    setBHata(barkod.trim().length>=2 && barkodSonuc.length===0 ? '"'+barkod.trim()+'" bulunamadi.' : "");
  },[barkod]);
  const sEkle   = u => { 
    setUrunler(p=>[...p,{...u,id:uid(),qty:1,sf:String(u.sp),saticiId:aktifKullanici?.id||"",saticiAd:aktifKullanici?.ad||""}]); 
    setBarkod("");setBSonuc([]);setBHata("");setArama("");setTimeout(()=>bRef.current?.focus(),80); 
  };
  const aSonuc  = arama.trim().length>=1 ? URUN_DB.filter(u=>{
    const q=normText(arama);
    const ok=aMarka==="all"||u.m===aMarka;
    return ok && urunAramaMetni(u).includes(q);
  }).slice(0,15) : [];
  const doluHizler = hizler.filter(h=>h.n);
  const hizmetPersonelTek = [...new Set(doluHizler.map(h=>h.pId).filter(Boolean))];
  const otomatikHizIbanId = !hIbanAlanId && hizmetPersonelTek.length===1 ? hizmetPersonelTek[0] : "";
  const finalHizIbanId = hIbanAlanId || otomatikHizIbanId;
  const finalHizIbanAd = aktifPersoneller.find(p=>p.id===finalHizIbanId)?.ad || "";
  const hizmetTop = hizler.reduce((s,h)=>s+toN(h.f),0);
  const urunTop = urunler.reduce((s,u)=>s+toN(u.sf||u.sp)*toN(u.qty||1),0);
  const genelTop = hizmetTop + urunTop;
  const hizmetOdemeTop = toN(hKK)+toN(hIB)+toN(hNK);
  const urunOdemeTop = toN(uKK)+toN(uIB)+toN(uNK);
  const odemeTop = hizmetOdemeTop + urunOdemeTop;

  const kaydetTikla = () => {
    const temizH = hizler.filter(h=>h.n && toN(h.f)>0 && h.pId);
    const temizU = urunler.filter(u=>u.a && toN(u.sf||u.sp)>0 && toN(u.qty)>0 && u.saticiId);
    onKaydet({
      id:ilk?.id,musteri,tel,gelisTipi,
      hizler:temizH, urunler:temizU,
      hizKK:hKK,hizIB:hIB,hizNK:hNK,
      uKK:uKK,uIB:uIB,uNK:uNK,
      hizIbanAlanId:finalHizIbanId, hizIbanAlanAd: finalHizIbanAd,
      uIbanAlanId:uIbanAlanId, uIbanAlanAd: seciliUrunIban?.ad||""
    });
  };

  return (
    <div className="ov">
      <div className="mod">
        <div className="mhd">
          <span className="mtl">{ilk?.id?"Kaydi Duzenle":"Yeni Kayit"}</span>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{padding:"6px 10px",border:"1px solid var(--br)",borderRadius:999,fontSize:11,color:"var(--g)",background:"rgba(212,160,23,.08)",maxWidth:180,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>👤 {aktifKullanici?.ad||""}</div>
            <button className="xbtn" onClick={onIptal}>✕</button>
          </div>
        </div>
        <div className="mbody">
          <div className="r2">
            <div style={{position:"relative"}}>
              <label className="fl">Ad Soyad *</label>
              <input className="fi" placeholder="Ali Yilmaz" value={musteri}
                onChange={e=>{setMusteri(e.target.value);const q=e.target.value.toLowerCase();setMoneri(q.length>=2?musteriDB.filter(m=>m.ad.toLowerCase().includes(q)||m.tel.includes(e.target.value)).slice(0,5):[]);}}
                onBlur={()=>setTimeout(()=>setMoneri([]),180)}/>
              {moneri.length>0&&<div className="mus-on">{moneri.map(m=><div key={m.id} className="mus-oi" onMouseDown={()=>{setMusteri(m.ad);setTel(m.tel);setMoneri([]);}}>
                <div style={{fontSize:13,color:"#e8dcc8"}}>{m.ad}</div>
                {m.tel&&<div style={{fontSize:10,color:"#7a6a4a"}}>📞 {m.tel}</div>}
              </div>)}</div>}
            </div>
            <div>
              <label className="fl">Telefon</label>
              <input className="fi" placeholder="05XX..." value={tel} onChange={e=>setTel(e.target.value)}/>
            </div>
          </div>

          <div className="r2" style={{marginBottom:12}}>
            <div>
              <label className="fl">Gelis Turu</label>
              <select className="fi" value={gelisTipi} onChange={e=>setGelisTipi(e.target.value)}>
                <option>Direkt</option>
                <option>Telefon Randevu</option>
                <option>WhatsApp Randevu</option>
              </select>
            </div>
            <div style={{display:"flex",alignItems:"end"}}>
              <div style={{width:"100%",padding:"11px 13px",border:"1px solid var(--br)",borderRadius:10,color:"var(--g)",background:"rgba(212,160,23,.06)",fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>👤 Giris Yapan: {aktifKullanici?.ad||""}</div>
            </div>
          </div>

          <div className="sc sc-h">
            <div className="sc-hd">
              <div className="sc-n" style={{background:"linear-gradient(135deg,#4a8a10,#2a6008)",color:"#fff"}}>✂</div>
              <div className="sc-t" style={{color:"#80c040"}}>Hizmetler</div>
            </div>

            <div style={{border:"1px solid rgba(128,192,64,.22)",borderRadius:16,overflow:"hidden",background:"rgba(20,24,12,.55)"}}>
              <div style={{display:"grid",gridTemplateColumns:"2.1fr 1fr auto",gap:0,background:"rgba(128,192,64,.08)",borderBottom:"1px solid rgba(128,192,64,.15)"}}>
                <div style={{padding:"10px 12px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#9bc85a",fontWeight:700}}>Hizmet</div>
                <div style={{padding:"10px 12px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#9bc85a",fontWeight:700}}>Fiyat</div>
                <div style={{padding:"10px 12px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#9bc85a",fontWeight:700,textAlign:"center"}}>Sil</div>
              </div>

              {hizler.map((h,i)=>(
                <div key={h.id} style={{display:"grid",gridTemplateColumns:"2.1fr 1fr auto",gap:0,borderBottom:i===hizler.length-1?"none":"1px solid rgba(128,192,64,.10)",alignItems:"stretch"}}>
                  <div style={{padding:"8px"}}>
                    <select className="fi" value={h.n} onChange={e=>hGuncelle(h.id,"n",e.target.value)} style={{margin:0}}>
                      <option value="">Hizmet sec</option>
                      {secilebilirHizmetler.map(x=><option key={x} value={x}>{x}</option>)}
                    </select>
                  </div>
                  <div style={{padding:"8px"}}>
                    <input className="fi" type="number" inputMode="numeric" value={h.f} onChange={e=>hGuncelle(h.id,"f",e.target.value)} placeholder="0" disabled={!h.n} style={{margin:0}}/>
                  </div>
                  <div style={{padding:"8px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {h.n ? <button className="btn-i" style={{margin:0,padding:"12px 10px",minWidth:56}} onClick={()=>hSil(h.id)}>Sil</button> : <div style={{width:56}} />}
                  </div>
                </div>
              ))}
            </div>

            <div style={{marginTop:8,fontSize:11,color:"#7ea34d"}}>Bir hizmet sectiginde altta otomatik yeni satir acilir.</div>

            <OdemeGir baslik="Hizmet Odeme Dagilimi" kk={hKK} ib={hIB} nk={hNK} ibanAlanId={finalHizIbanId} personeller={aktifPersoneller} toplam={hizmetTop} showIbanSelect={false}
              onChange={(alan,val)=>{
                if(alan==="kk") setHKK(val);
                else if(alan==="ib") setHIB(val);
                else if(alan==="nk") setHNK(val);
                else if(alan==="ibanAlanId") setHIbanAlanId(val);
              }}
            />
          </div>

          <div className="sc sc-u">
            <div className="sc-hd">
              <div className="sc-n" style={{background:"linear-gradient(135deg,#1a5a9a,#0e3a6a)",color:"#fff"}}>🛍</div>
              <div className="sc-t" style={{color:"#60a0e0"}}>Urunler</div>
            </div>
            <label className="fl" style={{color:"#5a7aaa"}}>Barkod ile Ara</label>
            <div className="br-row">
              <input ref={bRef} className="br-in" placeholder="Barkod numarasi..." value={barkod}
                onChange={e=>setBarkod(normDigits(e.target.value))}/>
            </div>
            {bSonuc.length>0&&<div className="ares">{bSonuc.map(u=><div key={u.b} className="aitem" onClick={()=>sEkle(u)}>
              <div style={{width:7,height:7,borderRadius:"50%",background:MRENK[u.m]||"#4a80c0",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,color:"#e8dcc8"}}>{u.a}</div><div style={{fontSize:9,color:"#3a4a6a"}}>{u.b} · {u.m} · {u.ml}</div></div>
              <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:13,color:"#60a0e0"}}>{fmt(u.sp)}</div>
            </div>)}</div>}
            {bHata&&<div className="hata">{bHata}</div>}

            <label className="fl" style={{color:"#5a7aaa",marginTop:10}}>Urun Adi ile Ara</label>
            <div className="ar-row">
              <input className="ar-in" placeholder="Orn: Alpha, Shampoo, Serum..." value={arama} onChange={e=>setArama(e.target.value)}/>
              <select className="msel" value={aMarka} onChange={e=>setAMarka(e.target.value)}>
                <option value="all">Tumu</option>
                {MARKALAR.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            {aSonuc.length>0&&<div className="ares">{aSonuc.map(u=><div key={u.b} className="aitem" onClick={()=>sEkle(u)}>
              <div style={{width:7,height:7,borderRadius:"50%",background:MRENK[u.m]||"#4a80c0",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,color:"#e8dcc8"}}>{u.a}</div><div style={{fontSize:9,color:"#3a4a6a"}}>{u.m} · {u.ml}</div></div>
              <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:13,color:"#60a0e0"}}>{fmt(u.sp)}</div>
            </div>)}</div>}

            {urunler.length===0 ? <div className="sbos">Urun eklenmedi (istege bagli)</div> :
              <div style={{border:"1px solid rgba(96,160,224,.22)",borderRadius:16,overflow:"hidden",background:"rgba(10,18,28,.55)"}}>
                <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 70px 110px 56px",gap:0,background:"rgba(96,160,224,.08)",borderBottom:"1px solid rgba(96,160,224,.15)"}}>
                  <div style={{padding:"10px 12px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#8ab6f0",fontWeight:700}}>Urun</div>
                  <div style={{padding:"10px 8px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#8ab6f0",fontWeight:700,textAlign:"center"}}>Adet</div>
                  <div style={{padding:"10px 8px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#8ab6f0",fontWeight:700,textAlign:"center"}}>Fiyat</div>
                  <div style={{padding:"10px 8px",fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#8ab6f0",fontWeight:700,textAlign:"center"}}>Sil</div>
                </div>

                {urunler.map((u,i)=><div key={u.id} style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 70px 110px 56px",gap:0,borderBottom:i===urunler.length-1?"none":"1px solid rgba(96,160,224,.10)",alignItems:"stretch"}}>
                  <div style={{padding:"10px 12px",minWidth:0}}>
                    <div style={{fontSize:12,color:"#e8dcc8",lineHeight:1.35,whiteSpace:"normal",wordBreak:"break-word"}}>{u.a}</div>
                    <div style={{fontSize:9,color:"#5a7aaa",marginTop:3}}>{u.b} · {u.m} · {u.ml}</div>
                  </div>
                  <div style={{padding:"8px"}}>
                    <input className="fi" type="number" inputMode="numeric" value={u.qty} onChange={e=>uGuncelle(u.id,"qty",e.target.value)} style={{margin:0,textAlign:"center",padding:"10px 8px"}}/>
                  </div>
                  <div style={{padding:"8px"}}>
                    <input className="fi" type="number" inputMode="numeric" value={u.sf} onChange={e=>uGuncelle(u.id,"sf",e.target.value)} style={{margin:0,textAlign:"center",padding:"10px 8px"}}/>
                  </div>
                  <div style={{padding:"8px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <button className="btn-i" style={{margin:0,padding:"12px 8px",minWidth:40}} onClick={()=>uSil(u.id)}>Sil</button>
                  </div>
                </div>)}
              </div>
            }

            <OdemeGir baslik="Urun Odeme Dagilimi" kk={uKK} ib={uIB} nk={uNK} ibanAlanId={uIbanAlanId} personeller={aktifPersoneller} toplam={urunTop}
              onChange={(alan,val)=>{
                if(alan==="kk") setUKK(val);
                else if(alan==="ib") setUIB(val);
                else if(alan==="nk") setUNK(val);
                else if(alan==="ibanAlanId") setUIbanAlanId(val);
              }}
            />
          </div>

          <div className="sc sc-g">
            <div className="sc-hd">
              <div className="sc-n" style={{background:"linear-gradient(135deg,#d4a017,#b8860b)",color:"#0a0805"}}>Σ</div>
              <div className="sc-t" style={{color:"#d4a017"}}>Genel Ozet</div>
            </div>
            <div className="o3">
              <div className="ok2"><div style={{fontSize:9,color:"#7a6a4a"}}>Hizmet</div><div className="kv" style={{fontSize:24}}>{fmt(hizmetTop)}</div></div>
              <div className="ok2"><div style={{fontSize:9,color:"#7a6a4a"}}>Urun</div><div className="kv" style={{fontSize:24}}>{fmt(urunTop)}</div></div>
              <div className="ok2"><div style={{fontSize:9,color:"#7a6a4a"}}>Toplam</div><div className="kv" style={{fontSize:24}}>{fmt(genelTop)}</div></div>
            </div>
            {hizmetTop>0 && hizmetOdemeTop>0 && Math.abs(hizmetOdemeTop-hizmetTop)>=1 && <div className="uyari">⚠ Hizmet odeme toplami ile hizmet toplami esit degil.</div>}
            {urunTop>0 && urunOdemeTop>0 && Math.abs(urunOdemeTop-urunTop)>=1 && <div className="uyari">⚠ Urun odeme toplami ile urun toplami esit degil.</div>}
          </div>

          <div className="btn-r">
            <button className="btn-i" onClick={onIptal}>Iptal</button>
            <button className="btn-k"
              disabled={!musteri.trim()||(!hizler.some(h=>h.n&&toN(h.f)>0&&h.pId)&&!urunler.some(u=>u.a&&toN(u.sf||u.sp)>0&&toN(u.qty)>0&&u.saticiId))}
              onClick={kaydetTikla}>
              {ilk?.id?"Guncelle":"Kaydet"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Ana Uygulama
// ══════════════════════════════════════════════════════════════════════════
function App() {
  const [ekran,    setEkran]    = useState("login");
  const [kullanici,setKullanici]= useState(null);
  const [records,  setRecords]  = useState([]);
  const [bekleyen, setBekleyen] = useState([]);
  const [musteriDB,setMusteriDB]= useState([]);
  const [devDB,    setDevDB]    = useState({});
  const [yukleniyor,setYukleniyor]= useState(true);
  const [personeller,setPersoneller]= useState(DEFAULT_PERSONELLER);
  const [pin,      setPin]      = useState("");
  const [pinHata,  setPinHata]  = useState(false);
  const [devUyari, setDevUyari] = useState(false);
  const [devSec,   setDevSec]   = useState("");
  const [devDiger, setDevDiger] = useState("");
  const [kayitForm,setKayitForm]= useState(null);
  const [detayModal,setDetayModal]= useState(null);
  const [silOnay,  setSilOnay]  = useState(null);
  const [gsOnay,   setGsOnay]   = useState(false);
  const [toast,    setToast]    = useState({g:false,m:"",t:"ba"});
  const [adminSekme,setAdminSekme]= useState("ozet");
  const [pFiltre,  setPFiltre]  = useState("all");
  const [tFiltre,  setTFiltre]  = useState("");
  const [pEkle,    setPEkle]    = useState(false);
  const [pDuz,     setPDuz]     = useState(null);
  const [yeniP,    setYeniP]    = useState({ad:"",pin:"",rol:"personel",hizmetYuzde:"50",urunYuzde:"0",ibanEtiket:""});
  const [pHata,    setPHata]    = useState("");

  // Veri yükle (önce local, sonra varsa Supabase)
  useEffect(()=>{
    (async()=>{
      setYukleniyor(true);
      try {
        const local = JSON.parse(localStorage.getItem("apron_v2_data")||"null");
        if(local){
          setRecords((local.records||[]).map(mapR));
          setBekleyen((local.bekleyen||[]).map(mapR));
          setMusteriDB(local.musteriDB||[]);
          setPersoneller(local.personeller?.length ? local.personeller : DEFAULT_PERSONELLER);
          setDevDB(local.devDB||{});
        }
        const [k,m,d] = await Promise.all([
          dbAl("kayitlar",{order:"created_at",asc:false}),
          dbAl("musteriler"),
          dbAl("devamsizliklar"),
        ]);
        if(k.length||m.length||d.length){
          setRecords(k.filter(r=>r.gonderildi).map(mapR));
          setBekleyen(k.filter(r=>!r.gonderildi).map(mapR));
          setMusteriDB(m.map(x=>({id:x.id,ad:x.ad,tel:x.tel||""})));
          const dm={};d.forEach(x=>{dm[x.tarih+"_"+x.staff_id]=x.aciklama;});
          setDevDB(dm);
        }
      } catch(e){ console.warn("DB hatasi:",e); }
      setYukleniyor(false);
    })();
  },[]);

  useEffect(()=>{
    if(yukleniyor) return;
    const packed = {
      records,bekleyen,musteriDB,personeller,devDB
    };
    localStorage.setItem("apron_v2_data", JSON.stringify(packed));
  },[records,bekleyen,musteriDB,personeller,devDB,yukleniyor]);

  const showToast = (m,t="ba") => { setToast({g:true,m,t}); setTimeout(()=>setToast(x=>({...x,g:false})),3200); };

  // Hesaplar
  const tumKayitlarVeBekleyen = [...bekleyen,...records];
  const myKayitlar = kullanici ? tumKayitlarVeBekleyen.filter(r=>involvedStaffIds({staff_id:r.staffId,hizmetler:[{__tip:"meta",gelisTipi:r.gelisTipi,hizKK:r.hizKK,hizIB:r.hizIB,hizNK:r.hizNK,hizIbanAlanId:r.hizIbanAlanId||r.ibanAlanId,hizIbanAlanAd:r.hizIbanAlanAd||r.ibanAlanAd,uKK:r.uKK,uIB:r.uIB,uNK:r.uNK,uIbanAlanId:r.uIbanAlanId||"",uIbanAlanAd:r.uIbanAlanAd||""},...(r.hizler||[])],urunler:r.urunler}).includes(kullanici.id)) : [];
  const myBekleyen = kullanici ? bekleyen.filter(r=>r.staffId===kullanici.id) : [];
  const tumKayitlar = records;
  const bugunku = tumKayitlar.filter(r=>r.tarih===TODAY());
  const filtreli = tumKayitlar.filter(r=>{if(pFiltre!=="all"&&r.staffId!==pFiltre)return false;if(tFiltre&&r.tarih!==tFiltre)return false;return true;});

  // PIN
  const pinGir = d => {
    const y = pin+d;
    if(y.length>4) return;
    setPin(y);
    if(y.length===4) setTimeout(()=>{
      const k = personeller.find(x=>x.pin===y&&x.aktif);
      if(!k){ setPinHata(true); setTimeout(()=>{setPin("");setPinHata(false);},700); return; }
      setKullanici(k); setPin(""); setPinHata(false);
      if(k.rol==="yonetici"){ setEkran("yonetici"); return; }
      // Devamsizlik kontrol
      const dun=new Date(); dun.setDate(dun.getDate()-1);
      const ds=dun.toISOString().split("T")[0];
      const dunKayit=[...records,...bekleyen].some(r=>r.staffId===k.id&&r.tarih===ds);
      if(!dunKayit&&!devDB[ds+"_"+k.id]){ setDevUyari(true); setDevSec(""); setDevDiger(""); }
      else setEkran("personel");
    },120);
  };

  const cikis = () => { setKullanici(null); setEkran("login"); setKayitForm(null); setDetayModal(null); };

  // Devamsizlik
  const devKaydet = () => {
    if(!devSec) return;
    const ac = devSec==="Diger"?devDiger.trim():devSec;
    if(!ac) return;
    const dun=new Date(); dun.setDate(dun.getDate()-1);
    const ds=dun.toISOString().split("T")[0];
    setDevDB(p=>({...p,[ds+"_"+kullanici.id]:ac,[TODAY()+"_"+kullanici.id]:ac}));
    dbUpsert("devamsizliklar",[{staff_id:kullanici.id,tarih:ds,aciklama:ac},{staff_id:kullanici.id,tarih:TODAY(),aciklama:ac}],"staff_id,tarih");
    setDevUyari(false);
    setEkran("personel");
  };

  // Kayit kaydet
  const kayitKaydet = f => {
    const hKK=toN(f.hizKK), hIB=toN(f.hizIB), hNK=toN(f.hizNK);
    const uKK=toN(f.uKK), uIB=toN(f.uIB), uNK=toN(f.uNK);
    const meta = {
      __tip:"meta", gelisTipi:f.gelisTipi||"Direkt",
      hizKK:hKK, hizIB:hIB, hizNK:hNK, hizIbanAlanId:f.hizIbanAlanId||"", hizIbanAlanAd:f.hizIbanAlanAd||"",
      uKK:uKK, uIB:uIB, uNK:uNK, uIbanAlanId:f.uIbanAlanId||"", uIbanAlanAd:f.uIbanAlanAd||""
    };
    const hizmetlerKayit = [meta, ...(f.hizler||[])];
    const urunlerKayit = (f.urunler||[]);
    const hizmetTop = (f.hizler||[]).reduce((s,h)=>s+toN(h.f),0);
    const urunTop = (f.urunler||[]).reduce((s,u)=>s+toN(u.sf||u.sp)*toN(u.qty||1),0);
    const top = hKK+hIB+hNK+uKK+uIB+uNK;

    if(!f.musteri.trim()){ showToast("Musteri adi zorunlu!","ha"); return; }
    if((f.hizler||[]).length===0 && (f.urunler||[]).length===0){ showToast("En az bir hizmet veya urun secin!","ha"); return; }
    if(Math.abs((hKK+hIB+hNK) - hizmetTop) >= 1){ showToast("Hizmet odeme toplami hatali!","ha"); return; }
    if(Math.abs((uKK+uIB+uNK) - urunTop) >= 1){ showToast("Urun odeme toplami hatali!","ha"); return; }
    if(hIB>0 && !f.hizIbanAlanId && [...new Set((f.hizler||[]).map(h=>h.pId).filter(Boolean))].length!==1){ showToast("Hizmet IBAN kime gittiyse secilmek zorunda!","ha"); return; }
    if(uIB>0 && !f.uIbanAlanId){ showToast("Urun IBAN kime gittiyse secilmek zorunda!","ha"); return; }

    if(f.id) {
      const tekHizPid=[...new Set((f.hizler||[]).map(h=>h.pId).filter(Boolean))];
      const otoHizPid=!f.hizIbanAlanId && tekHizPid.length===1 ? tekHizPid[0] : "";
      const otoHizPad=personeller.find(p=>p.id===otoHizPid)?.ad||"";
      const gn={...f,hizler:f.hizler,urunler:f.urunler,hizKK:hKK,hizIB:hIB,hizNK:hNK,uKK:uKK,uIB:uIB,uNK:uNK,hizIbanAlanId:f.hizIbanAlanId||otoHizPid,hizIbanAlanAd:f.hizIbanAlanAd||otoHizPad,toplam:top,gonderildi:bekleyen.some(r=>r.id===f.id)?false:true,ibanAlanId:f.hizIbanAlanId||otoHizPid||f.uIbanAlanId||"",ibanAlanAd:f.hizIbanAlanAd||otoHizPad||f.uIbanAlanAd||""};
      setBekleyen(p=>p.map(r=>r.id===f.id?gn:r));
      setRecords(p=>p.map(r=>r.id===f.id?gn:r));
      dbGuncelle("kayitlar",{musteri:f.musteri,telefon:f.tel,hizmetler:hizmetlerKayit,hiz_kk:hKK,hiz_ib:hIB,hiz_nk:hNK,urunler:urunlerKayit,urun_kk:uKK,urun_ib:uIB,urun_nk:uNK,toplam:top},f.id);
      showToast("Kayit guncellendi");
    } else {
      const tekHizPidYeni=[...new Set((f.hizler||[]).map(h=>h.pId).filter(Boolean))];
      const otoHizPidYeni=!f.hizIbanAlanId && tekHizPidYeni.length===1 ? tekHizPidYeni[0] : "";
      const otoHizPadYeni=personeller.find(p=>p.id===otoHizPidYeni)?.ad||"";
      const y={id:uid(),staffId:kullanici.id,staffAd:kullanici.ad,musteri:f.musteri.trim(),tel:f.tel.trim(),gelisTipi:f.gelisTipi||"Direkt",hizler:f.hizler,urunler:f.urunler,hizKK:hKK,hizIB:hIB,hizNK:hNK,uKK:uKK,uIB:uIB,uNK:uNK,toplam:top,tarih:TODAY(),saat:SAAT(),gonderildi:false,ibanAlanId:f.hizIbanAlanId||otoHizPidYeni||f.uIbanAlanId||"",ibanAlanAd:f.hizIbanAlanAd||otoHizPadYeni||f.uIbanAlanAd||"",hizIbanAlanId:f.hizIbanAlanId||otoHizPidYeni||"",hizIbanAlanAd:f.hizIbanAlanAd||otoHizPadYeni||"",uIbanAlanId:f.uIbanAlanId||"",uIbanAlanAd:f.uIbanAlanAd||""};
      setBekleyen(p=>[y,...p]);
      dbEkle("kayitlar",{id:y.id,staff_id:y.staffId,staff_name:y.staffAd,musteri:y.musteri,telefon:y.tel,hizmetler:hizmetlerKayit,hiz_kk:y.hizKK,hiz_ib:y.hizIB,hiz_nk:y.hizNK,urunler:urunlerKayit,urun_kk:y.uKK,urun_ib:y.uIB,urun_nk:y.uNK,toplam:y.toplam,tarih:y.tarih,saat:y.saat,gonderildi:false});
      const vm=musteriDB.find(m=>m.ad.toLowerCase()===f.musteri.trim().toLowerCase());
      if(!vm){const ym={id:uid(),ad:f.musteri.trim(),tel:f.tel.trim()};setMusteriDB(p=>[...p,ym]);dbEkle("musteriler",{id:ym.id,ad:ym.ad,tel:ym.tel});}
      showToast("Kayit eklendi!");
    }
    setKayitForm(null);
  };

  // Sil
  const kayitSil = id => {
    setRecords(p=>p.filter(r=>r.id!==id));
    setBekleyen(p=>p.filter(r=>r.id!==id));
    dbSil("kayitlar",id);
    setSilOnay(null);
    setDetayModal(null);
    showToast("Kayit silindi","uy");
  };

  // Gun sonu
  const gunSonu = () => {
    const ids=myBekleyen.map(r=>r.id);
    setRecords(p=>[...myBekleyen.map(r=>({...r,gonderildi:true})),...p]);
    setBekleyen(p=>p.filter(r=>r.staffId!==kullanici.id));
    setGsOnay(false);
    if(ids.length>0&&DB) DB.from("kayitlar").update({gonderildi:true}).in("id",ids).then(()=>{}).catch(()=>{});
    showToast("Veriler yoneticiye gonderildi!");
  };

  // Personel
  const pEkleKaydet = () => {
    setPHata("");
    if(!yeniP.ad.trim()){setPHata("Ad Soyad zorunlu");return;}
    if(!yeniP.pin||yeniP.pin.length!==4||!/^\d{4}$/.test(yeniP.pin)){setPHata("PIN 4 haneli sayi olmali");return;}
    if(personeller.find(p=>p.pin===yeniP.pin)){setPHata("Bu PIN kullaniliyor");return;}
    setPersoneller(p=>[...p,{id:"s"+uid(),ad:yeniP.ad.trim(),pin:yeniP.pin,rol:yeniP.rol,aktif:false,hizmetYuzde:toN(yeniP.hizmetYuzde),urunYuzde:toN(yeniP.urunYuzde),ibanEtiket:yeniP.ibanEtiket||""}]);
    setYeniP({ad:"",pin:"",rol:"personel",hizmetYuzde:"50",urunYuzde:"0",ibanEtiket:""});setPEkle(false);setPHata("");
    showToast("Personel eklendi — aktiflestirilmeyi bekliyor");
  };
  const pDuzKaydet = () => {
    setPHata("");
    if(!pDuz.ad.trim()){setPHata("Ad Soyad zorunlu");return;}
    if(!pDuz.pin||pDuz.pin.length!==4||!/^\d{4}$/.test(pDuz.pin)){setPHata("PIN 4 haneli olmali");return;}
    if(personeller.find(p=>p.pin===pDuz.pin&&p.id!==pDuz.id)){setPHata("Bu PIN baska personelde");return;}
    setPersoneller(p=>p.map(x=>x.id===pDuz.id?pDuz:x));
    setPDuz(null);setPHata("");showToast("Personel guncellendi");
  };

  const riIcon = r => r.hizler?.length>0&&r.urunler?.length>0?"✂️":r.hizler?.length>0?"✂️":"🛍️";

  const KayitKarti = ({r}) => (
    <div className={`kk${!r.gonderildi?" bk":""}`}>
      <div className="kk-ust" onClick={()=>setDetayModal(r)}>
        <div className="kikon">{riIcon(r)}</div>
        <div className="ki">
          <div className="kad">{r.musteri}{!r.gonderildi&&<span style={{fontSize:9,color:"#80c040",marginLeft:5,padding:"1px 5px",background:"rgba(80,160,0,.1)",borderRadius:4}}>Bekliyor</span>}</div>
          <div className="kalt">{[...(r.hizler||[]).map(h=>h.n||h),...(r.urunler?.length>0?[r.urunler.length+" urun"]:[])].join(" · ")} · {r.saat}</div>
          <div className="kpills">
            {(r.hizKK+r.uKK)>0&&<span className="kpill">💳 {fmt(r.hizKK+r.uKK)}</span>}
            {(r.hizIB+r.uIB)>0&&<span className="kpill">🏦 {fmt(r.hizIB+r.uIB)}</span>}
            {(r.hizNK+r.uNK)>0&&<span className="kpill">💵 {fmt(r.hizNK+r.uNK)}</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <div className="ktutar">{fmt(r.toplam)}</div>
          <div style={{fontSize:15,color:"#3a2e1e"}}>›</div>
        </div>
      </div>
      <div className="kk-alt">
        <button className="kalt-btn det" onClick={()=>setDetayModal(r)}>📋 Detay</button>
        <button className="kalt-btn duz" onClick={()=>setKayitForm(r)}>✏️ Duzenle</button>
        <button className="kalt-btn sil" onClick={()=>setSilOnay(r.id)}>🗑️ Sil</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0a0805"}}>
      <style>{CSS}</style>

      {toast.g&&<div className={`toast ${toast.t}`}>{toast.m}</div>}

      {/* Yükleniyor */}
      {yukleniyor&&<div className="yk-ekran"><img src={LOGO} height={90} style={{filter:"drop-shadow(0 4px 20px rgba(212,160,23,.3))"}}/><div style={{color:"#d4a017",fontSize:10,letterSpacing:4,textTransform:"uppercase"}}>Yukleniyor...</div></div>}

      {/* Devamsizlik */}
      {devUyari&&kullanici&&<div className="dev-ov">
        <div className="dev-k">
          <img src={LOGO} height={65} style={{display:"block",margin:"0 auto 14px"}}/>
          <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:19,color:"#d4a017",textAlign:"center",marginBottom:7}}>Eksik Veri Girisi</div>
          <div style={{fontSize:11,color:"#7a6a4a",textAlign:"center",marginBottom:18,lineHeight:1.6}}>
            <strong style={{color:"#d4a017"}}>{new Date(new Date().setDate(new Date().getDate()-1)).toLocaleDateString("tr-TR",{day:"2-digit",month:"long",year:"numeric"})}</strong> tarihine kayit bulunamadi.<br/>Devam etmek icin durumu secin.
          </div>
          <div style={{maxHeight:255,overflowY:"auto",marginBottom:13}}>
            {DEV_SECENEKLER.map(s=><div key={s} className={`dev-o${devSec===s?" s":""}`} onClick={()=>setDevSec(s)}>{s}</div>)}
          </div>
          {devSec==="Diger"&&<textarea placeholder="Aciklamanizi yazin..." value={devDiger} onChange={e=>setDevDiger(e.target.value)} style={{width:"100%",background:"#1a1510",border:"1px solid #2a2010",borderRadius:8,color:"#e8dcc8",fontFamily:"Jost,sans-serif",fontSize:12,padding:"9px 11px",outline:"none",resize:"none",height:65,marginBottom:11}}/>}
          <button className="btn-k" style={{width:"100%"}} disabled={!devSec||(devSec==="Diger"&&!devDiger.trim())} onClick={devKaydet}>Kaydet ve Devam Et</button>
        </div>
      </div>}

      {/* Sil onay */}
      {silOnay&&<div className="conf-ov"><div className="conf-k">
        <div className="conf-t">Kaydi Sil</div>
        <div className="conf-m">Bu kayit kalici olarak silinecek.<br/>Bu islem geri alinamaz.</div>
        <div className="btn-r"><button className="btn-i" onClick={()=>setSilOnay(null)}>Iptal</button><button className="btn-t" onClick={()=>kayitSil(silOnay)}>Sil</button></div>
      </div></div>}

      {/* Gun sonu onay */}
      {gsOnay&&<div className="conf-ov"><div className="gs-k">
        <img src={LOGO} height={55} style={{display:"block",margin:"0 auto 13px"}}/>
        <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:19,color:"#80c040",marginBottom:9,textAlign:"center"}}>Gun Sonu Gonder</div>
        <div style={{fontSize:11,color:"#7a6a4a",marginBottom:15,lineHeight:1.6,textAlign:"center"}}>Tum veriler Yonetici Paneline gonderilecek ve bekleyen kayitlariniz silinecektir.</div>
        <div className="gs-oz">
          <div className="gsl">Bekleyen kayit</div><div className="gsv">{myBekleyen.length} kayit</div>
          <div className="gsl" style={{marginTop:7}}>Toplam tutar</div><div className="gsv">{fmt(myBekleyen.reduce((s,r)=>s+r.toplam,0))}</div>
        </div>
        <div className="btn-r">
          <button className="btn-i" onClick={()=>setGsOnay(false)}>Hayir</button>
          <button className="btn-k" style={{background:"linear-gradient(135deg,#2a6a10,#1a4a08)",color:"#c0e080"}} onClick={gunSonu}>Evet, Gonder</button>
        </div>
      </div></div>}

      {/* Detay modal */}
      {detayModal&&<div className="ov" style={{zIndex:600}}>
        <div className="mod">
          <div className="mhd"><span className="mtl">Kayit Detayi</span><button className="xbtn" onClick={()=>setDetayModal(null)}>✕</button></div>
          <div className="mbody">
            <div className="det-b" style={{background:"#111008",border:"1px solid #2a2010"}}>
              <div className="det-l" style={{color:"#7a6a4a"}}>Musteri</div>
              <div style={{fontSize:17,color:"#e8dcc8",fontWeight:500}}>{detayModal.musteri}</div>
              {detayModal.tel&&<div style={{fontSize:11,color:"#7a6a4a",marginTop:3}}>📞 {detayModal.tel}</div>}
              <div style={{fontSize:10,color:"#5a4a2a",marginTop:5}}>{detayModal.tarih} · {detayModal.saat} · {detayModal.staffAd}</div>
              {!detayModal.gonderildi&&<span style={{fontSize:10,color:"#80c040",marginTop:5,display:"inline-block",padding:"1px 7px",background:"rgba(80,160,0,.1)",borderRadius:4}}>Gonderilmedi</span>}
            </div>
            {detayModal.hizler?.length>0&&<div className="det-b" style={{background:"linear-gradient(135deg,#131a08,#0e1205)",border:"1px solid #2a3a10"}}>
              <div className="det-l" style={{color:"#6a9a30"}}>✂ Hizmetler</div>
              {detayModal.hizler.map((h,i)=><div key={i} className="det-s"><span style={{fontSize:13,color:"#e8dcc8"}}>{h.n||h}</span>{toN(h.f||0)>0&&<span style={{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"#a0d060",fontWeight:700}}>{fmt(toN(h.f||0))}</span>}</div>)}
              <div className="det-top"><span style={{fontSize:10,color:"#5a7a20",letterSpacing:2,textTransform:"uppercase"}}>Hizmet Top.</span><span style={{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"#a0d060",fontWeight:700}}>{fmt(detayModal.hizKK+detayModal.hizIB+detayModal.hizNK)}</span></div>
            </div>}
            {detayModal.urunler?.length>0&&<div className="det-b" style={{background:"linear-gradient(135deg,#0e1018,#0a0c14)",border:"1px solid #1e2a3a"}}>
              <div className="det-l" style={{color:"#4a7aaa"}}>🛍 Urunler</div>
              {detayModal.urunler.map((u,i)=><div key={i} className="det-s"><div><div style={{fontSize:12,color:"#e8dcc8"}}>{u.a}</div><div style={{fontSize:9,color:"#3a4a6a",marginTop:1}}>{u.m} · {u.ml} · x{u.qty}</div></div><span style={{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"#60a0e0",fontWeight:700}}>{fmt(toN(u.sf)*u.qty)}</span></div>)}
              <div className="det-top"><span style={{fontSize:10,color:"#3a5a8a",letterSpacing:2,textTransform:"uppercase"}}>Urun Top.</span><span style={{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"#60a0e0",fontWeight:700}}>{fmt(detayModal.uKK+detayModal.uIB+detayModal.uNK)}</span></div>
            </div>}
            <div className="det-b" style={{background:"linear-gradient(135deg,#1e1a08,#140e04)",border:"1.5px solid #3a2e10"}}>
              <div className="det-l" style={{color:"#9a8a6a"}}>Odeme</div>
              <div className="o3">
                {[["💳","K.Karti",detayModal.hizKK+detayModal.uKK],["🏦","IBAN",detayModal.hizIB+detayModal.uIB],["💵","Nakit",detayModal.hizNK+detayModal.uNK]].map(([ic,lb,v])=>(
                  <div key={lb} className="ok2"><div style={{fontSize:16,marginBottom:3}}>{ic}</div><div style={{fontSize:9,color:"#7a6a4a",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{lb}</div><div style={{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:v>0?"#d4a017":"#2a2010",fontWeight:700}}>{fmt(v)}</div></div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:9,borderTop:"1px solid #2a2010"}}>
                <span style={{fontSize:11,color:"#9a8a6a",letterSpacing:2,textTransform:"uppercase"}}>Genel Toplam</span>
                <span style={{fontFamily:"Cormorant Garamond,serif",fontSize:28,color:"#d4a017",fontWeight:700}}>{fmt(detayModal.toplam)}</span>
              </div>
            </div>
            <div className="btn-r">
              <button className="btn-i" onClick={()=>setDetayModal(null)}>Kapat</button>
              <button className="btn-i" style={{color:"#c06060",borderColor:"#4a1010"}} onClick={()=>setSilOnay(detayModal.id)}>Sil</button>
              <button className="btn-k" onClick={()=>{setKayitForm(detayModal);setDetayModal(null);}}>Duzenle</button>
            </div>
          </div>
        </div>
      </div>}

      {/* Kayit formu */}
      {kayitForm&&<KayitForm ilk={kayitForm} musteriDB={musteriDB} personeller={personeller} aktifKullanici={kullanici} onKaydet={kayitKaydet} onIptal={()=>setKayitForm(null)}/>}

      {/* Personel ekle modal */}
      {pEkle&&<div className="conf-ov"><div className="conf-k" style={{maxWidth:310,border:"1px solid var(--br)"}}>
        <div className="conf-t">Yeni Personel</div>
        <div className="conf-m">Yonetici onayindan sonra aktif olur.</div>
        {[["Ad Soyad","ad","text","Ali Yilmaz"],["4 Haneli PIN","pin","number","1234"]].map(([lb,k,t,ph])=>(
          <div key={k} style={{textAlign:"left",marginBottom:10}}>
            <label className="fl">{lb}</label>
            <input className="fi" type={t} placeholder={ph} inputMode={t==="number"?"numeric":undefined} maxLength={t==="number"?4:undefined}
              value={yeniP[k]} onChange={e=>setYeniP(p=>({...p,[k]:t==="number"?e.target.value.replace(/\D/g,"").slice(0,4):e.target.value}))}/>
          </div>
        ))}
        <div style={{textAlign:"left",marginBottom:10}}>
          <label className="fl">Rol</label>
          <select className="fi" value={yeniP.rol} onChange={e=>setYeniP(p=>({...p,rol:e.target.value}))}>
            <option value="personel">Personel</option><option value="yonetici">Yonetici</option>
          </select>
        </div>
        <div className="r2" style={{marginBottom:10}}>
          <div><label className="fl">Hizmet %</label><input className="fi" type="number" inputMode="numeric" value={yeniP.hizmetYuzde||""} onChange={e=>setYeniP(p=>({...p,hizmetYuzde:e.target.value}))}/></div>
          <div><label className="fl">Urun %</label><input className="fi" type="number" inputMode="numeric" value={yeniP.urunYuzde||""} onChange={e=>setYeniP(p=>({...p,urunYuzde:e.target.value}))}/></div>
        </div>
        <div style={{textAlign:"left",marginBottom:14}}><label className="fl">IBAN Etiketi</label><input className="fi" value={yeniP.ibanEtiket||""} onChange={e=>setYeniP(p=>({...p,ibanEtiket:e.target.value}))} placeholder="Orn: Ahmet IBAN"/></div>
        {pHata&&<div className="hata">{pHata}</div>}
        <div className="btn-r"><button className="btn-i" onClick={()=>{setPEkle(false);setPHata("");}}>Iptal</button><button className="btn-k" onClick={pEkleKaydet}>Ekle</button></div>
      </div></div>}

      {/* Personel duzenle modal */}
      {pDuz&&<div className="conf-ov"><div className="conf-k" style={{maxWidth:310,border:"1px solid var(--br)"}}>
        <div className="conf-t">Personel Duzenle</div>
        <div style={{textAlign:"left",marginBottom:10}}><label className="fl">Ad Soyad</label><input className="fi" value={pDuz.ad} onChange={e=>setPDuz(p=>({...p,ad:e.target.value}))}/></div>
        <div style={{textAlign:"left",marginBottom:10}}><label className="fl">4 Haneli PIN</label><input className="fi" maxLength={4} inputMode="numeric" value={pDuz.pin} onChange={e=>setPDuz(p=>({...p,pin:e.target.value.replace(/\D/g,"").slice(0,4)}))}/></div>
        {pDuz.id!=="ad"&&<div style={{textAlign:"left",marginBottom:10}}><label className="fl">Rol</label><select className="fi" value={pDuz.rol} onChange={e=>setPDuz(p=>({...p,rol:e.target.value}))}><option value="personel">Personel</option><option value="yonetici">Yonetici</option></select></div>}
        <div className="r2" style={{marginBottom:10}}>
          <div><label className="fl">Hizmet %</label><input className="fi" type="number" inputMode="numeric" value={pDuz.hizmetYuzde||0} onChange={e=>setPDuz(p=>({...p,hizmetYuzde:e.target.value}))}/></div>
          <div><label className="fl">Urun %</label><input className="fi" type="number" inputMode="numeric" value={pDuz.urunYuzde||0} onChange={e=>setPDuz(p=>({...p,urunYuzde:e.target.value}))}/></div>
        </div>
        <div style={{textAlign:"left",marginBottom:10}}><label className="fl">IBAN Etiketi</label><input className="fi" value={pDuz.ibanEtiket||""} onChange={e=>setPDuz(p=>({...p,ibanEtiket:e.target.value}))}/></div>
        <div style={{textAlign:"left",marginBottom:14}}>
          <label className="fl">Durum</label>
          <div style={{display:"flex",gap:8}}>
            {[true,false].map(v=><button key={String(v)} onClick={()=>setPDuz(p=>({...p,aktif:v}))} style={{flex:1,padding:9,borderRadius:8,cursor:"pointer",fontFamily:"Jost,sans-serif",fontSize:11,border:`1.5px solid ${pDuz.aktif===v?(v?"#80c040":"#c06060"):"#2a2010"}`,background:pDuz.aktif===v?`rgba(${v?"80,160,0":"160,40,40"},.1)`:"transparent",color:pDuz.aktif===v?(v?"#80c040":"#c06060"):"#5a4a2a"}}>{v?"Aktif":"Pasif"}</button>)}
          </div>
        </div>
        {pHata&&<div className="hata">{pHata}</div>}
        <div className="btn-r"><button className="btn-i" onClick={()=>{setPDuz(null);setPHata("");}}>Iptal</button><button className="btn-k" onClick={pDuzKaydet}>Kaydet</button></div>
      </div></div>}

      {/* ──── LOGIN ──── */}
      {!yukleniyor&&ekran==="login"&&<div className="login-bg">
        <div style={{textAlign:"center",marginBottom:42}}>
          <img src={LOGO} height={120} style={{filter:"drop-shadow(0 4px 20px rgba(212,160,23,.3))"}}/>
          <div style={{color:"#5a4a2a",fontSize:10,letterSpacing:5,textTransform:"uppercase",marginTop:8}}>Yonetim Sistemi</div>
        </div>
        <div className="pin-kart">
          <div style={{textAlign:"center",color:"#7a6a4a",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:18}}>PIN Kodunuzu Girin</div>
          <div style={{display:"flex",gap:11,justifyContent:"center",marginBottom:22}}>
            {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?(pinHata?" e":" d"):""}`}/>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
            {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} className="pbtn" onClick={()=>pinGir(String(d))}>{d}</button>)}
            <div/>
            <button className="pbtn" onClick={()=>pinGir("0")}>0</button>
            <button className="pbtn" style={{color:"#7a6a4a",fontSize:16}} onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
          </div>
        </div>
        <div style={{marginTop:18,fontSize:10,color:"#3a2e1e",letterSpacing:2,textAlign:"center"}}>1111 · 2222 · 3333 · 4444 | YONETİCİ: 0000</div>
      </div>}

      {/* ──── PERSONEL ──── */}
      {!yukleniyor&&ekran==="personel"&&kullanici&&<div>
        <div className="tbar">
          <img src={LOGO} height={28}/>
          <div style={{flex:1,fontSize:11,color:"#7a6a4a"}}>{kullanici.ad}</div>
          {myBekleyen.length>0&&<button className="gsbtn" onClick={()=>setGsOnay(true)}>📤 Gun Sonu ({myBekleyen.length})</button>}
          <button className="tbtn" onClick={cikis}>Cikis</button>
        </div>
        <div className="pg">
          <div className="stat-kart">
            <div className="stat"><div className="sv">{myKayitlar.filter(r=>r.tarih===TODAY()).length}</div><div className="sl">Bugun</div></div>
            <div className="sep"/>
            <div className="stat"><div className="sv">{fmt(myKayitlar.filter(r=>r.tarih===TODAY()).reduce((s,r)=>s+r.toplam,0))}</div><div className="sl">Ciro</div></div>
            <div className="sep"/>
            <div className="stat"><div className="sv">{myBekleyen.length}</div><div className="sl">Bekleyen</div></div>
          </div>
          {myBekleyen.length>0&&<div className="bk-banner">
            <div><div style={{fontSize:12,color:"#80c040",fontWeight:600}}>⏳ {myBekleyen.length} kayit gonderilmeyi bekliyor</div><div style={{fontSize:10,color:"#5a7a30",marginTop:2}}>Gun sonunda gonder butonuna basin</div></div>
            <button className="gsbtn" onClick={()=>setGsOnay(true)}>Gonder</button>
          </div>}
          <button className="yeni-btn" onClick={()=>setKayitForm({})}>+ Yeni Kayit Ekle</button>
          <div className="sek">Kayitlarim</div>
          {myKayitlar.length===0?<div className="bos"><div style={{fontSize:42,marginBottom:9}}>📋</div><div style={{fontSize:11,letterSpacing:2}}>Henuz kayit yok</div></div>
            :myKayitlar.map(r=><KayitKarti key={r.id} r={r}/>)}
        </div>
      </div>}

      {/* ──── YONETİCİ ──── */}
      {!yukleniyor&&ekran==="yonetici"&&kullanici&&<div>
        <div className="tbar">
          <img src={LOGO} height={28}/>
          <div style={{flex:1,fontSize:11,color:"#7a6a4a"}}>Yonetici Paneli</div>
          <button className="tbtn" onClick={cikis}>Cikis</button>
        </div>
        <div className="atabs">
          {[["ozet","Ozet"],["kayitlar","Kayitlar"],["personel","Personel"],["musteriler","Musteriler"]].map(([id,lb])=>(
            <div key={id} className={`atab${adminSekme===id?" a":""}`} onClick={()=>setAdminSekme(id)}>{lb}</div>
          ))}
        </div>
        <div className="pg">

          {adminSekme==="ozet"&&<>
            <div className="kpi2">
              <div className="kpi"><div className="kl">Bugun Ciro</div><div className="kv">{fmt(bugunku.reduce((s,r)=>s+r.toplam,0))}</div><div className="ks">{bugunku.length} kayit</div></div>
              <div className="kpi"><div className="kl">Toplam Ciro</div><div className="kv">{fmt(tumKayitlar.reduce((s,r)=>s+r.toplam,0))}</div><div className="ks">{tumKayitlar.length} kayit</div></div>
            </div>
            <div className="sek" style={{marginBottom:9}}>Odeme Dagilimi — Bugun</div>
            <div className="og">
              {[["💳","K.Karti",bugunku.reduce((s,r)=>s+r.hizKK+r.uKK,0),tumKayitlar.reduce((s,r)=>s+r.hizKK+r.uKK,0)],["🏦","IBAN",bugunku.reduce((s,r)=>s+r.hizIB+r.uIB,0),tumKayitlar.reduce((s,r)=>s+r.hizIB+r.uIB,0)],["💵","Nakit",bugunku.reduce((s,r)=>s+r.hizNK+r.uNK,0),tumKayitlar.reduce((s,r)=>s+r.hizNK+r.uNK,0)]].map(([ic,lb,b,t])=>(
                <div key={lb} className="ok"><div style={{fontSize:20,marginBottom:5}}>{ic}</div><div style={{fontSize:9,color:"#5a4a2a",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{lb}</div><div style={{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"#d4a017",fontWeight:700}}>{fmt(b)}</div><div style={{fontSize:9,color:"#2a2010",marginTop:2}}>{fmt(t)} toplam</div></div>
              ))}
            </div>
            <div className="sek" style={{marginBottom:9}}>Personel</div>
            {personeller.filter(p=>p.rol==="personel"&&p.aktif).map(p=>{
              const pk=tumKayitlar.filter(r=>r.staffId===p.id);
              return <div key={p.id} className="pk">
                <div className="pav ak">{p.ad[0]}</div>
                <div className="pi"><div className="pad">{p.ad}</div>
                  <div style={{display:"flex",gap:13,marginTop:3,flexWrap:"wrap"}}>
                    <div style={{fontSize:10,color:"#5a4a2a"}}>Bugun: <span style={{color:"#d4a017",fontFamily:"Cormorant Garamond,serif",fontSize:13}}>{fmt(pk.filter(r=>r.tarih===TODAY()).reduce((s,r)=>s+r.toplam,0))}</span></div>
                    <div style={{fontSize:10,color:"#5a4a2a"}}>Toplam: <span style={{color:"#d4a017",fontFamily:"Cormorant Garamond,serif",fontSize:13}}>{fmt(pk.reduce((s,r)=>s+r.toplam,0))}</span></div>
                  </div>
                </div>
              </div>;
            })}
          </>}

          {adminSekme==="kayitlar"&&<>
            <div className="fil-row">
              <select className="fsel" value={pFiltre} onChange={e=>setPFiltre(e.target.value)}>
                <option value="all">Tum Personel</option>
                {personeller.filter(p=>p.rol==="personel").map(p=><option key={p.id} value={p.id}>{p.ad}</option>)}
              </select>
              <input type="date" className="fsel" value={tFiltre} onChange={e=>setTFiltre(e.target.value)}/>
            </div>
            <div style={{fontSize:11,color:"#5a4a2a",marginBottom:11}}>{filtreli.length} kayit · <span style={{color:"#d4a017",fontFamily:"Cormorant Garamond,serif",fontSize:13}}>{fmt(filtreli.reduce((s,r)=>s+r.toplam,0))}</span></div>
            {filtreli.length===0?<div className="bos"><div style={{fontSize:42,marginBottom:9}}>📋</div><div style={{fontSize:11,letterSpacing:2}}>Kayit bulunamadi</div></div>
              :filtreli.map(r=><div key={r.id} className="ak-k" onClick={()=>setDetayModal(r)}>
                <div className="ak-ku">
                  <div className="kikon">{riIcon(r)}</div>
                  <div className="ak-ki">
                    <div style={{fontSize:13,color:"#e8dcc8",fontWeight:500}}>{r.musteri}</div>
                    <div style={{fontSize:10,color:"#5a4a2a",marginTop:2}}>{r.staffAd} · {r.tarih} {r.saat}{r.tel?" · "+r.tel:""}</div>
                    <div className="tags">
                      {(r.hizler||[]).map((h,i)=><span key={i} className="tag">✂ {h.n||h}</span>)}
                      {(r.urunler||[]).map((u,i)=><span key={i} className="tag">🛍 {u.a?.split(" ")[0]} x{u.qty}</span>)}
                    </div>
                    <div className="kpills" style={{marginTop:5}}>
                      {(r.hizKK+r.uKK)>0&&<span className="kpill">💳 {fmt(r.hizKK+r.uKK)}</span>}
                      {(r.hizIB+r.uIB)>0&&<span className="kpill">🏦 {fmt(r.hizIB+r.uIB)}</span>}
                      {(r.hizNK+r.uNK)>0&&<span className="kpill">💵 {fmt(r.hizNK+r.uNK)}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                    <div className="ktutar">{fmt(r.toplam)}</div>
                    <div style={{fontSize:14,color:"#3a2e1e"}}>›</div>
                  </div>
                </div>
                <div className="ak-ka">
                  <span className="tag">{[(r.hizler?.length||0)>0&&(r.hizler?.length)+" hizmet",(r.urunler?.length||0)>0&&(r.urunler?.length)+" urun"].filter(Boolean).join(" · ")}</span>
                  <button className="sil-btn" onClick={e=>{e.stopPropagation();setSilOnay(r.id);}}>Sil</button>
                </div>
              </div>)}
          </>}

          {adminSekme==="personel"&&<>
            <button className="ep-btn" onClick={()=>{setYeniP({ad:"",pin:"",rol:"personel",hizmetYuzde:"50",urunYuzde:"0",ibanEtiket:""});setPHata("");setPEkle(true);}}>+ Yeni Personel Ekle</button>
            {personeller.filter(p=>!p.aktif&&p.rol!=="yonetici").length>0&&<>
              <div className="sek" style={{color:"#c08040",marginBottom:9}}>Onay Bekleyenler</div>
              {personeller.filter(p=>!p.aktif&&p.rol!=="yonetici").map(p=><div key={p.id} className="pk"><div className="pav pa">{p.ad[0]}</div><div className="pi"><div className="pad">{p.ad}</div><div className="ppin">PIN: {p.pin}</div><span className="pb2 pa">Pasif</span></div><div className="pak"><button className="pbt ok2" onClick={()=>setPersoneller(prev=>prev.map(x=>x.id===p.id?{...x,aktif:true}:x))}>Aktifles</button><button className="pbt" onClick={()=>{setPHata("");setPDuz({...p});}}>Duzenle</button><button className="pbt th" onClick={()=>setPersoneller(prev=>prev.filter(x=>x.id!==p.id))}>Sil</button></div></div>)}
              <div style={{height:1,background:"#1a1510",margin:"14px 0"}}/>
            </>}
            <div className="sek" style={{marginBottom:9}}>Aktif Personel</div>
            {personeller.filter(p=>p.aktif).map(p=><div key={p.id} className="pk"><div className="pav ak">{p.ad[0]}</div><div className="pi"><div className="pad">{p.ad}</div><div className="ppin">PIN: {p.pin}</div><div style={{fontSize:10,color:"#7a6a4a",marginTop:3}}>Hizmet %{p.hizmetYuzde||0} · Urun %{p.urunYuzde||0}</div><span className={`pb2 ${p.rol==="yonetici"?"yo":"ak"}`}>{p.rol==="yonetici"?"Yonetici":"Personel"}</span></div><div className="pak"><button className="pbt" onClick={()=>{setPHata("");setPDuz({...p});}}>Duzenle</button>{p.id!=="ad"&&<button className="pbt th" onClick={()=>setPersoneller(prev=>prev.map(x=>x.id===p.id?{...x,aktif:false}:x))}>Pasife Al</button>}</div></div>)}
          </>}

          {adminSekme==="musteriler"&&<>
            <div className="sek">{musteriDB.length} Musteri</div>
            {musteriDB.length===0?<div className="bos"><div style={{fontSize:42,marginBottom:9}}>👤</div><div style={{fontSize:11,letterSpacing:2}}>Henuz musteri kaydi yok</div></div>
              :musteriDB.map(m=><div key={m.id} className="pk"><div className="pav ak" style={{fontSize:14}}>{m.ad[0].toUpperCase()}</div><div className="pi"><div className="pad">{m.ad}</div>{m.tel&&<div style={{fontSize:11,color:"#7a6a4a",marginTop:2}}>📞 {m.tel}</div>}<div style={{fontSize:10,color:"#3a2e1e",marginTop:2}}>{tumKayitlar.filter(r=>r.musteri===m.ad).length} ziyaret</div></div></div>)}
          </>}

        </div>
      </div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

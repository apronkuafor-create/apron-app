                      onClick:()=>{
                        const raw=k.tel.replace(/[^0-9]/g,"");
                        const fmt2=raw.startsWith("90")?raw:raw.startsWith("0")?"90"+raw.slice(1):"90"+raw;
                        window.open("https://wa.me/"+fmt2,"_blank");
                      }},""),
                    btn({style:{background:"transparent",border:"1px solid var(--br)",
                      borderRadius:7,color:"var(--mu)",fontSize:13,padding:"5px 9px",cursor:"pointer"},
                      onClick:()=>setKomsuFrm({...k})},"✏"),
                    btn({style:{background:"transparent",border:"1px solid #3a1010",
                      borderRadius:7,color:"#c05050",fontSize:13,padding:"5px 9px",cursor:"pointer"},
                      onClick:()=>setKomsular(p=>p.filter(x=>x.id!==k.id))},"🗑")
                  )
                )
              )
            );
          })
    )
  );
}

// ── AVANS İSTE COMPONENT (Personel) ────────────────────────────────────────
function AvansIste({kul, avanslar, setAvanslar, showToast}) {
  const [acik, setAcik] = React.useState(false);
  const [tutar, setTutar] = React.useState("");
  const [notlar, setNotlar] = React.useState("");

  const benimAvanslar = (avanslar||[]).filter(a=>a.staffId===kul?.id)
    .sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const bekleyen = benimAvanslar.filter(a=>a.durum==="bekliyor");
  const toplam = benimAvanslar.filter(a=>a.durum==="onaylandi").reduce((s,a)=>s+toN(a.tutar),0);

  return div({style:{background:"rgba(37,99,168,.06)",border:"1px solid rgba(37,99,168,.2)",
    borderRadius:12,padding:14,marginBottom:14}},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:acik?12:0}},
      div(null,
        div({style:{fontSize:14,color:"var(--g)",fontWeight:600,letterSpacing:1}},"💵 Avans İste"),
        toplam>0&&div({style:{fontSize:12,color:"var(--mu)",marginTop:2}},
          "Toplam avans: "+fmt(toplam))
      ),
      btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
        borderRadius:8,color:"var(--g)",fontSize:13,padding:"6px 12px",cursor:"pointer"},
        onClick:()=>setAcik(p=>!p)},
        acik?"Kapat":"+ Avans İste")
    ),
    acik&&div({style:{marginTop:12}},
      div({style:{marginBottom:8}},
        lbl({className:"fl"},"Tutar (₺) *"),
        inp({className:"fi",type:"number",placeholder:"0",value:tutar,
          onChange:e=>setTutar(e.target.value)})
      ),
      div({style:{marginBottom:10}},
        lbl({className:"fl"},"Açıklama (İsteğe bağlı)"),
        inp({className:"fi",placeholder:"Neden ihtiyaç duyduğunuzu yazın...",
          value:notlar,onChange:e=>setNotlar(e.target.value)})
      ),
      bekleyen.length>0&&div({style:{padding:"8px 10px",background:"rgba(240,160,60,.08)",
        border:"1px solid rgba(240,160,60,.2)",borderRadius:8,marginBottom:10}},
        div({style:{fontSize:12,color:"#f0a060"}},"⏳ "+bekleyen.length+" bekleyen avans talebiniz var")
      ),
      div({className:"btn-r"},
        btn({className:"btn-i",onClick:()=>{setAcik(false);setTutar("");setNotlar("");}},"İptal"),
        btn({className:"btn-k",disabled:!tutar||toN(tutar)<=0,
          onClick:()=>{
            setAvanslar(p=>[...p,{
              id:uid(), staffId:kul.id, staffAd:kul.ad,
              tutar:toN(tutar), tarih:TODAY(), notlar,
              durum:"bekliyor", odendi:false
            }]);
            setTutar(""); setNotlar(""); setAcik(false);
            showToast("Avans talebiniz gönderildi");
          }},"Gönder")
      )
    ),
    // Geçmiş
    benimAvanslar.length>0&&!acik&&div({style:{marginTop:10,borderTop:"1px solid var(--br)",paddingTop:10}},
      div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:6}},"AVANS GEÇMİŞİ"),
      benimAvanslar.slice(0,3).map(a=>
        div({key:a.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}},
          div(null,
            div({style:{fontSize:13,color:"var(--tx)"}},fmt(a.tutar)),
            div({style:{fontSize:11,color:"var(--mu)",marginTop:1}},fmtT(a.tarih))
          ),
          h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:8,
            background:a.durum==="onaylandi"?"rgba(50,140,100,.1)":a.durum==="reddedildi"?"rgba(160,40,40,.1)":"rgba(240,160,60,.1)",
            border:"1px solid "+(a.durum==="onaylandi"?"rgba(50,140,100,.3)":a.durum==="reddedildi"?"rgba(160,40,40,.3)":"rgba(240,160,60,.3)"),
            color:a.durum==="onaylandi"?"var(--gr)":a.durum==="reddedildi"?"#c05050":"#f0a060"}},
            a.durum==="onaylandi"?"✓ Onaylandı":a.durum==="reddedildi"?"✕ Reddedildi":"⏳ Bekliyor")
        )
      )
    )
  );
}

// ── GELİR/GİDER MODÜLÜ ─────────────────────────────────────────────────────
function GelirGiderModul({tumK, personeller, giderler, setGiderler, avanslar, setAvanslar, ibanBildirimler, showToast, aktifSekme}) {
  const [sekmeLocal, setSekmeLocal] = React.useState("ozet");
  const sekme = aktifSekme || sekmeLocal;
  const setSekme = aktifSekme ? (()=>{}) : setSekmeLocal;
  const [secAy, setSecAy] = React.useState(new Date().toISOString().slice(0,7));
  const [giderFrm, setGiderFrm] = React.useState(null);
  const GID_KATEGORILER = ["Kira","Elektrik","Su","Doğalgaz","Maaş","SGK/Sigorta","Malzeme","Temizlik","Vergi","Avans Ödemesi","Diğer"];

  // Seçilen ay kayıtları
  const ayKayitlar = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)&&r.gonderildi!==false);
  const ayGiderler = (giderler||[]).filter(g=>g.tarih?.startsWith(secAy));
  const ayAvanslar = (avanslar||[]).filter(a=>a.durum==="onaylandi"&&a.tarih?.startsWith(secAy));

  // Personel bazlı gelir
  const pGelir = {};
  (personeller||[]).filter(p=>p.rol==="personel"&&p.aktif).forEach(p=>{
    const pk = ayKayitlar.filter(r=>r.staffId===p.id);
    pGelir[p.id] = {
      ad:p.ad,
      hizGelir: pk.reduce((s,r)=>s+(r.hizKK||0)+(r.hizIB||0)+(r.hizNK||0),0),
      urunGelir: pk.reduce((s,r)=>s+(r.uKK||0)+(r.uIB||0)+(r.uNK||0),0),
      kayitSay: pk.length,
      kkToplam: pk.reduce((s,r)=>s+(r.hizKK||0)+(r.uKK||0),0),
      ibToplam: pk.reduce((s,r)=>s+(r.hizIB||0)+(r.uIB||0),0),
      nkToplam: pk.reduce((s,r)=>s+(r.hizNK||0)+(r.uNK||0),0),
    };
    pGelir[p.id].toplam = pGelir[p.id].hizGelir + pGelir[p.id].urunGelir;
  });

  const topGelir = Object.values(pGelir).reduce((s,p)=>s+p.toplam,0);
  const topGider = ayGiderler.reduce((s,g)=>s+toN(g.tutar),0);
  const topAvans = ayAvanslar.reduce((s,a)=>s+toN(a.tutar),0);
  const netKar = topGelir - topGider;

  // Bekleyen avans talepleri
  const bekleyenAvans = (avanslar||[]).filter(a=>a.durum==="bekliyor");

  // Ay seçici
  const aylar = [];
  for(let i=0;i<12;i++){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    aylar.push(d.toISOString().slice(0,7));
  }

  return div(null,

    // Gider formu
    giderFrm&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.97)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:18,overflowY:"auto"}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:16,
        padding:20,maxWidth:400,width:"100%",margin:"auto"}},
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",marginBottom:14}},
          giderFrm.id?"Gider Düzenle":"Yeni Gider Ekle"),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
          div(null,lbl({className:"fl"},"Tarih *"),
            h("input",{type:"date",className:"fi",value:giderFrm.tarih||"",
              onChange:e=>setGiderFrm(p=>({...p,tarih:e.target.value}))})),
          div(null,lbl({className:"fl"},"Tutar (₺) *"),
            inp({className:"fi",type:"number",placeholder:"0",value:giderFrm.tutar||"",
              onChange:e=>setGiderFrm(p=>({...p,tutar:e.target.value}))}))
        ),
        div({style:{marginBottom:10}},lbl({className:"fl"},"Kategori *"),
          sel({className:"fi",value:giderFrm.kategori||"",
            onChange:e=>setGiderFrm(p=>({...p,kategori:e.target.value}))},
            opt("","Seçin..."),
            GID_KATEGORILER.map(k=>opt(k,k))
          )
        ),
        div({style:{marginBottom:14}},lbl({className:"fl"},"Açıklama"),
          inp({className:"fi",placeholder:"Detay...",value:giderFrm.aciklama||"",
            onChange:e=>setGiderFrm(p=>({...p,aciklama:e.target.value}))})),
        div({className:"btn-r"},
          btn({className:"btn-i",onClick:()=>setGiderFrm(null)},"İptal"),
          btn({className:"btn-k",
            disabled:!giderFrm.tarih||!giderFrm.tutar||!giderFrm.kategori,
            onClick:()=>{
              const g={...giderFrm,id:giderFrm.id||uid(),tutar:toN(giderFrm.tutar)};
              setGiderler(p=>giderFrm.id?p.map(x=>x.id===g.id?g:x):[...p,g]);
              setGiderFrm(null);
              showToast("Gider kaydedildi");
            }},"Kaydet")
        )
      )
    ),

    // Üst kontroller
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      sel({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:9,
        color:"var(--g)",fontSize:14,padding:"7px 12px",outline:"none",cursor:"pointer"},
        value:secAy,onChange:e=>setSecAy(e.target.value)},
        aylar.map(a=>opt(a, new Date(a+"-01").toLocaleDateString("tr-TR",{month:"long",year:"numeric"})))
      ),
      bekleyenAvans.length>0&&div({style:{fontSize:13,color:"#f0a060",
        padding:"5px 10px",borderRadius:8,background:"rgba(240,160,60,.1)",
        border:"1px solid rgba(240,160,60,.25)"}},
        "⏳ "+bekleyenAvans.length+" avans talebi")
    ),

    // Alt sekmeler - dışarıdan kontrol edilmiyorsa göster
    !aktifSekme&&div({style:{display:"flex",gap:0,borderBottom:"1px solid var(--br)",marginBottom:14}},
      [["ozet","📊 Özet"],["gelir","💚 Gelir"],["gider","🔴 Gider"],["avans","💵 Avans"]].map(([id,lb])=>
        div({key:id,style:{padding:"8px 14px",cursor:"pointer",fontSize:12,
          letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,
          color:sekme===id?"var(--g)":"var(--mu)",
          borderBottom:"2px solid "+(sekme===id?"var(--g)":"transparent"),transition:"all .2s"},
          onClick:()=>setSekme(id)},lb)
      )
    ),

    // ── ÖZET ──
    sekme==="ozet"&&div(null,
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}},
        [
          {lb:"Toplam Gelir",  v:fmt(topGelir),  ic:"💚",c:"var(--gr)"},
          {lb:"Toplam Gider",  v:fmt(topGider),  ic:"🔴",c:"#e06060"},
          {lb:"Net Kar",       v:fmt(netKar),     ic:"✨",c:netKar>=0?"var(--gr)":"#c05050"},
          {lb:"Avans Ödemeleri",v:fmt(topAvans),  ic:"💵",c:"#f0a060"},
        ].map(({lb,v,ic,c})=>
          div({key:lb,style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:13}},
            div({style:{fontSize:18,marginBottom:5}},ic),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:c,fontWeight:700}},v),
            div({style:{fontSize:11,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginTop:2}},lb)
          )
        )
      ),
      // Gelir vs Gider bar
      topGelir>0&&div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
        borderRadius:12,padding:14,marginBottom:12}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},
          "Gelir / Gider Oranı"),
        div({style:{height:10,borderRadius:5,background:"rgba(160,40,40,.3)",overflow:"hidden",marginBottom:6}},
          div({style:{height:"100%",borderRadius:5,background:"var(--gr)",
            width:Math.min(100,Math.round(topGelir/(topGelir+topGider)*100))+"%",transition:"width .5s"}})
        ),
        div({style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--mu)"}},
          h("span",null,"Gelir: "+fmt(topGelir)),
          h("span",null,"Gider: "+fmt(topGider))
        )
      ),
      // Personel özet
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:14}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
          "Personel Gelirleri"),
        Object.values(pGelir).sort((a,b)=>b.toplam-a.toplam).map(p=>
          div({key:p.ad,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 0",borderBottom:"1px solid var(--br)"}},
            div({style:{fontSize:14,color:"var(--tx)"}},(p.ad)),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:700}},fmt(p.toplam))
          )
        )
      )
    ),

    // ── GELİR ──
    sekme==="gelir"&&div(null,
      div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},
        "Personel Bazlı Gelir Detayı"),
      Object.values(pGelir).sort((a,b)=>b.toplam-a.toplam).map(p=>
        div({key:p.ad,style:{background:"var(--bg2)",border:"1px solid var(--br)",
          borderRadius:12,padding:14,marginBottom:10}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
            div(null,
              div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},(p.ad)),
              div({style:{fontSize:12,color:"var(--mu)",marginTop:2}},p.kayitSay+" kayıt")
            ),
            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--g)",fontWeight:700}},
              fmt(p.toplam))
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
            [
              ["✂ Hizmet Geliri",p.hizGelir,"var(--gr)"],
              ["📦 Ürün Geliri",p.urunGelir,"var(--bl)"],
            ].map(([lb,v,c])=>
              div({key:lb,style:{background:"var(--bg3)",borderRadius:8,padding:"9px 10px"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:c,fontWeight:600}},fmt(v)),
                div({style:{fontSize:11,color:"var(--mu)",marginTop:1,textTransform:"uppercase",letterSpacing:1}},lb)
              )
            )
          ),
          div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}},
            [["💳 K.Kartı",p.kkToplam],["🏦 IBAN",p.ibToplam],["💵 Nakit",p.nkToplam]].map(([lb,v])=>
              div({key:lb,style:{background:"var(--bg3)",borderRadius:7,padding:"6px 8px",textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(v)),
                div({style:{fontSize:10,color:"var(--mu)",marginTop:1,textTransform:"uppercase"}},lb)
              )
            )
          )
        )
      ),
      // İşletme toplam
      div({style:{background:"linear-gradient(135deg,var(--bg2),var(--bg3))",
        border:"1.5px solid rgba(37,99,168,.3)",borderRadius:12,padding:14,marginTop:4}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},
          "İşletme Toplam Geliri"),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
          [
            ["Hizmet",Object.values(pGelir).reduce((s,p)=>s+p.hizGelir,0),"var(--gr)"],
            ["Ürün",Object.values(pGelir).reduce((s,p)=>s+p.urunGelir,0),"var(--bl)"],
            ["Toplam",topGelir,"var(--g)"],
          ].map(([lb,v,c])=>
            div({key:lb,style:{background:"var(--bg3)",borderRadius:8,padding:"10px 8px",textAlign:"center"}},
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:17,color:c,fontWeight:700}},fmt(v)),
              div({style:{fontSize:11,color:"var(--mu)",marginTop:2,textTransform:"uppercase",letterSpacing:1}},lb)
            )
          )
        ),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}},
          [
            ["💳 K.Kartı", Object.values(pGelir).reduce((s,p)=>s+p.kkToplam,0)],
            ["🏦 IBAN",    Object.values(pGelir).reduce((s,p)=>s+p.ibToplam,0)],
            ["💵 Nakit",   Object.values(pGelir).reduce((s,p)=>s+p.nkToplam,0)],
          ].map(([lb,v])=>
            div({key:lb,style:{background:"var(--bg3)",borderRadius:7,padding:"6px 8px",textAlign:"center"}},
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(v)),
              div({style:{fontSize:10,color:"var(--mu)",marginTop:1,textTransform:"uppercase"}},lb)
            )
          )
        )
      )
    ),

    // ── GİDER ──
    sekme==="gider"&&div(null,
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div(null,
          div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase"}},"Giderler"),
          div({style:{fontSize:13,color:"var(--mu)",marginTop:2}},
            ayGiderler.length+" kayıt · "+fmt(topGider))
        ),
        btn({style:{background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
          borderRadius:9,color:"var(--g)",fontSize:14,padding:"8px 13px",cursor:"pointer"},
          onClick:()=>setGiderFrm({tarih:TODAY(),tutar:"",kategori:"",aciklama:""})},"+ Gider Ekle")
      ),

      ayGiderler.length>0&&(()=>{

          if(!katOzet[g.kategori]) katOzet[g.kategori]=0;
          katOzet[g.kategori]+=toN(g.tutar);

        return div({style:{background:"var(--bg2)",border:"1px solid var(--br)",
          borderRadius:12,padding:12,marginBottom:12}},
          div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:8}},"KATEGORİ DAĞILIMI"),

              div({style:{fontSize:13,color:"var(--tx)"}},(kat)),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,
                color:"#e06060",fontWeight:600}},fmt(tutar))
            )
          )

              background:"rgba(37,99,168,.1)",border:"1px solid rgba(37,99,168,.3)",
              color:"var(--g)",fontSize:14,cursor:"pointer"},
              onClick:()=>setGiderFrm({tarih:TODAY(),tutar:"",kategori:"",aciklama:""})},"+ İlk Gideri Ekle")

                  h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:7,
                    background:"rgba(224,96,96,.1)",border:"1px solid rgba(224,96,96,.2)",

                    borderRadius:6,color:"var(--mu)",fontSize:12,padding:"3px 8px",cursor:"pointer"},

                  btn({style:{background:"transparent",border:"1px solid #3a1010",
                    borderRadius:6,color:"#c05050",fontSize:12,padding:"3px 8px",cursor:"pointer"},
                    onClick:()=>setGiderler(p=>p.filter(x=>x.id!==g.id))},"🗑")
                )
              )
            )
          )

    // ── AVANS ──
    sekme==="avans"&&div(null,

      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,
        padding:14,marginBottom:14}},
        div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",
          marginBottom:12}},"👤 Personel Bazlı Detay"),
        (personeller||[]).filter(p=>p.rol==="personel"&&p.aktif).map(p=>{
          // IBAN kuralı:
          // - Normal personel: kendi kayıtlarındaki hizIB (hizIbanId kendisi veya boş)
          // - Maniküristten gelen: ibanBildirimler'de onaylananlar
          const normalHizIban = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)
            &&r.staffId===p.id&&(!r.hizIbanId||r.hizIbanId===p.id))
            .reduce((s,r)=>s+(r.hizIB||0),0);
          const onaylananIban = (ibanBildirimler||[]).filter(b=>b.hedefId===p.id
            &&b.durum==="onaylandi"&&b.tarih?.startsWith(secAy))
            .reduce((s,b)=>s+toN(b.tutar),0);
          const pUrunIban = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)&&r.staffId===p.id)
            .reduce((s,r)=>s+(r.uIB||0),0);
          const toplamIban = normalHizIban + onaylananIban + pUrunIban;
          const pIban = toplamIban;
          const manIban = onaylananIban;
          const pAvans = (avanslar||[]).filter(a=>a.staffId===p.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(secAy))

            div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              div({style:{background:"rgba(37,99,168,.06)",borderRadius:8,padding:"9px 10px"}},

                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,color:"var(--bl)",fontWeight:600}},fmt(toplamIban)),
                pIban>0&&div({style:{fontSize:11,color:"var(--mu)",marginTop:2}},"Hizmet: "+fmt(pIban)),
                (()=>{
              // Maniküristlerin isimlerini bul
              const manKayitlar = (tumK||[]).filter(r=>r.tarih?.startsWith(secAy)
                &&r.hizIbanId===p.id&&r.staffId!==p.id);
              const manIsimleri = [...new Set(manKayitlar.map(r=>r.staffAd||"?"))];
              return onaylananIban>0&&div(null,
                manIsimleri.map(ad=>
                  div({key:ad,style:{fontSize:11,color:"var(--bl)",marginTop:1}},

            })()

              div({style:{background:"rgba(240,160,60,.06)",borderRadius:8,padding:"9px 10px"}},
                div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,marginBottom:4}},"💵 AVANS"),
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:16,
                  color:pAvans>0?"#f0a060":"var(--mu)",fontWeight:600}},fmt(pAvans)),
                (avanslar||[]).filter(a=>a.staffId===p.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(secAy))

      // Bekleyen avans talepleri

            div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              div(null,
                div({style:{fontSize:15,color:"var(--tx)",fontWeight:500}},(a.staffAd)),
                div({style:{fontSize:12,color:"var(--mu)",marginTop:2}},fmtT(a.tarih)),
                a.notlar&&div({style:{fontSize:13,color:"var(--di)",marginTop:3,fontStyle:"italic"}},(a.notlar))
              ),
              div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"#f0a060",fontWeight:700}},fmt(a.tutar))
            ),
            div({style:{display:"flex",gap:8}},

                onClick:()=>{

  );
}



// ── VERGİ MUHASEBESİ MODÜLÜ ─────────────────────────────────────────────────
function VergiMuhasebesiModul({tumK, faturalar}) {
  const [secAy, setSecAy] = React.useState(new Date().toISOString().slice(0,7));
  const [kdvOran, setKdvOran] = React.useState(20);
  const [stopajTutar, setStopajTutar] = React.useState(0);
  const [secimler, setSecimler] = React.useState({kk:true, ib:true, nk:true});

  const oran = Math.max(0, toN(kdvOran)) / 100;
  const kdvIcinden = React.useCallback((brut)=>{
    const n = toN(brut);
    return oran > 0 ? n - (n / (1 + oran)) : 0;
  }, [oran]);

  const ayKayitlar = React.useMemo(()=>
    (tumK||[]).filter(r => (r.tarih||"").startsWith(secAy) && r.gonderildi !== false)
  ,[tumK, secAy]);

  const hesap = React.useMemo(()=>{
    const o = {
      kk:{ad:"Kredi Kartı", ikon:"💳", toplam:0, hizmet:0, urun:0},
      ib:{ad:"IBAN", ikon:"🏦", toplam:0, hizmet:0, urun:0},
      nk:{ad:"Nakit", ikon:"💵", toplam:0, hizmet:0, urun:0}
    };

    ayKayitlar.forEach(r=>{
      o.kk.hizmet += toN(r.hizKK); o.kk.urun += toN(r.uKK);
      o.ib.hizmet += toN(r.hizIB); o.ib.urun += toN(r.uIB);
      o.nk.hizmet += toN(r.hizNK); o.nk.urun += toN(r.uNK);
    });

    Object.keys(o).forEach(k=>{
      o[k].toplam = o[k].hizmet + o[k].urun;
      o[k].vergi = kdvIcinden(o[k].toplam);
      o[k].net = o[k].toplam - o[k].vergi;
    });

    const satisKdv = o.kk.vergi + o.ib.vergi + o.nk.vergi;
    const alisFaturalar = (faturalar||[]).filter(f => (f.tarih||"").startsWith(secAy));
    const alisToplam = alisFaturalar.reduce((s,f)=>s+toN(f.tutar),0);
    const alisKdv = kdvIcinden(alisToplam);
    const seciliSatisKdv = (secimler.kk?o.kk.vergi:0) + (secimler.ib?o.ib.vergi:0) + (secimler.nk?o.nk.vergi:0);
    const odenecekKdv = Math.max(0, seciliSatisKdv - alisKdv);
    const toplamVergiYuku = odenecekKdv + toN(stopajTutar);

    return {odeme:o, satisKdv, alisToplam, alisKdv, seciliSatisKdv, odenecekKdv, toplamVergiYuku};
  }, [ayKayitlar, faturalar, secAy, kdvIcinden, secimler, stopajTutar]);

  const Kart = ({id}) => {
    const x = hesap.odeme[id];
    const aktif = !!secimler[id];
    return div({style:{background:"var(--bg2)",border:"1px solid "+(aktif?"var(--g)":"var(--br)"),borderRadius:14,padding:13,marginBottom:10}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},
        div(null,
          div({style:{fontSize:15,color:"var(--tx)",fontWeight:700}},x.ikon+" "+x.ad),
          div({style:{fontSize:12,color:"var(--mu)",marginTop:4}},"Hizmet: "+fmt(x.hizmet)+" · Ürün: "+fmt(x.urun))
        ),
        btn({style:{background:aktif?"rgba(80,184,128,.13)":"rgba(160,40,40,.12)",border:"1px solid "+(aktif?"rgba(80,184,128,.35)":"rgba(160,40,40,.35)"),borderRadius:9,color:aktif?"var(--gr)":"#c05050",fontSize:12,fontWeight:700,padding:"7px 9px",cursor:"pointer",whiteSpace:"nowrap"},
          onClick:()=>setSecimler(p=>({...p,[id]:!p[id]}))},aktif?"✓ Vergiye Dahil":"✕ Hariç")
      ),
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}},
        div({style:{background:"var(--bg3)",borderRadius:10,padding:10}},
          div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Tahsilat"),
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--g)",fontWeight:700}},fmt(x.toplam))
        ),
        div({style:{background:"var(--bg3)",borderRadius:10,padding:10}},
          div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"KDV Hariç"),
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--tx)",fontWeight:700}},fmt(x.net))
        ),
        div({style:{background:"var(--bg3)",borderRadius:10,padding:10}},
          div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Vergi"),
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:aktif?"var(--g)":"#5a8a82",fontWeight:700}},fmt(aktif?x.vergi:0))
        )
      )
    );
  };

  return div(null,
    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:16,marginBottom:12}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}},
        div(null,
          div({style:{fontSize:22,color:"var(--g)",fontFamily:"Cormorant Garamond,serif",fontWeight:700}},"🧾 Vergi Muhasebesi"),
          div({style:{fontSize:12,color:"var(--mu)",marginTop:3}},"Ödeme türüne göre aylık vergi analizi")
        ),
        div({style:{display:"flex",gap:8,alignItems:"center"}},
          inp({type:"month",className:"fi",style:{width:150},value:secAy,onChange:e=>setSecAy(e.target.value)}),
          inp({type:"number",className:"fi",style:{width:78},value:kdvOran,onChange:e=>setKdvOran(e.target.value),placeholder:"KDV %"})
        )
      ),
      div({style:{fontSize:12,color:"#f0a060",lineHeight:1.5,background:"rgba(180,90,0,.08)",border:"1px solid rgba(180,90,0,.22)",borderRadius:10,padding:10}},
        "Not: Bu ekran yönetim ve takip amaçlıdır. Gerçek beyan için muhasebecinin net KDV oranı, istisna ve belge durumunu onaylaması gerekir."
      )
    ),

    div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:10,marginBottom:12}},
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Seçilen Satış KDV"),
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:26,color:"var(--g)",fontWeight:700}},fmt(hesap.seciliSatisKdv))
      ),
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Düşülecek Alış KDV"),
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:26,color:"var(--gr)",fontWeight:700}},fmt(hesap.alisKdv))
      ),
      div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:13,padding:13}},
        div({style:{fontSize:11,color:"var(--di)",letterSpacing:1,textTransform:"uppercase"}},"Ödenecek KDV"),
        div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:26,color:"#f0a060",fontWeight:700}},fmt(hesap.odenecekKdv))
      )
    ),

    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:14,marginBottom:12}},
      div({style:{fontSize:14,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}},"💳 Ödeme Türüne Göre Vergi"),
      h(Kart,{id:"kk"}),
      h(Kart,{id:"ib"}),
      h(Kart,{id:"nk"})
    ),

    div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:14,padding:14}},
      div({style:{fontSize:14,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}},"📌 Aylık Vergi Sonucu"),
      div({style:{display:"grid",gridTemplateColumns:"1fr 130px",gap:8,alignItems:"center",fontSize:13,color:"var(--mu)"}},
        div(null,"Toplam satış KDV"), div({style:{textAlign:"right",color:"var(--tx)",fontWeight:700}},fmt(hesap.satisKdv)),
        div(null,"Vergilendirilecek seçili satış KDV"), div({style:{textAlign:"right",color:"var(--g)",fontWeight:700}},fmt(hesap.seciliSatisKdv)),
        div(null,"Düşülecek alış KDV"), div({style:{textAlign:"right",color:"var(--gr)",fontWeight:700}},"- "+fmt(hesap.alisKdv)),
        div(null,"Gelir vergisi stopaj"), div(null,inp({type:"number",className:"fi",style:{textAlign:"right",padding:"7px 9px"},value:stopajTutar,onChange:e=>setStopajTutar(e.target.value),placeholder:"0"})),
        div({style:{borderTop:"1px solid var(--br)",paddingTop:9,color:"var(--tx)",fontWeight:700}},"Toplam vergi yükü"),
        div({style:{borderTop:"1px solid var(--br)",paddingTop:9,textAlign:"right",fontFamily:"Cormorant Garamond,serif",fontSize:24,color:"#f0a060",fontWeight:700}},fmt(hesap.toplamVergiYuku))
      )
    )
  );
}


// ── HESAP ÖZETİ MODÜLÜ ─────────────────────────────────────────────────────
function HesapOzetiModul({tumK, bankalar, hesapSaglama, setHesapSaglama, showToast}) {
  const [secTarih, setSecTarih] = React.useState(TODAY());
  const [girisBankalar, setGirisBankalar] = React.useState({});
  const [girisIban, setGirisIban] = React.useState("");
  const [girisNakit, setGirisNakit] = React.useState("");

  // Seçilen tarihin kaydedilmiş sağlamasını yükle
  React.useEffect(() => {
    const kayit = hesapSaglama[secTarih];
    if (kayit) {
      setGirisBankalar(kayit.kk || {});
      setGirisIban(String(kayit.iban || ""));
      setGirisNakit(String(kayit.nakit || ""));
    } else {
      setGirisBankalar({});
      setGirisIban("");
      setGirisNakit("");
    }
  }, [secTarih]);

  // Sistem verileri - seçilen tarih
  const gunKayitlar = (tumK||[]).filter(r => r.tarih === secTarih && r.gonderildi !== false);
  const sistemKK = gunKayitlar.reduce((s,r) => s+(r.hizKK||0)+(r.uKK||0), 0);
  const sistemIban = gunKayitlar.reduce((s,r) => s+(r.hizIB||0)+(r.uIB||0), 0);
  const sistemNakit = gunKayitlar.reduce((s,r) => s+(r.hizNK||0)+(r.uNK||0), 0);
  const sistemTop = sistemKK + sistemIban + sistemNakit;

  // Gerçek veriler
  const gercekKK = Object.values(girisBankalar).reduce((s,v) => s+toN(v), 0);
  const gercekIban = toN(girisIban);
  const gercekNakit = toN(girisNakit);
  const gercekTop = gercekKK + gercekIban + gercekNakit;

  // Eşleşme kontrolleri
  const kkEslesti = gercekKK > 0 && Math.abs(gercekKK - sistemKK) < 1;
  const ibanEslesti = gercekIban > 0 && Math.abs(gercekIban - sistemIban) < 1;
  const nakitEslesti = gercekNakit > 0 && Math.abs(gercekNakit - sistemNakit) < 1;
  const tumEslesti = kkEslesti && ibanEslesti && nakitEslesti;

  // Son 30 günün sağlama durumu
  const gunler = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const tarih = d.toISOString().split("T")[0];
    const kayitVar = (tumK||[]).some(r => r.tarih === tarih && r.gonderildi !== false);
    const saglama = hesapSaglama[tarih];
    if (kayitVar) gunler.push({ tarih, saglama });
  }
  const yapilmayanGunler = gunler.filter(g => !g.saglama);
  const yapılanGunler = gunler.filter(g => g.saglama);

  const kaydet = () => {
    if (!gercekKK && !gercekIban && !gercekNakit) {
      showToast("Gerçek tutarları girin", "uy"); return;
    }
    const yeniKayit = {
      tarih: secTarih,
      kk: {...girisBankalar},
      iban: gercekIban,
      nakit: gercekNakit,
      sistemKK, sistemIban, sistemNakit,
      gercekKK, gercekIban, gercekNakit,
      tumEslesti,
      kayitTarihi: TODAY(),
      saat: new Date().toTimeString().slice(0,5)
    };
    setHesapSaglama(p => ({...p, [secTarih]: yeniKayit}));
    showToast(tumEslesti ? "✓ Bugünkü hesap doğru — kaydedildi" : "⚠ Hesap kaydedildi (eşleşme yok)");
  };

  const EslesmeRozeti = ({eslesti, gercek, sistem}) => {
    if (!gercek) return null;
    const fark = gercek - sistem;
    return div({style:{display:"inline-flex",alignItems:"center",gap:5,
      padding:"3px 9px",borderRadius:8,fontSize:12,fontWeight:600,
      background:eslesti?"rgba(50,140,100,.12)":"rgba(224,60,60,.12)",
      border:"1px solid "+(eslesti?"rgba(50,140,100,.3)":"rgba(224,60,60,.3)"),
      color:eslesti?"var(--gr)":"#e06060"}},
      eslesti ? "✓ Eşleşiyor" : "✕ Eşleşmiyor"+(fark!==0?" ("+( fark>0?"+":"")+fmt(fark)+")":"")
    );
  };

  return div(null,

    // Yapılmayan günler uyarısı
    yapilmayanGunler.length > 0 && div({style:{background:"rgba(240,160,60,.06)",
      border:"1px solid rgba(240,160,60,.25)",borderRadius:12,padding:12,marginBottom:14}},
      div({style:{fontSize:12,color:"#f0a060",letterSpacing:2,textTransform:"uppercase",marginBottom:8}},
        "⚠ Sağlaması Yapılmayan Günler ("+yapilmayanGunler.length+")"),
      div({style:{display:"flex",flexWrap:"wrap",gap:6}},
        yapilmayanGunler.slice(0,10).map(g =>
          btn({key:g.tarih,style:{padding:"5px 10px",borderRadius:7,fontSize:13,cursor:"pointer",
            background:"rgba(240,160,60,.1)",border:"1px solid rgba(240,160,60,.3)",
            color:"#f0a060"},
            onClick:()=>setSecTarih(g.tarih)},

// ── BARKOD TARAYICI COMPONENT ──────────────────────────────────────────────
function BarkodTarayici({onOku, onKapat}) {
  const divId = "qr-" + React.useRef(Math.random().toString(36).slice(2)).current;
  const scannerRef = React.useRef(null);
  const kapandiRef = React.useRef(false);
  const [zoom, setZoom] = React.useState(1);
  const [hata, setHata] = React.useState(null);

  const bip = () => {
    try {
      const ac = new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type="square"; o.frequency.value=1500;
      g.gain.setValueAtTime(0.5, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.15);
      o.start(ac.currentTime); o.stop(ac.currentTime+0.15);
      setTimeout(()=>ac.close(), 400);
    } catch(e){}
  };

  const kapat = React.useCallback(() => {
    if(kapandiRef.current) return;
    kapandiRef.current = true;
    try {
      if(scannerRef.current) {
        scannerRef.current.stop().catch(()=>{});
        scannerRef.current = null;
      }
    } catch(e){}
    onKapat();
  }, [onKapat]);

  React.useEffect(() => {
    kapandiRef.current = false;
    let zoomTimer = null;

    const taraBaslat = async () => {
      if(typeof Html5Qrcode === "undefined") { setHata("genel"); return; }
      try {
        const scanner = new Html5Qrcode(divId);
        scannerRef.current = scanner;
        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 15,
            qrbox: (w, h) => ({ width: Math.min(w-20, 300), height: Math.min(h*0.3, 110) }),
          },
          (kod) => {
            bip();
            if(kapandiRef.current) return;
            kapandiRef.current = true;
            try { scanner.stop().catch(()=>{}); } catch(e){}
            scannerRef.current = null;
            onOku(kod);
          },
          () => {}
        );
        zoomTimer = setTimeout(() => {
          try {
            const vid = document.querySelector("#"+divId+" video");
            const track = vid && vid.srcObject && vid.srcObject.getVideoTracks && vid.srcObject.getVideoTracks()[0];
            const caps = track && track.getCapabilities && track.getCapabilities();
            if(caps && caps.zoom) {
              const zv = caps.zoom.min + (caps.zoom.max - caps.zoom.min) * 0.3;
              track.applyConstraints({ advanced: [{ zoom: zv }] }).catch(()=>{});
            }
          } catch(e){}
        }, 1000);
      } catch(err) {
        const ad = (err && err.name) || "";
        console.warn("Kamera hatasi:", ad, err && err.message);
        if(ad === "NotAllowedError" || ad === "PermissionDeniedError") {
          setHata("izin");
        } else if(ad === "NotFoundError" || ad === "DevicesNotFoundError") {
          setHata("bulunamadi");
        } else {
          setHata("genel");
        }
      }
    };

    const t = setTimeout(taraBaslat, 150);
    return () => {
      clearTimeout(t);
      if(zoomTimer) clearTimeout(zoomTimer);
      if(scannerRef.current) {
        try { scannerRef.current.stop().catch(()=>{}); } catch(e){}
        scannerRef.current = null;
      }
    };
  }, []);

  const zoomDegistir = async (val) => {
    setZoom(val);
    try {
      const vid = document.querySelector("#"+divId+" video");
      const track = vid && vid.srcObject && vid.srcObject.getVideoTracks && vid.srcObject.getVideoTracks()[0];
      if(track && track.applyConstraints) {
        await track.applyConstraints({ advanced: [{ zoom: val }] });
      }
    } catch(e){}
  };

  // Hata ekranı - izin reddi, kamera yok veya genel hata
  if(hata) {
    const mesajlar = {
      izin: {
        ikon:"🔒", baslik:"Kamera İzni Gerekli",
        aciklama:"Kamera izni reddedilmiş. Barkod okumak için izin vermelisiniz.",
        adimlar:["📱 Telefon Ayarları'nı açın","Safari > Kamera > İzin Ver","Sayfayı yenileyip tekrar deneyin"]
      },
      bulunamadi: {
        ikon:"📵", baslik:"Kamera Bulunamadı",
        aciklama:"Cihazda kullanılabilir kamera yok.",
        adimlar:[]
      },
      genel: {
        ikon:"⚠️", baslik:"Kamera Başlatılamadı",
        aciklama:"Başka bir uygulama kamerayı kullanıyor olabilir.",
        adimlar:["Diğer uygulamaları kapatın","Sayfayı yenileyip tekrar deneyin"]
      }
    };
    const m = mesajlar[hata] || mesajlar.genel;
    return h('div', {style:{position:"fixed",inset:0,zIndex:9999,background:"var(--bg)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}},
      h('div', {style:{maxWidth:320,width:"100%",textAlign:"center"}},
        h('div', {style:{fontSize:48,marginBottom:16}}, m.ikon),
        h('div', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:20,color:"var(--tx)",marginBottom:10}}, m.baslik),
        h('div', {style:{fontSize:14,color:"var(--mu)",lineHeight:1.7,marginBottom:20}}, m.aciklama),
        m.adimlar.length>0 && h('div', {style:{background:"var(--bg3)",border:"1px solid var(--br)",borderRadius:10,
          padding:"14px 16px",textAlign:"left",marginBottom:16}},
          h('div', {style:{fontSize:12,color:"var(--di)",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}, "ÇÖZÜM"),
          m.adimlar.map((a,i)=>h('div', {key:i, style:{fontSize:14,color:"var(--g)",padding:"4px 0",
            borderTop:i>0?"1px solid #1e4244":"none"}}, (i+1)+". "+a))
        ),
        h('button', {
          style:{background:"var(--bg3)",border:"1px solid #3a3020",borderRadius:10,
            color:"var(--tx)",fontSize:15,padding:"11px 32px",cursor:"pointer"},
          onClick: kapat
        }, "← Geri Dön")
      )
    );
  }

  return h('div', {
    style:{position:"fixed",inset:0,zIndex:9999,background:"#000",
      display:"flex",flexDirection:"column"}},
    h('div', {id: divId, style:{width:"100%",flex:1,background:"#000",overflow:"hidden"}}),
    h('div', {style:{padding:"12px 20px 20px",display:"flex",flexDirection:"column",
      alignItems:"center",gap:8,background:"#000",width:"100%"}},
      h('div', {style:{color:"#9a9a9a",fontSize:13,letterSpacing:1,textAlign:"center",marginBottom:2}},
        "🔍 Barkodu çerçeveye getirin"),
      h('div', {style:{display:"flex",alignItems:"center",gap:10,width:"100%",maxWidth:320}},
        h('span', {style:{color:"#5a5a5a",fontSize:13}},"1x"),
        h('input', {
          type:"range", min:1, max:3, step:0.1, value:zoom,
          style:{flex:1,accentColor:"var(--g)",height:3},
          onChange: e => zoomDegistir(parseFloat(e.target.value))
        }),
        h('span', {style:{color:"var(--g)",fontSize:13,minWidth:28}}, zoom.toFixed(1)+"x")
      ),
      h('button', {
        style:{background:"#1a0808",border:"1px solid #6a2020",borderRadius:10,
          color:"#c05050",fontSize:14,padding:"10px 40px",cursor:"pointer",marginTop:2},
        onClick: kapat
      }, "İptal")
    )
  );
}


function KayitForm({ilk, musteriDB, personeller, aktifKullanici, baslik, onKaydet, onIptal, hizListeleri, hatirlatmalar, setHatirlatmalar}) {
  const aktifP = personeller.filter(p=>p.rol==="personel"&&p.aktif);
  const _poz = aktifKullanici?.pozisyon||"";
  const _isManikurist = _poz==="Manikurist"||_poz==="Pedikürist"||_poz==="Pedikurist";
  const _hizListesi = _isManikurist ? (hizListeleri?.manikurist?.length ? hizListeleri.manikurist : MANIKURIST_HIZMETLER_VARSAYILAN) : (hizListeleri?.ustaKalfa?.length ? hizListeleri.ustaKalfa : USTA_KALFA_HIZMETLER_VARSAYILAN);
  const [musteri,  setMusteri]  = useState(ilk?.musteri||"");
  const [tel,      setTel]      = useState(ilk?.tel||"");
  const [formTarih, setFormTarih] = useState(ilk?.tarih || TODAY());
  const [musteriKaydet, setMusteriKaydet] = useState(false);
  const [hatirlatmaSec, setHatirlatmaSec] = useState(false);
  const [mevcutHatirlatma, setMevcutHatirlatma] = useState(null);
  const [hatirlatmaUyari, setHatirlatmaUyari] = useState(false);
  const [hizler,   setHizler]   = useState(
    ilk?.hizler?.length
      ? ilk.hizler.map(h=>({...h,listef:h.listef||HIZ_LISTE_FIYAT[h.n]||0}))
      : [{id:uid(),n:"",f:"",listef:0,pId:aktifKullanici?.id||"",pAd:aktifKullanici?.ad||""}]
  );
  const [urunler,  setUrunler]  = useState(ilk?.urunler||[]);
  const [hKK,setHKK] = useState(String(ilk?.hizKK||""));
  const [hIB,setHIB] = useState(String(ilk?.hizIB||""));
  const [hNK,setHNK] = useState(String(ilk?.hizNK||""));
  const [uKK,setUKK] = useState(String(ilk?.uKK||""));
  const [uIB,setUIB] = useState(String(ilk?.uIB||""));
  const [uNK,setUNK] = useState(String(ilk?.uNK||""));
  const [urunArama, setUrunArama] = useState("");
  const [hIbanSec, setHIbanSec] = useState(ilk?.hizIbanId||"");
  const [uIbanSec, setUIbanSec] = useState(ilk?.urunIbanId||"");
  const [ibanPinOnay, setIbanPinOnay] = useState(null);
  const [anaPersonelId, setAnaPersonelId] = useState(ilk?.anaPersonelId||"");
  const [moneri, setMoneri] = useState([]);

  const bosHizmet = () => ({id:uid(),n:"",f:"",listef:0,pId:aktifKullanici?.id||"",pAd:aktifKullanici?.ad||""});

  const ibanPersonelSec = (tip, pId, pAd) => {
    if(pId === aktifKullanici?.id) return;
    setIbanPinOnay({hedefId:pId, hedefAd:pAd, tip, pin:"", hata:""});
  };

  const ibanPinDogrula = () => {
    if(!ibanPinOnay) return;
    const hedef = aktifP.find(p=>p.id===ibanPinOnay.hedefId);
    if(hedef && hedef.pin === ibanPinOnay.pin) {
      if(ibanPinOnay.tip==="hiz") setHIbanSec(ibanPinOnay.hedefId);
      else setUIbanSec(ibanPinOnay.hedefId);
      setIbanPinOnay(null);
    } else {
      setIbanPinOnay(p=>({...p, hata:"Yanlis PIN, tekrar deneyin"}));
    }
  };

  const hSil = id => setHizler(p=>{
    const k=p.filter(x=>x.id!==id);
    return k.length?(k.some(x=>!x.n)?k:[...k,bosHizmet()]):[bosHizmet()];
  });

  const hSet = (id,alan,val) => setHizler(p=>{

function StokGiris({stokDB, setStokDB, stokHar, setStokHar, kul, showToast, aktif}) {
  const [aramaG, setAramaG] = React.useState("");
  const [markaG, setMarkaG] = React.useState("");
  const [gB, setGB] = React.useState({});
  const filtreUrun = URUN_DB.filter(u=>{
    if(markaG&&u.m!==markaG) return false;
    if(aramaG.trim()){const q=normText(aramaG);return normText(u.a).includes(q)||(u.b||"").includes(aramaG.trim());}
    return true;
  });
  if(!aktif) return null;
  return div(null,
    div({style:{marginBottom:12}},
      sel({className:"fi",style:{marginBottom:8},value:markaG,onChange:e=>setMarkaG(e.target.value)},
        opt("","Tum Markalar"),MARKALAR.map(m=>opt(m,m))),
      inp({className:"fi",placeholder:"Urun adi veya barkod ile ara...",value:aramaG,onChange:e=>setAramaG(e.target.value)})
    ),
    filtreUrun.length===0
      ?div({className:"bos"},div({style:{fontSize:36}},"📦"),div({style:{fontSize:13,letterSpacing:2,marginTop:8}},"Urun bulunamadi"))
      :div(null,
        filtreUrun.map(u=>{
          const qty=stokDB[u.b]||0, gQty=gB[u.b]||0;
          return div({key:u.b,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,.03)"}},
            div({style:{flex:1,minWidth:0}},
              div({style:{fontSize:15,color:"var(--tx)",fontWeight:500}},u.a),
              div({style:{fontSize:12,color:"var(--di)",marginTop:1}},u.m+" · "+u.ml),
              div({style:{fontSize:13,color:"var(--mu)",marginTop:2}},"Mevcut: ",h("span",{style:{color:qty<=0?"#c05050":"#50b880",fontWeight:700}},qty+" adet"))
            ),
            div({style:{display:"flex",alignItems:"center",gap:6,flexShrink:0}},
              btn({style:{width:30,height:30,borderRadius:8,border:"1px solid var(--br)",background:"transparent",color:"var(--tx)",fontSize:18,cursor:"pointer"},onClick:()=>setGB(p=>({...p,[u.b]:Math.max(0,(p[u.b]||0)-1)}))},"-"),
              div({style:{width:36,textAlign:"center",fontFamily:"Cormorant Garamond,serif",fontSize:18,color:gQty>0?"var(--g)":"var(--di)",fontWeight:700}},gQty),
              btn({style:{width:30,height:30,borderRadius:8,border:"1px solid var(--br)",background:"transparent",color:"var(--tx)",fontSize:18,cursor:"pointer"},onClick:()=>setGB(p=>({...p,[u.b]:(p[u.b]||0)+1}))},"+")
            )
          );
        }),
        Object.values(gB).some(q=>q>0)&&div({style:{position:"sticky",bottom:0,background:"var(--bg)",borderTop:"1px solid #1e4244",paddingTop:12,marginTop:12}},
          div({style:{fontSize:13,color:"var(--mu)",marginBottom:8}},Object.entries(gB).filter(([,q])=>q>0).length+" cesit · "+Object.values(gB).reduce((a,b)=>a+b,0)+" adet"),
          btn({className:"btn-k",style:{width:"100%"},onClick:()=>{
            const harlar=[];
            Object.entries(gB).forEach(([barkod,adet])=>{
              if(adet<=0) return;
              const urun=URUN_DB.find(u=>u.b===barkod);
              const yeniQty=(stokDB[barkod]||0)+adet;
              setStokDB(p=>({...p,[barkod]:yeniQty}));
              const harId=uid();
              harlar.push({id:harId,barkod,urun_ad:urun?.a||"",tip:"giris",adet,tarih:TODAY(),staff_id:kul.id,staff_name:kul.ad});
              dbEkle("stok_hareketleri",{id:harId,barkod,urun_ad:urun?.a||"",tip:"giris",adet,tarih:TODAY(),staff_id:kul.id,staff_name:kul.ad});
              dbGnc("stok",{qty:yeniQty,son_guncelleme:TODAY()},barkod).catch(()=>dbEkle("stok",{id:barkod,barkod,urun_ad:urun?.a||"",marka:urun?.m||"",qty:yeniQty,son_guncelleme:TODAY()}));
            });
            setStokHar(p=>[...harlar,...p]);
            setGB({});
            showToast("Stok girisi yapildi!");
          }},"Stok Girisi Onayla ✓")
        )
      )
  );
}

          for(let i=0; i<yeni.length && kalan>0; i++) {

              const dusen = Math.min(yeni[i].kalan, kalan);
              yeni[i] = {...yeni[i], kalan: yeni[i].kalan - dusen};
              kalan -= dusen;

          }
          return yeni;

        const benim = gecmis.filter(r=>r.staffId===kul.id);

        // Filtre state'leri - component dışı, App state kullanıyoruz
        // gecmisAyFil, gecmisYilFil, gecmisMusteriFil zaten App state'te tanımlı

        // Filtrelenmiş kayıtlar
        const filtreliGecmis = benim.filter(r=>{
          if(gecmisMusteriFil.trim()){
            const q = normText(gecmisMusteriFil);
            if(!normText(r.musteri).includes(q)
              && !(r.tel||"").includes(gecmisMusteriFil.trim())
              && !normText(r.staffAd||"").includes(q)) return false;
          }
          const grd=new Date(r.tarih+"T12:00:00");
          if(gecmisGunFil&&grd.getDate()!==parseInt(gecmisGunFil)) return false;
          if(gecmisAyFil&&(grd.getMonth()+1)!==parseInt(gecmisAyFil)) return false;
          if(gecmisYilFil&&grd.getFullYear()!==parseInt(gecmisYilFil)) return false;
          return true;
        });

        // Özet hesapla
        const ozTop   = filtreliGecmis.reduce((s,r)=>s+r.toplam,0);
        const ozKK    = filtreliGecmis.reduce((s,r)=>s+(r.hizKK||0)+(r.uKK||0),0);
        const ozIB    = filtreliGecmis.reduce((s,r)=>s+(r.hizIB||0)+(r.uIB||0),0);
        const ozNK    = filtreliGecmis.reduce((s,r)=>s+(r.hizNK||0)+(r.uNK||0),0);

        // Müşteri bazlı özet (arama varsa)
        const musteriArama = gecmisMusteriFil.trim();
        const musteriOzeti = (musteriArama && musteriArama!=="__iban__" && musteriArama!=="__avans__") ? (() => {
          const tumZiyaretler = benim.filter(r=>normText(r.musteri).includes(normText(musteriArama)));
          return {
            toplam: tumZiyaretler.reduce((s,r)=>s+r.toplam,0),
            sayi: tumZiyaretler.length,
            kk: tumZiyaretler.reduce((s,r)=>s+(r.hizKK||0)+(r.uKK||0),0),
            ib: tumZiyaretler.reduce((s,r)=>s+(r.hizIB||0)+(r.uIB||0),0),
            nk: tumZiyaretler.reduce((s,r)=>s+(r.hizNK||0)+(r.uNK||0),0),
          };
        })() : null;

        // Mevcut ay varsayılanı
        const simdi = new Date();
        const gorunenAy = gecmisAyFil ? parseInt(gecmisAyFil) : simdi.getMonth()+1;
        const gorunenYil = gecmisYilFil ? parseInt(gecmisYilFil) : simdi.getFullYear();
        const ayAdi = new Date(gorunenYil, gorunenAy-1, 1)
          .toLocaleDateString("tr-TR",{month:"long",year:"numeric"});

        // Yılları bul (kayıtlardaki)
        const yillar = [...new Set(benim.map(r=>new Date(r.tarih+"T12:00:00").getFullYear()))].sort((a,b)=>b-a);

        return div({className:"pg"},

          // Filtreler
          div({style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:12,padding:13,marginBottom:14}},
            // Müşteri arama
            div({style:{marginBottom:10}},
              inp({className:"fi",placeholder:"Ad / Telefon No / Personel İsmi ile ara...",
                value:gecmisMusteriFil==="__iban__"||gecmisMusteriFil==="__avans__"?"":gecmisMusteriFil,
                onChange:e=>{setGecmisMusteriFil(e.target.value)}})
            ),
            // Aktif filtre göstergesi
            (gecmisMusteriFil==="__iban__"||gecmisMusteriFil==="__avans__")&&div({style:{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"7px 11px",marginBottom:10,background:"var(--bg3)",borderRadius:8,border:"1px solid var(--br)"}},
              div({style:{fontSize:13,color:"var(--g)",fontWeight:500}},
                gecmisMusteriFil==="__iban__"?"🏦 IBAN Geliri Detayı":"💵 Avans Detayı"),
              btn({style:{background:"transparent",border:"1px solid var(--br)",borderRadius:6,
                color:"var(--mu)",fontSize:12,padding:"3px 8px",cursor:"pointer"},
                onClick:()=>setGecmisMusteriFil("")},"✕ Kapat")
            ),
            div({style:{width:"100%"}},
              div({style:{display:"flex",gap:6,alignItems:"center"}},
                sel({className:"fi",style:{flex:"0 0 68px"},value:gecmisGunFil,onChange:e=>setGecmisGunFil(e.target.value)},
                  opt("","Gun"),
                  Array.from({length:31},(_,i)=>opt(String(i+1).padStart(2,"0"),String(i+1)))
                ),
                sel({className:"fi",style:{flex:1},value:gecmisAyFil,onChange:e=>setGecmisAyFil(e.target.value)},
                  opt("","Ay"),
                  [["1","Ocak"],["2","Subat"],["3","Mart"],["4","Nisan"],["5","Mayis"],
                   ["6","Haziran"],["7","Temmuz"],["8","Agustos"],["9","Eylul"],
                   ["10","Ekim"],["11","Kasim"],["12","Aralik"]].map(([v,lb])=>opt(v,lb))
                ),
                sel({className:"fi",style:{flex:"0 0 80px"},value:gecmisYilFil,onChange:e=>setGecmisYilFil(e.target.value)},
                  opt("","Yil"),
                  [2024,2025,2026,2027].map(y=>opt(String(y),String(y)))
                ),
                (gecmisGunFil||gecmisAyFil||gecmisYilFil)&&btn({className:"btn-i",style:{flex:"0 0 36px",padding:0,fontSize:16,fontWeight:700},
                  onClick:()=>{setGecmisGunFil("");setGecmisAyFil("");setGecmisYilFil("");setGecmisTarihFil("");}
                },"✕")
              )
            )
          ),

          // Müşteri kümülatif özet (arama varsa)
          musteriOzeti&&div({style:{background:"var(--bg2)",
            border:"1px solid var(--br)",borderRadius:13,padding:14,marginBottom:14}},
            div({style:{fontSize:12,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},
              "👤 "+gecmisMusteriFil.trim()+" — Toplam Ozet"),
            div({style:{display:"flex",gap:10,marginBottom:10}},
              div({style:{flex:1,textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:22,color:"var(--g)",fontWeight:700}},fmt(musteriOzeti.toplam)),
                div({style:{fontSize:11,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase",marginTop:2}},"Toplam Harcama")
              ),
              div({style:{width:1,background:"var(--br)"}}),
              div({style:{flex:1,textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:22,color:"var(--g)",fontWeight:700}},String(musteriOzeti.sayi)),
                div({style:{fontSize:11,color:"var(--mu)",letterSpacing:2,textTransform:"uppercase",marginTop:2}},"Ziyaret")
              )
            ),
            div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
              [["💳","K.Karti",musteriOzeti.kk],["🏦","IBAN",musteriOzeti.ib],["💵","Nakit",musteriOzeti.nk]].map(([ic,lb,v])=>
                div({key:lb,style:{background:"var(--bg)",borderRadius:8,padding:"8px 5px",textAlign:"center"}},
                  div({style:{fontSize:15,marginBottom:2}},ic),
                  div({style:{fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}},lb),
                  div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:v>0?"var(--g)":"var(--di)",fontWeight:700}},fmt(v))
                )
              )
            )
          ),

          // Dönem özeti
          div({style:{background:"var(--bg2)",
            border:"1.5px solid var(--br)",borderRadius:14,padding:15,marginBottom:16}},
            div({style:{fontSize:12,color:"var(--mu)",letterSpacing:3,textTransform:"uppercase",marginBottom:12}},
              (musteriArama && musteriArama!=="__iban__" && musteriArama!=="__avans__")
                ? (gecmisAyFil||gecmisYilFil ? ayAdi+" · "+gecmisMusteriFil.trim() : gecmisMusteriFil.trim()+" — Tum Zamanlar")
                : (gecmisAyFil||gecmisYilFil ? ayAdi : "Tüm Zamanlar")
            ),
            div({style:{display:"flex",gap:10,marginBottom:10}},
              div({style:{flex:1,textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:22,color:"var(--g)",fontWeight:700}},fmt(ozTop)),
                div({style:{fontSize:11,color:"var(--di)",letterSpacing:2,textTransform:"uppercase",marginTop:2}},"Toplam Ciro")
              ),
              div({style:{width:1,background:"var(--br)"}}),
              div({style:{flex:1,textAlign:"center"}},
                div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:22,color:"var(--g)",fontWeight:700}},String(filtreliGecmis.length)),
                div({style:{fontSize:11,color:"var(--di)",letterSpacing:2,textTransform:"uppercase",marginTop:2}},"Kayit")
              )
            ),
            div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
              [["💳","K.Karti",ozKK],["🏦","IBAN",ozIB],["💵","Nakit",ozNK]].map(([ic,lb,v])=>
                div({key:lb,style:{background:"var(--bg)",borderRadius:9,padding:"9px 5px",textAlign:"center"}},
                  div({style:{fontSize:14,marginBottom:3}},ic),
                  div({style:{fontSize:11,color:"var(--di)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}},lb),
                  div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:14,color:v>0?"var(--g)":"var(--br)",fontWeight:700}},fmt(v))
                )
              )
            ),
            div({style:{fontSize:12,color:"var(--di)",marginTop:10,textAlign:"center"}},"Geçmiş kayıtlar kalıcı olarak saklanır"),

            // IBAN ve Avans özet kartları
            (()=>{
              const buAy = new Date().toISOString().slice(0,7);
              const filAy = gecmisAyFil||buAy;
              // Bu personele ait IBAN gelirleri (onaylananlar dahil)
              const myIban = tumK.filter(r=>r.staffId===kul.id&&r.tarih?.startsWith(filAy))
                .reduce((s,r)=>s+((!r.hizIbanId||r.hizIbanId===kul.id)?toN(r.hizIB):0)+toN(r.uIB),0);
              const onaylananIban = (avanslar||[]).filter(a=>false).reduce((s,a)=>s,0); // placeholder
              const manOnaylanan = (ibanBildirimler||[])
                .filter(b=>b.hedefId===kul.id&&b.durum==="onaylandi"&&b.tarih?.startsWith(filAy))
                .reduce((s,b)=>s+toN(b.tutar),0);
              const topIban = myIban + manOnaylanan;
              const myAvans = (avanslar||[]).filter(a=>a.staffId===kul.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(filAy))
                .reduce((s,a)=>s+toN(a.tutar),0);

              return div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}},
                // IBAN Kartı
                div({style:{background:"rgba(37,99,168,.06)",border:"1px solid rgba(37,99,168,.2)",
                  borderRadius:11,padding:11,cursor:"pointer"},
                  onClick:()=>setGecmisMusteriFil(gecmisMusteriFil==="__iban__"?"":"__iban__")},
                  div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,textTransform:"uppercase",marginBottom:4}},"🏦 IBAN GELİRİ"),
                  div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",fontWeight:700}},fmt(topIban)),
                  div({style:{fontSize:11,color:"var(--mu)",marginTop:2}},"Detay için tıkla ↓")
                ),
                // Avans Kartı
                div({style:{background:"rgba(37,99,168,.06)",border:"1px solid rgba(37,99,168,.2)",
                  borderRadius:11,padding:11,cursor:"pointer"},
                  onClick:()=>setGecmisMusteriFil(gecmisMusteriFil==="__avans__"?"":"__avans__")},
                  div({style:{fontSize:11,color:"var(--mu)",letterSpacing:1,textTransform:"uppercase",marginBottom:4}},"💵 AVANS"),
                  div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",fontWeight:700}},fmt(myAvans)),
                  div({style:{fontSize:11,color:"var(--mu)",marginTop:2}},"Detay için tıkla ↓")
                )
              );
            })(),

            // IBAN detay
            gecmisMusteriFil==="__iban__"&&(()=>{
              const filAy = gecmisAyFil||new Date().toISOString().slice(0,7);
              const ibanKayitlar = tumK.filter(r=>r.staffId===kul.id&&r.tarih?.startsWith(filAy)
                &&((!r.hizIbanId||r.hizIbanId===kul.id)?(r.hizIB>0):false||r.uIB>0));
              const manKayitlar = (ibanBildirimler||[]).filter(b=>b.hedefId===kul.id&&b.durum==="onaylandi"&&b.tarih?.startsWith(filAy));
              return div({style:{background:"rgba(37,99,168,.05)",border:"1px solid rgba(37,99,168,.15)",
                borderRadius:11,padding:12,marginTop:8}},
                div({style:{fontSize:11,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:8}},"IBAN DETAYI"),
                ibanKayitlar.length===0&&manKayitlar.length===0&&div({style:{fontSize:13,color:"var(--mu)",textAlign:"center",padding:8}},"Bu ay IBAN geliri yok"),
                ibanKayitlar.sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(r=>
                  div({key:r.id,style:{display:"flex",justifyContent:"space-between",
                    padding:"6px 0",borderBottom:"1px solid rgba(37,99,168,.08)"}},
                    div(null,
                      div({style:{fontSize:13,color:"var(--tx)"}},(r.musteri||"-")),
                      div({style:{fontSize:11,color:"var(--mu)",marginTop:1}},fmtT(r.tarih)+" · Kendi hizmeti")
                    ),
                    div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},
                      fmt(((!r.hizIbanId||r.hizIbanId===kul.id)?r.hizIB:0)+r.uIB))
                  )
                ),
                manKayitlar.sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(b=>
                  div({key:b.id,style:{display:"flex",justifyContent:"space-between",
                    padding:"6px 0",borderBottom:"1px solid rgba(37,99,168,.08)"}},
                    div(null,
                      div({style:{fontSize:13,color:"var(--tx)"}},(b.musteriAd||"-")),
                      div({style:{fontSize:11,color:"var(--g)",marginTop:1}},fmtT(b.tarih)+" · "+b.manKulAd+" · "+b.hizmetAd)
                    ),
                    div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(b.tutar))
                  )
                )
              );
            })(),

            // Avans detay
            gecmisMusteriFil==="__avans__"&&(()=>{
              const filAy = gecmisAyFil||new Date().toISOString().slice(0,7);
              const myAvanslar = (avanslar||[]).filter(a=>a.staffId===kul.id&&a.durum==="onaylandi"&&a.tarih?.startsWith(filAy));
              return div({style:{background:"rgba(37,99,168,.05)",border:"1px solid rgba(37,99,168,.15)",
                borderRadius:11,padding:12,marginTop:8}},
                div({style:{fontSize:11,color:"var(--g)",letterSpacing:2,textTransform:"uppercase",marginBottom:8}},"AVANS DETAYI"),
                myAvanslar.length===0&&div({style:{fontSize:13,color:"var(--mu)",textAlign:"center",padding:8}},"Bu ay avans yok"),
                myAvanslar.sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(a=>
                  div({key:a.id,style:{display:"flex",justifyContent:"space-between",
                    padding:"6px 0",borderBottom:"1px solid rgba(37,99,168,.08)"}},
                    div(null,
                      div({style:{fontSize:13,color:"var(--tx)"}},fmtT(a.tarih)),
                      a.notlar&&div({style:{fontSize:11,color:"var(--mu)",marginTop:1,fontStyle:"italic"}},(a.notlar))
                    ),
                    div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:600}},fmt(a.tutar))
                  )
                )
              );
            })()
          ),

          // Kayıt listesi
          filtreliGecmis.length===0
            ?div({className:"bos"},div({style:{fontSize:42,marginBottom:9}},"📅"),div({style:{fontSize:13,letterSpacing:2}},"Kayıt bulunamadı"))
            :(()=>{
              // Günlere göre grupla
              const gunler={};
              filtreliGecmis.sort((a,b)=>b.tarih.localeCompare(a.tarih)||(b.saat||"").localeCompare(a.saat||""))
                .forEach(r=>{if(!gunler[r.tarih])gunler[r.tarih]=[];gunler[r.tarih].push(r);});
              return div(null,
                Object.keys(gunler).map(tarih=>{
                  const gk=gunler[tarih];
                  const gT=gk.reduce((s,r)=>s+r.toplam,0);
                  const tarihStr=new Date(tarih+"T12:00:00").toLocaleDateString("tr-TR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
                  return div({key:tarih,style:{marginBottom:16}},
                    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:6,borderBottom:"1px solid var(--br)"}},
                      div({style:{fontSize:13,color:"var(--mu)",letterSpacing:1}},tarihStr),
                      div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:15,color:"var(--g)",fontWeight:700}},fmt(gT))
                    ),
                    gk.map(r=>{
                      const kk=(r.hizKK||0)+(r.uKK||0),ib=(r.hizIB||0)+(r.uIB||0),nk=(r.hizNK||0)+(r.uNK||0);
                      return div({key:r.id,
                        style:{background:"var(--bg2)",border:"1px solid var(--br)",borderRadius:11,padding:"11px 12px",marginBottom:7,cursor:"pointer"},
                        onClick:()=>setDetay({...r,_saltOkunur:true})},
                        div({style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
                          div(null,
                            div({style:{fontSize:14,color:"var(--tx)",fontWeight:500}},r.musteri),
                            div({style:{fontSize:12,color:"var(--di)",marginTop:2}},(r.saat||"")+" · "+[...(r.hizler||[]).map(h=>h.n||h),...(r.urunler?.length>0?[r.urunler.length+" urun"]:[])].join(" · "))
                          ),
                          div({style:{textAlign:"right"}},
                            div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:17,color:"var(--g)",fontWeight:700}},fmt(r.toplam)),
                            // Yönetici onaylı işlem butonu
                            btn({style:{fontSize:11,color:"var(--mu)",background:"transparent",border:"1px solid var(--br)",
                              borderRadius:5,padding:"2px 7px",cursor:"pointer",marginTop:4},
                              onClick:ev=>{ev.stopPropagation();setGecmisDuzeltOnay({kayit:r,adim:"secim"});}},
                              "✏ Yön. Onaylı")
                          )
                        ),
                        div({style:{display:"flex",flexWrap:"wrap",gap:3}},
                          kk>0&&h("span",{style:{fontSize:11,padding:"2px 6px",borderRadius:20,border:"1px solid var(--br)",color:"var(--mu)",background:"var(--bg3)"}},"💳 "+fmt(kk)),
                          ib>0&&h("span",{style:{fontSize:11,padding:"2px 6px",borderRadius:20,border:"1px solid var(--br)",color:"var(--mu)",background:"var(--bg3)"}},"🏦 "+fmt(ib)),
                          nk>0&&h("span",{style:{fontSize:11,padding:"2px 6px",borderRadius:20,border:"1px solid var(--br)",color:"var(--mu)",background:"var(--bg3)"}},"💵 "+fmt(nk))
                        )
                      );
                    })
                  );
                })
              );
            })()
        );
      })(),

      // Ayarlar sekmesi
      psek==="ayarlar"&&div({className:"pg"},
        h(AvansIste,{kul,avanslar,setAvanslar,showToast}),
        div({style:{background:"var(--bg2)",border:"1.5px solid var(--br)",borderRadius:16,padding:20,marginBottom:16}},
          div({style:{fontFamily:"Cormorant Garamond,serif",fontSize:18,color:"var(--g)",marginBottom:10}},"Şifre Değiştir"),

          sifreAdim===0&&div(null,
            btn({style:{width:"100%",background:"linear-gradient(135deg,var(--g),var(--gd))",border:"none",borderRadius:11,color:"var(--bg)",fontSize:15,fontWeight:700,padding:14,cursor:"pointer"},
              onClick:()=>{setSifreAdim(1);setSifreMevcut("");setSifreHata("");}},"Şifre Değiştir"),
            div({style:{marginTop:12,textAlign:"center"}},
              btn({style:{background:"transparent",border:"none",color:"var(--mu)",fontSize:13,cursor:"pointer",textDecoration:"underline"},
                onClick:()=>{
                  if(sifreUnuttumGonderildi) return;
                  setUnuttumBildirim(p=>[...p,{id:uid(),staffId:kul.id,staffAd:kul.ad,tarih:TODAY(),saat:SAAT(),okundu:false}]);
                  setSifreUnuttumGonderildi(true);
                }},sifreUnuttumGonderildi?"✓ Yonetici bilgilendirildi":"Şifremi unuttum")
            )
          ),

          sifreAdim===1&&div(null,
            div({style:{fontSize:13,color:"var(--mu)",marginBottom:14}},"Mevcut PIN kodunuzu girin:"),
            div({style:{marginBottom:12}},
              lbl({className:"fl"},"Mevcut PIN"),
              inp({className:"fi",type:"password",inputMode:"numeric",maxLength:4,placeholder:"••••",value:sifreMevcut,onChange:e=>setSifreMevcut(e.target.value.replace(/\D/g,"").slice(0,4))})
            ),
            sifreHata&&div({style:{color:"#c05050",fontSize:13,marginBottom:10,padding:"8px 10px",background:"#0e1a1a",borderRadius:8}},sifreHata),
            div({style:{display:"flex",gap:8}},
              btn({style:{flex:1,background:"transparent",border:"1px solid var(--br)",borderRadius:9,color:"var(--mu)",fontSize:14,padding:12,cursor:"pointer"},onClick:()=>{setSifreAdim(0);setSifreHata("");setSifreMevcut("");}},"İptal"),
              btn({style:{flex:2,background:"linear-gradient(135deg,var(--g),var(--gd))",border:"none",borderRadius:9,color:"var(--bg)",fontSize:14,fontWeight:700,padding:12,cursor:"pointer"},
                onClick:()=>{
                  if(kul.pin===sifreMevcut){setSifreAdim(2);setSifreHata("");setSifreYeni("");setSifreYeni2("");}
                  else{setSifreHata("Yanlış PIN.");setSifreMevcut("");}
                }},"Devam Et")
            )
          ),

          sifreAdim===2&&div(null,
            div({style:{fontSize:13,color:"var(--mu)",marginBottom:14}},"Yeni 4 haneli PIN belirleyin:"),
            div({style:{marginBottom:10}},lbl({className:"fl"},"Yeni PIN"),inp({className:"fi",type:"password",inputMode:"numeric",maxLength:4,placeholder:"••••",value:sifreYeni,onChange:e=>setSifreYeni(e.target.value.replace(/\D/g,"").slice(0,4))})),
            div({style:{marginBottom:12}},lbl({className:"fl"},"Yeni PIN Tekrar"),inp({className:"fi",type:"password",inputMode:"numeric",maxLength:4,placeholder:"••••",value:sifreYeni2,onChange:e=>setSifreYeni2(e.target.value.replace(/\D/g,"").slice(0,4))})),
            sifreHata&&div({style:{color:"#c05050",fontSize:13,marginBottom:10,padding:"8px 10px",background:"#0e1a1a",borderRadius:8}},sifreHata),

                onClick:()=>{
                  const v=localStorage.getItem("apron_v3")||"{}";
                  const bl=new Blob([v],{type:"application/json"});
                  const u=URL.createObjectURL(bl);
                  const a=document.createElement("a");
                  a.href=u;a.download="apron_yedek.json";
                  document.body.appendChild(a);a.click();
                  document.body.removeChild(a);URL.revokeObjectURL(u);
                }},"📥 Veriyi İndir")
            )
          )
        )
      )
    )
  );
}

  const _poz = aktifKullanici?.pozisyon||"";
  const _isManikurist = _poz==="Manikurist"||_poz==="Pedikürist"||_poz==="Pedikurist";
  const _hizListesi = _isManikurist ? (hizListeleri?.manikurist?.length ? hizListeleri.manikurist : MANIKURIST_HIZMETLER_VARSAYILAN) : (hizListeleri?.ustaKalfa?.length ? hizListeleri.ustaKalfa : USTA_KALFA_HIZMETLER_VARSAYILAN);
  const [musteri,  setMusteri]  = useState(ilk?.musteri||"");
  const [tel,      setTel]      = useState(ilk?.tel||"");
  const [formTarih, setFormTarih] = useState(ilk?.tarih || TODAY());
  const [musteriKaydet, setMusteriKaydet] = useState(!!ilk?.musteriKaydet);
  const [hatirlatmaSec, setHatirlatmaSec] = useState(false);
  const [mevcutHatirlatma, setMevcutHatirlatma] = useState(null);
  const [hatirlatmaUyari, setHatirlatmaUyari] = useState(false);
  const [hizler,   setHizler]   = useState(
    ilk?.hizler?.length
      ? ilk.hizler.map(h=>({...h,listef:h.listef||HIZ_LISTE_FIYAT[h.n]||0,odeme:h.odeme||""}))
      : [{id:uid(),n:"",f:"",listef:0,odeme:"",pId:aktifKullanici?.id||"",pAd:aktifKullanici?.ad||""}]
  );
  const [urunler,  setUrunler]  = useState((ilk?.urunler||[]).map(u=>({...u,odeme:u.odeme||""})));
  const [hKK,setHKK] = useState(String(ilk?.hizKK||""));
  const [hIB,setHIB] = useState(String(ilk?.hizIB||""));
  const [hNK,setHNK] = useState(String(ilk?.hizNK||""));
  const [uKK,setUKK] = useState(String(ilk?.uKK||""));
  const [uIB,setUIB] = useState(String(ilk?.uIB||""));
  const [uNK,setUNK] = useState(String(ilk?.uNK||""));
  const [urunArama, setUrunArama] = useState("");
  const [hIbanSec, setHIbanSec] = useState(ilk?.hizIbanId||"");
  const [uIbanSec, setUIbanSec] = useState(ilk?.urunIbanId||"");
  const [ibanPinOnay, setIbanPinOnay] = useState(null);
  const [anaPersonelId, setAnaPersonelId] = useState(ilk?.anaPersonelId||"");
  const [moneri, setMoneri] = useState([]);
  const [telOneri, setTelOneri] = useState([]);
  const [silIkonuAlani, setSilIkonuAlani] = useState(ilk?.tel ? "tel" : (ilk?.musteri ? "musteri" : ""));
  const [musteriKaydetUyari, setMusteriKaydetUyari] = useState("");
  // Müşteri kaydetme akışı modalları
  const [kendiMusteriModal, setKendiMusteriModal] = useState(null); // {musteri:{...}}
  const [baskaPersonelModal, setBaskaPersonelModal] = useState(null); // {musteri:{...}}
  // Manikürist akıllı öneri akışı: bildirim hedef seçim modal'ı
  const [manikuristBildirimSec, setManikuristBildirimSec] = useState(null); // {ad, hedefId}
  const [hizmetOdemeUyariId, setHizmetOdemeUyariId] = useState("");
  const [urunOdemeUyariId, setUrunOdemeUyariId] = useState("");
  const hizmetBolumRef = useRef(null);
  const urunBolumRef = useRef(null);

  const musteriBilgileriBolumStili = getSectionStyle(bolumStilleri, SECTION_STYLE_KEY_MUSTERI_BILGILERI);
  const hizmetBolumStili = getSectionStyle(bolumStilleri, SECTION_STYLE_KEY_HIZMETLER);
  const urunBolumStili = getSectionStyle(bolumStilleri, SECTION_STYLE_KEY_URUN_SATISI);
  const genelToplamBolumStili = getSectionStyle(bolumStilleri, SECTION_STYLE_KEY_GENEL_TOPLAM);
  const hizmetFontMap = {Jost:"'Jost',system-ui,sans-serif", Inter:"'Inter',system-ui,sans-serif", Playfair:"'Playfair Display',Georgia,serif", Sistem:"system-ui,sans-serif"};
  const musteriBilgileriFont = hizmetFontMap[musteriBilgileriBolumStili.fontFamily] || hizmetFontMap.Jost;
  const hizmetFont = hizmetFontMap[hizmetBolumStili.fontFamily] || hizmetFontMap.Jost;
  const urunFont = hizmetFontMap[urunBolumStili.fontFamily] || hizmetFontMap.Jost;
  const genelToplamFont = hizmetFontMap[genelToplamBolumStili.fontFamily] || hizmetFontMap.Jost;
  const numberFontMap = {Cormorant:"'Cormorant Garamond',serif", Jost:"'Jost',system-ui,sans-serif", Inter:"'Inter',system-ui,sans-serif", Sistem:"system-ui,sans-serif"};
  const bolumThemeVars = (st, font) => ({
    "--apron-section-text-color": st.textColor || "var(--tx)",
    "--apron-section-title-color": st.titleColor || "var(--g)",
    "--apron-section-font-size": (Number(st.fontSize)||14)+"px",
    "--apron-section-title-font-size": (Number(st.titleFontSize)||15)+"px",
    "--apron-section-font-family": font || "'Jost',system-ui,sans-serif",
    "--apron-section-number-color": st.numberColor || st.titleColor || "var(--g)",
    "--apron-section-number-font-size": (Number(st.numberFontSize)||23)+"px",
    "--apron-section-number-font-family": numberFontMap[st.numberFontFamily] || numberFontMap.Cormorant
  });

  const odemesizIlkHizmet = (liste=hizler) => (liste||[]).find(x=>x.n && !x.odeme);
  const hizmetOdemeUyarisiGoster = (hedefId) => {
    // Kritik uyarı: Yeni hizmete geçmeden önce önceki hizmetin ödeme tipi seçilmelidir.
    const hedef = hedefId || odemesizIlkHizmet()?.id || "";
    setHizmetOdemeUyariId(hedef);
    setTimeout(()=>setHizmetOdemeUyariId(cur=>cur===hedef?"":cur), 1800);
  };
  const odemesizIlkUrun = (liste=urunler) => (liste||[]).find(x=>x.a && !x.odeme);
  const urunOdemeUyarisiGoster = (hedefId) => {
    // Kritik uyarı: Yeni ürün eklemeden önce önceki ürünün ödeme tipi seçilmelidir.
    const hedef = hedefId || odemesizIlkUrun()?.id || "";
    setUrunOdemeUyariId(hedef);
    setTimeout(()=>setUrunOdemeUyariId(cur=>cur===hedef?"":cur), 1800);
  };

  const temizTelefonRakam = v => String(v||"").replace(/\D/g,"");
  const personelMusteriDB = (musteriDB||[]).filter(m => String(m.sahipId||"") === String(aktifKullanici?.id||""));
  const musteriSistemdeVar = () => {
    // Kritik kontrol: isim veya telefon sistemde varsa tekrar müşteri kaydı işaretlenemez.
    const ad = normText(musteri);
    const telNo = temizTelefonRakam(tel);
    if(!ad && !telNo) return false;
    return (musteriDB||[]).some(m => {
      const kayitliAd = normText(m.ad);
      const kayitliTel = temizTelefonRakam(m.tel);
      return (ad && kayitliAd === ad) || (telNo && kayitliTel === telNo);
    });
  };
  const musteriSistemdekiKayit = () => {
    // Sistemde varsa müşteri objesini döndürür (sahip kontrolü için).
    const ad = normText(musteri);
    const telNo = temizTelefonRakam(tel);
    if(!ad && !telNo) return null;
    return (musteriDB||[]).find(m => {
      const kayitliAd = normText(m.ad);
      const kayitliTel = temizTelefonRakam(m.tel);
      return (ad && kayitliAd === ad) || (telNo && kayitliTel === telNo);
    }) || null;
  };
  const musteriKaydetTikla = () => {
    if(musteriKaydet){
      setMusteriKaydet(false);
      setMusteriKaydetUyari("");
      return;
    }
    if(!musteri.trim() && !temizTelefonRakam(tel)){
      setMusteriKaydet(false);
      setMusteriKaydetUyari("Lütfen önce müşteri ismi veya telefon numarası alanlarından birini doldurun.");
      return;
    }
    const mevcut = musteriSistemdekiKayit();
    if(mevcut){
      // Sahibine göre dallan: kendi müşterisi mi, başka personelin mi?
      const benimId = String(aktifKullanici?.id||"");
      const sahipId = String(mevcut.sahipId||"");
      setMusteriKaydet(false);
      setMusteriKaydetUyari("");
      if(sahipId === benimId){
        setKendiMusteriModal({musteri:mevcut});
      } else {
        setBaskaPersonelModal({musteri:mevcut});
      }
      return;
    }
    setMusteriKaydetUyari("");
    setMusteriKaydet(true);
  };
  const formMusteriTemizle = () => {
    // Tek X butonu iki alanı birlikte temizler.
    setMusteri("");
    setTel("");
    setMusteriKaydet(false);
    setMoneri([]);
    setTelOneri([]);
    setSilIkonuAlani("");
    setMusteriKaydetUyari("");
  };

  useEffect(() => {
    // Müşteri adı ve telefon tamamen boşalırsa sistem kaydı işareti otomatik kalkar.
    if(!musteri.trim() && !temizTelefonRakam(tel) && musteriKaydet) {
      setMusteriKaydet(false);
      setMusteriKaydetUyari("");
    }
  }, [musteri, tel, musteriKaydet]);

  const musteriBulTelefonla = telefon => {
    const r = temizTelefonRakam(telefon);
    if(!r) return null;
    return musteriDB.find(m=>temizTelefonRakam(m.tel)===r)
      || musteriDB.find(m=>{
        const mt=temizTelefonRakam(m.tel);
        return mt && (mt.endsWith(r) || r.endsWith(mt));
      }) || null;
  };

  const bosHizmet = () => ({id:uid(),n:"",f:"",listef:0,odeme:"",pId:aktifKullanici?.id||"",pAd:aktifKullanici?.ad||""});

  const hizmetOdemeToplamlariniYaz = next => {
    // Her hizmet satırındaki seçili ödeme tipine göre hizmet ödeme toplamlarını otomatik yaz.
    const t = {kk:0, ib:0, nk:0};
    (next||[]).forEach(x=>{
      const tutar = toN(x.f);
      if(x.n && tutar>0 && t.hasOwnProperty(x.odeme)) t[x.odeme] += tutar;
    });
    setHKK(t.kk>0 ? String(t.kk) : "");
    setHIB(t.ib>0 ? String(t.ib) : "");
    setHNK(t.nk>0 ? String(t.nk) : "");
    if(t.ib<=0) setHIbanSec("");
  };
  const urunOdemeToplamlariniYaz = next => {
    // Her ürün satırındaki seçili ödeme tipine göre ürün ödeme toplamlarını otomatik yaz.
    const t = {kk:0, ib:0, nk:0};
    (next||[]).forEach(x=>{
      const tutar = toN(x.sf) * toN(x.qty||1);
      if(x.a && tutar>0 && t.hasOwnProperty(x.odeme)) t[x.odeme] += tutar;
    });
    setUKK(t.kk>0 ? String(t.kk) : "");
    setUIB(t.ib>0 ? String(t.ib) : "");
    setUNK(t.nk>0 ? String(t.nk) : "");
    if(t.ib<=0) setUIbanSec("");
  };

  const ibanPersonelSec = (tip, pId, pAd) => {
    if(pId === aktifKullanici?.id) return;
    setIbanPinOnay({hedefId:pId, hedefAd:pAd, tip, pin:"", hata:""});
  };

  const ibanPinDogrula = () => {
    if(!ibanPinOnay) return;
    const hedef = aktifP.find(p=>p.id===ibanPinOnay.hedefId);
    if(hedef && hedef.pin === ibanPinOnay.pin) {
      if(ibanPinOnay.tip==="hiz") setHIbanSec(ibanPinOnay.hedefId);
      else setUIbanSec(ibanPinOnay.hedefId);
      setIbanPinOnay(null);
    } else {
      setIbanPinOnay(p=>({...p, hata:"Yanlis PIN, tekrar deneyin"}));
    }
  };

  const hSil = id => setHizler(p=>{
    const k=p.filter(x=>x.id!==id);
    const next = k.length?(k.some(x=>!x.n)?k:[...k,bosHizmet()]):[bosHizmet()];
    hizmetOdemeToplamlariniYaz(next);
    return next;
  });

  const hSet = (id,alan,val) => setHizler(p=>{
    if(alan==="n" && val) {
      const odemesiz = p.find(x=>x.id!==id && x.n && !x.odeme);
      if(odemesiz) {
        hizmetOdemeUyarisiGoster(odemesiz.id);
        return p;
      }
    }
    let next = p.map(x=>{
      if(x.id!==id) return x;
      if(alan==="pId"){const pp=aktifP.find(a=>a.id===val);return {...x,pId:val,pAd:pp?.ad||""};}
      if(alan==="n"){const lf=HIZ_LISTE_FIYAT[val]||0;return {...x,n:val,f:String(lf),listef:lf,odeme:x.odeme||""};}
      return {...x,[alan]:val};
    });
    if(alan==="n"&&val&&!next.some(x=>!x.n)) next=[...next,bosHizmet()];
    if(["n","f","odeme"].includes(alan)) hizmetOdemeToplamlariniYaz(next);
    if(alan==="odeme" && val) setHizmetOdemeUyariId(cur=>cur===id?"":cur);
    return next;
  });

  const uSil = id => setUrunler(p=>{
    const next = p.filter(x=>x.id!==id);
    urunOdemeToplamlariniYaz(next);
    return next;
  });

  const uSet = (id, alan, val) => setUrunler(p=>{
    let next = p.map(x=>x.id===id ? {...x,[alan]:val} : x);
    if(["sf","qty","odeme"].includes(alan)) urunOdemeToplamlariniYaz(next);
    if(alan==="odeme" && val) setUrunOdemeUyariId(cur=>cur===id?"":cur);
    return next;
  });

  const sEkle = u => {
    const odemesiz = odemesizIlkUrun();
    if(odemesiz) {
      urunOdemeUyarisiGoster(odemesiz.id);
      setUrunArama("");
      return;
    }
    setUrunler(p=>{
      const ex=p.find(x=>x.b===u.b);

function KayitKarti({r, onDetay, onDuzenle, onSil}) {
  const kk=(r.hizKK||0)+(r.uKK||0), ib=(r.hizIB||0)+(r.uIB||0), nk=(r.hizNK||0)+(r.uNK||0);

  const yoneticiTalepAktif = (kayitId) => yonBildirim.find(b =>
    b.kaynak === "personelTalep" && String(b.kayitId) === String(kayitId) && b.durum === "bekliyor"
  );

  const yoneticiTalepGonder = (kayit, islem) => {
    if(!kayit || !islem) return;
    const mevcut = yoneticiTalepAktif(kayit.id);
    if(mevcut){
      setGecmisDuzeltOnay(null);
      showToast("Bu kayıt zaten Onay'a gönderildi, yönetici onayı bekleniyor","uy");
      return;
    }
    const talep = {
      id:uid(), kaynak:"personelTalep", staffId:kayit.staffId || kul.id, staffAd:kayit.staffAd || kul.ad,
      kayitId:kayit.id, musteri:kayit.musteri || "", tarih:kayit.tarih || TODAY(), saat:kayit.saat || "",
      islem, durum:"bekliyor", tarihGonder:TODAY(), saatGonder:SAAT(),
      mesaj:islem === "sil" ? "Kayıt silinmek üzere Onay'a gönderildi" : "Kayıt düzenlenmek üzere Onay'a gönderildi"
    };
    setYonBildirim(p=>[talep,...p]);
    setGecmisDuzeltOnay(null);
    showToast("Talep Onay'a gönderildi. Yönetici onayı bekleniyor.","uy");
  };

  const yoneticiTalepOnayla = (talep) => {
    if(!talep) return;
    setYonBildirim(p=>p.map(b=>b.id===talep.id ? {...b,durum:"onaylandi",yonGordu:true,onayTarih:TODAY(),onaySaat:SAAT()} : b));
    if(talep.islem === "duzenle"){
      const kayit = records.find(r=>r.id===talep.kayitId) || bekleyen.find(r=>r.id===talep.kayitId) || gecmis.find(r=>r.id===talep.kayitId);
      if(kayit) setKayitForm({...kayit,_gecmisDuzenle:true});
      showToast("Düzenleme talebi onaylandı","ba");
      return;
    }
    if(talep.islem === "sil"){
      setRecords(p=>p.filter(r=>String(r.id)!==String(talep.kayitId)));
      setGecmis(p=>p.filter(r=>String(r.id)!==String(talep.kayitId)));
      setBekleyen(p=>p.filter(r=>String(r.id)!==String(talep.kayitId)));
      dbSil("kayitlar",talep.kayitId);
      showToast("Silme talebi onaylandı ve kayıt silindi","uy");
    }
  };

  const yoneticiTalepIptal = (talep) => {
    if(!talep) return;
    setYonBildirim(p=>p.map(b=>b.id===talep.id ? {...b,durum:"iptal",yonGordu:true,iptalTarih:TODAY(),iptalSaat:SAAT()} : b));
    showToast("Talep iptal edildi","uy");
  };

  const hizTop2 = (r.hizKK||0)+(r.hizIB||0)+(r.hizNK||0);
  const urunTop2 = (r.uKK||0)+(r.uIB||0)+(r.uNK||0);
  const ozetIkon = h("svg",{width:20,height:20,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.7,strokeLinecap:"round",strokeLinejoin:"round"},
    h("rect",{x:3,y:3,width:18,height:18,rx:2}),
    h("line",{x1:7,y1:8,x2:17,y2:8}),
    h("line",{x1:7,y1:12,x2:17,y2:12}),
    h("line",{x1:7,y1:16,x2:13,y2:16})
  );
  const et = {fontSize:11,color:"var(--di)",marginBottom:2,textTransform:"uppercase",letterSpacing:.5};
  const dg = {fontSize:13,color:"var(--tx)",fontWeight:600};
  return div({className:`kk${!r.gonderildi?" bk2":""}`,style:{background:"#FAF9F6",border:"1px solid rgba(0,0,0,.09)"}},
    div({onClick:()=>onDetay(r),style:{padding:"12px 13px 10px",cursor:"pointer"}},

        div(null),
        div({style:{textAlign:"center"}},
          div({style:et},"Hizmet Veren Personel"),

        ),

// ── İNDİRİM/ZAM MUHASEBESİ MODÜLÜ ──────────────────────────────────────────
function IndirimZamModul({zamGecmisi, setZamGecmisi, triggerUrunRender, hizListeleri, setHizListeleri, showToast}) {
  // Tip: "hizmet" | "urun"
  // Kapsam: "hepsi" | "marka" | "liste" | "secili"
  const [tip, setTip] = React.useState("hizmet");
  const [kapsam, setKapsam] = React.useState("hepsi");
  const [seciliMarkalar, setSeciliMarkalar] = React.useState([]); // ürün için
  const [seciliListe, setSeciliListe] = React.useState("ustaKalfa"); // hizmet için: ustaKalfa | manikurist
  const [seciliKayitlar, setSeciliKayitlar] = React.useState([]); // tek tek seçim için (barkod veya hizmet adı)
  const [oran, setOran] = React.useState("");
  const [yon, setYon] = React.useState("zam"); // zam | indirim
  const [aciklama, setAciklama] = React.useState("");
  const [onayModal, setOnayModal] = React.useState(null); // {hedefler, oncekiSonra, ozet}
  const [aramaQ, setAramaQ] = React.useState("");

  const markaListesi = React.useMemo(()=>[...new Set(URUN_DB.map(u=>u.m))].sort(), [zamGecmisi]);
  const tumHizmetler = React.useMemo(()=>{
    const u = (hizListeleri.ustaKalfa||[]).map(h=>typeof h==="object"?h.ad:h);
    const m = (hizListeleri.manikurist||[]).map(h=>typeof h==="object"?h.ad:h);
    return {ustaKalfa:u, manikurist:m, hepsi:[...new Set([...u,...m])]};
  }, [hizListeleri, zamGecmisi]);

  // ─ Hangi öğelere uygulanacak — hesapla ─
  const hedefleriBul = () => {
    if(tip==="hizmet"){
      let adlar = [];
      if(kapsam==="hepsi") adlar = tumHizmetler.hepsi;
      else if(kapsam==="liste") adlar = seciliListe==="ustaKalfa" ? tumHizmetler.ustaKalfa : tumHizmetler.manikurist;
      else if(kapsam==="secili") adlar = seciliKayitlar;
      return adlar.filter(ad => HIZ_LISTE_FIYAT[ad]>0);
    } else {
      let urunler = [];
      if(kapsam==="hepsi") urunler = [...URUN_DB];
      else if(kapsam==="marka") urunler = URUN_DB.filter(u=>seciliMarkalar.includes(u.m));
      else if(kapsam==="secili") urunler = URUN_DB.filter(u=>seciliKayitlar.includes(u.b));
      return urunler.filter(u=>(u.sp||0)>0 || (u.bp||0)>0 || (u.ap||0)>0);
    }
  };

  // ─ Önizleme: önce-sonra hesapla ─
  const onizlemeYap = () => {
    const o = parseFloat(String(oran).replace(",","."));
    if(!o || o<=0) { showToast("Geçerli bir oran girin","uy"); return; }
    if(o>500) { showToast("Oran %500'den büyük olamaz","uy"); return; }
    const carpan = yon==="zam" ? (1 + o/100) : (1 - o/100);
    const hedefler = hedefleriBul();
    if(hedefler.length===0) { showToast("Hiçbir öğe seçilmedi","uy"); return; }

    const oncekiSonra = [];
    if(tip==="hizmet"){
      hedefler.forEach(ad=>{
        const eski = HIZ_LISTE_FIYAT[ad]||0;
        const yeni = Math.round(eski * carpan * 100) / 100;
        oncekiSonra.push({ad, eski, yeni});
      });
    } else {
      hedefler.forEach(u=>{
        const eskiSp = u.sp||0;
        const eskiBp = u.bp||0;
        const eskiAp = u.ap||0;
        const yeniSp = Math.round(eskiSp * carpan * 100) / 100;
        const yeniBp = Math.round(eskiBp * carpan * 100) / 100;
        const yeniAp = Math.round(eskiAp * carpan * 100) / 100;
        oncekiSonra.push({barkod:u.b, ad:u.a, marka:u.m, eskiSp, yeniSp, eskiBp, yeniBp, eskiAp, yeniAp});
      });
    }

    const toplamEski = tip==="hizmet"
      ? oncekiSonra.reduce((s,x)=>s+x.eski,0)
      : oncekiSonra.reduce((s,x)=>s+x.eskiSp,0);
    const toplamYeni = tip==="hizmet"
      ? oncekiSonra.reduce((s,x)=>s+x.yeni,0)
      : oncekiSonra.reduce((s,x)=>s+x.yeniSp,0);

    setOnayModal({hedefler, oncekiSonra, oran:o, yon, tip, kapsam, toplamEski, toplamYeni, aciklama});
  };

  // ─ Onaylandı: uygula ve geçmişe kaydet ─
  const uygula = () => {
    const islem = {
      id: Date.now()+"-"+Math.random().toString(36).slice(2,8),
      tarih: new Date().toISOString(),
      tip: onayModal.tip,
      kapsam: onayModal.kapsam,
      yon: onayModal.yon,
      oran: onayModal.oran,
      aciklama: onayModal.aciklama || "",
      degisimler: onayModal.oncekiSonra,
      geriAlindi: false
    };

    // Uygula
    if(onayModal.tip==="hizmet"){
      onayModal.oncekiSonra.forEach(x=>{
        HIZ_LISTE_FIYAT[x.ad] = x.yeni;
      });
    } else {
      onayModal.oncekiSonra.forEach(x=>{
        const idx = URUN_DB.findIndex(u=>u.b===x.barkod);
        if(idx>=0) {
          URUN_DB[idx].sp = x.yeniSp;
          URUN_DB[idx].bp = x.yeniBp;
          URUN_DB[idx].ap = x.yeniAp;
        }
      });
    }
    triggerUrunRender();
    setZamGecmisi(p=>[islem,...(p||[])]);
    setOnayModal(null);
    setOran(""); setAciklama(""); setSeciliKayitlar([]);
    showToast("İşlem uygulandı: "+onayModal.oncekiSonra.length+" öğe","ba");
  };

  // ─ Geri al ─
  const geriAl = (islem) => {
    if(!confirm("Bu işlemi geri almak istediğinize emin misiniz?\n\n"+islem.degisimler.length+" öğe eski fiyatlarına dönecek.")) return;
    if(islem.tip==="hizmet"){
      islem.degisimler.forEach(x=>{
        HIZ_LISTE_FIYAT[x.ad] = x.eski;
      });
    } else {
      islem.degisimler.forEach(x=>{
        const idx = URUN_DB.findIndex(u=>u.b===x.barkod);
        if(idx>=0) {
          URUN_DB[idx].sp = x.eskiSp;
          URUN_DB[idx].bp = x.eskiBp;
          URUN_DB[idx].ap = x.eskiAp;
        }
      });
    }
    triggerUrunRender();
    setZamGecmisi(p=>p.map(z=>z.id===islem.id ? {...z,geriAlindi:true,geriAlmaTarihi:new Date().toISOString()} : z));
    showToast("İşlem geri alındı","ba");
  };

  const trh = (iso) => {
    if(!iso) return "";
    try { return new Date(iso).toLocaleString("tr-TR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
    catch(e){ return ""; }
  };

  // ─ Tek tek seçim için liste ─
  const secilebilirListe = (()=>{
    if(tip==="hizmet"){
      const tum = tumHizmetler.hepsi;
      if(!aramaQ.trim()) return tum;
      const q = normText(aramaQ);
      return tum.filter(ad=>normText(ad).includes(q));
    } else {
      let liste = URUN_DB;
      if(aramaQ.trim()){
        const q = normText(aramaQ);
        liste = liste.filter(u=>normText(u.a).includes(q)||normText(u.m).includes(q)||u.b.includes(aramaQ));
      }
      return liste;
    }
  })();

  return div({style:{padding:"4px 0",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif"}},

    // Onay modalı (önizleme)
    onayModal && div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:9999,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}},
      div({style:{background:"#FBFBFD",border:"1px solid rgba(0,0,0,.10)",borderRadius:18,
        maxWidth:560,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column",
        boxShadow:"0 24px 60px rgba(0,0,0,.28)",overflow:"hidden"}},
        // Başlık
        div({style:{padding:"16px 20px",borderBottom:"1px solid rgba(0,0,0,.08)",
          display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,
          background:onayModal.yon==="zam"?"rgba(255,159,10,.08)":"rgba(52,199,89,.08)"}},
          div(null,
            div({style:{fontSize:16,fontWeight:700,color:"#1D1D1F"}},
              onayModal.yon==="zam"?"⬆ Zam Onayı":"⬇ İndirim Onayı"),
            div({style:{fontSize:12,color:"#86868B",marginTop:2}},
              "%"+onayModal.oran+" · "+onayModal.oncekiSonra.length+" öğe etkilenecek")
          ),
          btn({style:{background:"transparent",border:"none",color:"#86868B",fontSize:22,cursor:"pointer",padding:0,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"},
            onClick:()=>setOnayModal(null)},"✕")
        ),
        // Liste
        div({style:{flex:1,overflowY:"auto",padding:"14px 20px"}},
          // Özet
          div({style:{background:"rgba(0,113,227,.06)",border:"1px solid rgba(0,113,227,.2)",
            borderRadius:11,padding:"12px 14px",marginBottom:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            div(null,
              div({style:{fontSize:11,color:"#86868B",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}},"Toplam Eski"),
              div({style:{fontSize:18,fontWeight:700,color:"#1D1D1F"}},fmt(onayModal.toplamEski))
            ),
            div(null,
              div({style:{fontSize:11,color:"#86868B",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}},"Toplam Yeni"),
              div({style:{fontSize:18,fontWeight:700,color:onayModal.yon==="zam"?"#FF9F0A":"#34C759"}},fmt(onayModal.toplamYeni))
            )
          ),
          // Detay liste
          div({style:{fontSize:12,fontWeight:700,color:"#0071E3",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}},
            "Detay ("+onayModal.oncekiSonra.length+" öğe)"),
          onayModal.oncekiSonra.slice(0, 50).map((x,i)=>
            onayModal.tip==="hizmet"
              ? div({key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"8px 11px",background:"#fff",border:"1px solid rgba(0,0,0,.06)",
                  borderRadius:8,marginBottom:5,fontSize:13}},
                  div({style:{color:"#1D1D1F",fontWeight:500}},x.ad),
                  div({style:{display:"flex",alignItems:"center",gap:8,fontFamily:"'Inter',monospace"}},
                    span({style:{color:"#86868B",textDecoration:"line-through"}},fmt(x.eski)),

// ── MAAŞ/KOMİSYON HESAPLAMA SİSTEMİ ──────────────────────────────────────
// Bileşen tipleri: sabit | hizmetYuzde | urunYuzde | toplamYuzde | musteriBasi | esikPrimi | kademeli
//
// Örnek formül:
// [
//   {tip:"sabit", tutar:15000, ad:"Sabit Maaş"},
//   {tip:"hizmetYuzde", oran:40, ad:"Hizmet Komisyonu"},
//   {tip:"urunYuzde", oran:15, ad:"Ürün Primi"},
//   {tip:"esikPrimi", esikTutar:50000, esikTip:"hizmetCiro", primTutar:2000, ad:"Ciro Bonusu"},
//   {tip:"kademeli", esikTip:"hizmetCiro", kademeler:[{baslangic:0, bitis:30000, oran:30},{baslangic:30000, bitis:50000, oran:35},{baslangic:50000, bitis:null, oran:40}], ad:"Kademeli Hizmet"}
// ]

function maasFormuluVarMi(personel) {
  return Array.isArray(personel?.maasFormulu) && personel.maasFormulu.length > 0;
}

function personelYuzdelimi(personel) {
  // Sadece "sabit" bileşen varsa maaşlı, yüzdesel varsa yüzdeli
  if(!maasFormuluVarMi(personel)) return false;
  return personel.maasFormulu.some(b => b.tip !== "sabit");
}

function hesaplaMaas(personel, kayitlar, opts={}) {
  // kayitlar: filtrelenmiş kayıt listesi (zaten dönem süzgeçten geçmiş)
  // dön: {toplam, detay:[{ad, tutar, aciklama}]}
  if(!maasFormuluVarMi(personel)) return {toplam:0, detay:[], formulYok:true};

  // Personelin kayıtları
  const pKayit = kayitlar.filter(r => String(r.staffId)===String(personel.id) && r.gonderildi!==false);

  // Temel veriler
  const hizmetCiro = pKayit.reduce((s,r) => s + toN(r.hizKK||0) + toN(r.hizIB||0) + toN(r.hizNK||0), 0);
  const urunCiro   = pKayit.reduce((s,r) => s + toN(r.uKK||0) + toN(r.uIB||0) + toN(r.uNK||0), 0);
  const toplamCiro = hizmetCiro + urunCiro;

  // Tekil müşteri sayısı
  const musteriSet = new Set();
  pKayit.forEach(r => {
    const key = (r.musteri||"").trim().toLowerCase()+"|"+String(r.tel||"").replace(/\D/g,"");
    if(key!=="|") musteriSet.add(key);
  });
  const musteriSay = musteriSet.size;
  const kayitSay = pKayit.length;
  const urunAdet = pKayit.reduce((s,r)=>s + (r.urunler||[]).reduce((ss,u)=>ss+toN(u.qty||1),0), 0);

  const veriler = {hizmetCiro, urunCiro, toplamCiro, musteriSay, kayitSay, urunAdet};

  const detay = [];
  let toplam = 0;

  personel.maasFormulu.forEach(b => {
    let tutar = 0;
    let aciklama = "";

    if(b.tip==="sabit") {
      tutar = toN(b.tutar);
      aciklama = "Sabit tutar";
    }
    else if(b.tip==="hizmetYuzde") {
      tutar = hizmetCiro * (toN(b.oran)/100);
      aciklama = "%"+b.oran+" × "+fmt(hizmetCiro)+" hizmet cirosu";
    }
    else if(b.tip==="urunYuzde") {
      tutar = urunCiro * (toN(b.oran)/100);
      aciklama = "%"+b.oran+" × "+fmt(urunCiro)+" ürün satışı";
    }
    else if(b.tip==="toplamYuzde") {
      tutar = toplamCiro * (toN(b.oran)/100);
      aciklama = "%"+b.oran+" × "+fmt(toplamCiro)+" toplam ciro";
    }
    else if(b.tip==="musteriBasi") {
      tutar = musteriSay * toN(b.tutar);
      aciklama = musteriSay+" müşteri × "+fmt(toN(b.tutar));
    }
    else if(b.tip==="esikPrimi") {
      const esikDegeri = veriler[b.esikTip] || 0;
      if(esikDegeri >= toN(b.esikTutar)) {
        tutar = toN(b.primTutar);
        aciklama = "Eşik aşıldı ("+fmt(esikDegeri)+" ≥ "+fmt(toN(b.esikTutar))+")";
      } else {
        tutar = 0;
        aciklama = "Eşik aşılmadı ("+fmt(esikDegeri)+" / "+fmt(toN(b.esikTutar))+")";
      }
    }
    else if(b.tip==="kademeli") {
      const veri = veriler[b.esikTip] || 0;
      const kademeler = b.kademeler||[];
      let toplamKademe = 0;
      const detayKademe = [];
      kademeler.forEach(k => {
        const bas = toN(k.baslangic);
        const bit = k.bitis===null||k.bitis===""||k.bitis===undefined ? Infinity : toN(k.bitis);
        if(veri > bas) {
          const dilimUst = Math.min(veri, bit);
          const dilimTutar = (dilimUst - bas) * (toN(k.oran)/100);
          if(dilimTutar > 0) {
            toplamKademe += dilimTutar;
            detayKademe.push(fmt(bas)+"-"+(bit===Infinity?"∞":fmt(bit))+" → %"+k.oran+" = "+fmt(dilimTutar));
          }
        }
      });
      tutar = toplamKademe;
      aciklama = detayKademe.join(" + ");
    }
    else if(b.tip==="ortakPayi") {
      // İşyeri sahibi ortaklar için kar/zarar paylaşımı
      // opts.tumPersoneller, opts.tumKayitlar, opts.toplamGider gerekli
      // b.ortakIdler: ortakların id listesi
      const tumPers = opts.tumPersoneller || [];
      const tumKy = opts.tumKayitlar || [];
      const ortakIdler = (b.ortakIdler||[]).map(String);
      const ortakSayi = ortakIdler.length || 2;

      // GELİR HESABI
      // 1) Ortak OLMAYAN personellerin hizmet ciroları
      // 2) TÜM personellerin ürün satışları
      let digerHizmetCiro = 0;
      let tumUrunCiro = 0;
      tumKy.forEach(r=>{
        if(r.gonderildi===false) return;
        const isOrtak = ortakIdler.includes(String(r.staffId));
        const hC = toN(r.hizKK||0) + toN(r.hizIB||0) + toN(r.hizNK||0);
        const uC = toN(r.uKK||0) + toN(r.uIB||0) + toN(r.uNK||0);
        if(!isOrtak) digerHizmetCiro += hC;
        tumUrunCiro += uC;
      });
      const havuzGelir = digerHizmetCiro + tumUrunCiro;

      // GİDER HESABI
      // 1) Ortak OLMAYAN personellerin maaşları (uygulamadan hesaplanır)
      // 2) Elle girilmiş masraflar (opts.toplamGider)
      let digerMaaslar = 0;
      tumPers.forEach(p=>{
        if(ortakIdler.includes(String(p.id))) return; // ortakları atla
        if(!maasFormuluVarMi(p)) return;
        // Sonsuz döngüyü önlemek için: ortakPayi içeren formülleri atla (zaten ortak olmayanları aldık ama emniyet)
        if(p.maasFormulu.some(bi=>bi.tip==="ortakPayi")) return;
        const sonucP = hesaplaMaas(p, tumKy, {...opts, _icPas:true});
        digerMaaslar += sonucP.toplam;
      });
      const elleMasraf = toN(opts.toplamGider||0);
      const havuzGider = digerMaaslar + elleMasraf;

      const net = havuzGelir - havuzGider;
      tutar = net / ortakSayi;
      aciklama = "Gelir: "+fmt(havuzGelir)+" − Gider: "+fmt(havuzGider)+" = "+fmt(net)+" ÷ "+ortakSayi;
    }

    detay.push({ad: b.ad || b.tip, tip:b.tip, tutar, aciklama});
    toplam += tutar;
  });

  return {toplam, detay, veriler};
}

// ── HAKEDİŞ DETAY MODAL (Personel için) ────────────────────────────────────
// Tam ekran modal - Brüt - Kesintiler = Net tablosu + alt detay sayfaları
function HakedisDetayModal({kul, tumK, giderler, avanslar, personeller,
  periyot, setPeriyot, yil, setYil, ay, setAy,
  onClose, altDetay, setAltDetay}) {

  // ── Periyot başlangıç/bitiş hesapla ──
  const {pBas, pBitis, pBaslik} = React.useMemo(()=>{
    let bas, bit, basl;
    if(periyot==="yil"){
      bas = new Date(yil, 0, 1, 0, 0, 0, 0);
      bit = new Date(yil, 11, 31, 23, 59, 59, 999);
      basl = yil + " Yılı";
    } else { // ay
      bas = new Date(yil, ay, 1, 0, 0, 0, 0);
      bit = new Date(yil, ay+1, 0, 23, 59, 59, 999);
      const ayAd = bas.toLocaleString("tr-TR",{month:"long"});
      basl = ayAd.charAt(0).toUpperCase()+ayAd.slice(1)+" "+yil;
    }
    return {pBas:bas, pBitis:bit, pBaslik:basl};
  },[periyot, yil, ay]);

  // ── Veriler ──
  const tumKayit = (tumK||[]).filter(r=>{
    if(!r.tarih||r.gonderildi===false) return false;
    const rd=new Date(r.tarih+"T12:00:00");
    return rd>=pBas && rd<=pBitis;
  });
  const tumGiderler = (giderler||[]).filter(g=>{
    if(!g.tarih) return false;
    const gd=new Date(g.tarih+"T12:00:00");
    return gd>=pBas && gd<=pBitis;
  });
  const toplamGider = tumGiderler.reduce((s,g)=>s+toN(g.tutar),0);

  const sonuc = hesaplaMaas(kul, tumKayit, {
    tumPersoneller:personeller,
    tumKayitlar:tumKayit,
    toplamGider:toplamGider
  });
  const brutHak = toN(sonuc.toplam);

  // İbanıma gelen hizmet
  const ibanHizmetKayitlar = tumKayit.filter(r=>r.hizIbanId===kul.id && toN(r.hizIB)>0);
  const ibanHizmetTop = ibanHizmetKayitlar.reduce((s,r)=>s+toN(r.hizIB),0);

  // İbanıma gelen ürün
  const ibanUrunKayitlar = tumKayit.filter(r=>r.urunIbanId===kul.id && toN(r.uIB)>0);
  const ibanUrunTop = ibanUrunKayitlar.reduce((s,r)=>s+toN(r.uIB),0);

  // Çekilen avanslar
  const donemAvanslar = (avanslar||[]).filter(a=>{
    if(String(a.staffId)!==String(kul.id)) return false;
    if(a.durum!=="onaylandi") return false;
    if(!a.tarih) return false;
    const ad=new Date(a.tarih+"T12:00:00");
    return ad>=pBas && ad<=pBitis;
  }).sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""));
  const avansTop = donemAvanslar.reduce((s,a)=>s+toN(a.tutar),0);

  const netHak = brutHak - ibanHizmetTop - ibanUrunTop - avansTop;
  const negatif = netHak < 0;

  const yilSec = (()=>{
    const su=new Date().getFullYear();
    return [su-2, su-1, su, su+1];
  })();
  const ayAdlari = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
                    "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  // ── ALT DETAY SAYFASI ──
  if(altDetay){
    let baslik="", kayitlar=[], renkler={};
    if(altDetay.tip==="brut"){
      baslik = "Brüt Hakediş Bileşenleri";
      kayitlar = (sonuc.detay||[]).map(d=>({
        sol: d.ad,
        orta: d.aciklama||"",
        sag: fmt(d.tutar)
      }));
      renkler = {anahat:"#0071E3", bg:"rgba(0,113,227,.06)"};
    } else if(altDetay.tip==="ibanHizmet"){
      baslik = "İbanıma Gelen Hizmet Tutarı";
      kayitlar = ibanHizmetKayitlar
        .sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""))
        .map(r=>({
          sol: new Date(r.tarih+"T12:00:00").toLocaleDateString("tr-TR",{day:"numeric",month:"short",year:"numeric"}),
          orta: (r.musteri||"-")+" · "+((r.hizler||[]).map(x=>x.n||x).filter(Boolean).join(", ")||"Hizmet"),
          sag: fmt(toN(r.hizIB))
        }));
      renkler = {anahat:"#FF9F0A", bg:"rgba(255,159,10,.06)"};
    } else if(altDetay.tip==="ibanUrun"){
      baslik = "İbanıma Gelen Ürün Tutarı";
      kayitlar = ibanUrunKayitlar
        .sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""))
        .map(r=>({
          sol: new Date(r.tarih+"T12:00:00").toLocaleDateString("tr-TR",{day:"numeric",month:"short",year:"numeric"}),
          orta: (r.musteri||"-")+" · "+((r.urunler||[]).map(x=>x.a||x.ad||"").filter(Boolean).join(", ")||"Ürün"),
          sag: fmt(toN(r.uIB))
        }));

        sol: new Date(a.tarih+"T12:00:00").toLocaleDateString("tr-TR",{day:"numeric",month:"short",year:"numeric"}),
        orta: a.notlar||"-",
        sag: fmt(toN(a.tutar))
      }));
      renkler = {anahat:"#FF9F0A", bg:"rgba(255,159,10,.06)"};
    }
    const altToplam = altDetay.tip==="brut" ? brutHak
                    : altDetay.tip==="ibanHizmet" ? ibanHizmetTop
                    : altDetay.tip==="ibanUrun" ? ibanUrunTop
                    : avansTop;

    return div({style:{
      position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,

      fontFamily:"Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif"

      div({style:{
        position:"sticky",top:0,zIndex:10,
        background:"#fff",borderBottom:"1px solid rgba(0,0,0,.08)",
        padding:"14px 16px",display:"flex",alignItems:"center",gap:12
      }},
        btn({style:{
          background:"transparent",border:"none",color:"#0071E3",
          fontSize:16,fontWeight:600,cursor:"pointer",padding:"4px 0",

          padding:"16px",borderRadius:14,background:"#fff",
          border:"1px solid "+renkler.anahat+"33",marginBottom:14,
          boxShadow:"0 2px 8px rgba(0,0,0,.04)"
        }},
          div({style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#86868B",fontWeight:700,marginBottom:4}},
            pBaslik),
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
            div({style:{fontSize:13,color:"#1D1D1F",fontWeight:600}},
              kayitlar.length+" kayıt"),
            div({style:{fontSize:24,fontWeight:800,color:renkler.anahat,letterSpacing:-0.5}},
              fmt(altToplam))

        ),
        // Kayıt listesi
        kayitlar.length===0
          ? div({style:{
              padding:"40px 16px",textAlign:"center",
              background:"#fff",borderRadius:14,
              border:"1px solid rgba(0,0,0,.06)",

                div({key:i,style:{
                  padding:"12px 14px",
                  borderBottom:i<kayitlar.length-1?"1px solid rgba(0,0,0,.06)":"none",

                  div({style:{flex:1,minWidth:0}},
                    div({style:{fontSize:13,fontWeight:600,color:"#1D1D1F",marginBottom:2}},k.sol),
                    div({style:{fontSize:12,color:"#86868B",lineHeight:1.4,wordBreak:"break-word"}},k.orta)
                  ),
                  div({style:{fontSize:14,fontWeight:700,color:renkler.anahat,flexShrink:0,whiteSpace:"nowrap"}},k.sag)
                )
              )
            )
      )
    );
  }

  // ── ANA DETAY (Brüt − Kesintiler = Net) ──
  return div({style:{
    position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9998,
    background:"#F5F5F7",overflowY:"auto",
    fontFamily:"Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
  }},
    // Üst bar
    div({style:{
      position:"sticky",top:0,zIndex:10,
      background:"#fff",borderBottom:"1px solid rgba(0,0,0,.08)",
      padding:"14px 16px",display:"flex",alignItems:"center",gap:12
    }},
      btn({style:{
        background:"transparent",border:"none",color:"#0071E3",
        fontSize:16,fontWeight:600,cursor:"pointer",padding:"4px 0",
        display:"flex",alignItems:"center",gap:4

        span({style:{fontSize:18}},"‹"),"Kapat"),
      div({style:{flex:1,fontSize:15,fontWeight:700,color:"#1D1D1F",textAlign:"center",paddingRight:60}},
        "Hakediş Detayı")
    ),
    div({style:{padding:"16px"}},
      // ── PERİYOT SEÇİCİ ──
      div({style:{background:"#fff",border:"1px solid rgba(0,0,0,.06)",borderRadius:14,padding:14,marginBottom:14}},
        div({style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#86868B",fontWeight:700,marginBottom:10}},

        // Ay / Yıl butonları
        div({style:{display:"flex",gap:6,marginBottom:12}},
          ["ay","yil"].map(p=>
            btn({key:p,style:{
              flex:1,padding:"9px 0",borderRadius:9,
              border:periyot===p?"1.5px solid #0071E3":"1px solid rgba(0,0,0,.12)",

              fontSize:13,fontWeight:600,cursor:"pointer",letterSpacing:.3

          )
        ),
        // Açılır listeler: Ay seçilmişse Ay+Yıl, Yıl seçilmişse sadece Yıl
        div({style:{display:"grid",gridTemplateColumns:periyot==="ay"?"1fr 1fr":"1fr",gap:8}},
          periyot==="ay" && div(null,
            div({style:{fontSize:11,color:"#86868B",marginBottom:5,fontWeight:600}},"Ay"),
            h("select",{
              value:ay,
              onChange:e=>setAy(parseInt(e.target.value,10)),
              style:{
                width:"100%",padding:"10px 12px",borderRadius:9,
                border:"1px solid rgba(0,0,0,.12)",background:"#fff",
                fontSize:14,fontWeight:600,color:"#1D1D1F",
                cursor:"pointer",outline:"none",
                WebkitAppearance:"none",MozAppearance:"none",appearance:"none",
                backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23999' d='M6 8L0 0h12z'/></svg>\")",
                backgroundRepeat:"no-repeat",
                backgroundPosition:"right 12px center",
                paddingRight:32
              }},
              ayAdlari.map((nm,i)=>h("option",{key:i,value:i},nm))
            )
          ),
          div(null,
            div({style:{fontSize:11,color:"#86868B",marginBottom:5,fontWeight:600}},"Yıl"),
            h("select",{
              value:yil,
              onChange:e=>setYil(parseInt(e.target.value,10)),
              style:{
                width:"100%",padding:"10px 12px",borderRadius:9,
                border:"1px solid rgba(0,0,0,.12)",background:"#fff",
                fontSize:14,fontWeight:600,color:"#1D1D1F",
                cursor:"pointer",outline:"none",
                WebkitAppearance:"none",MozAppearance:"none",appearance:"none",
                backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23999' d='M6 8L0 0h12z'/></svg>\")",
                backgroundRepeat:"no-repeat",
                backgroundPosition:"right 12px center",
                paddingRight:32
              }},
              yilSec.map(y=>h("option",{key:y,value:y},y))
            )
          )
        )
      ),

      // ── HESAPLAMA TABLOSU ──
      div({style:{background:"#fff",border:"1px solid rgba(0,0,0,.06)",borderRadius:14,overflow:"hidden",marginBottom:14}},
        // Dönem başlığı
        div({style:{padding:"12px 14px",background:"#FBFBFD",borderBottom:"1px solid rgba(0,0,0,.06)"}},
          div({style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#86868B",fontWeight:700}},
            "Seçili Dönem"),
          div({style:{fontSize:14,fontWeight:700,color:"#1D1D1F",marginTop:2}},pBaslik)
        ),

        // Brüt Hakediş (tıklanır)
        div({
          onClick:()=>setAltDetay({tip:"brut"}),
          style:{
            padding:"14px",cursor:"pointer",
            borderBottom:"1px solid rgba(0,0,0,.06)",
            display:"flex",justifyContent:"space-between",alignItems:"center",gap:10
          }},
          div({style:{flex:1,minWidth:0}},
            div({style:{fontSize:14,fontWeight:700,color:"#1D1D1F",marginBottom:2}},
              "Brüt Hakediş"),
            div({style:{fontSize:11,color:"#0071E3",display:"flex",alignItems:"center",gap:3}},
              "Bileşenleri görüntüle",span({style:{fontSize:12}},"›"))
          ),
          div({style:{fontSize:18,fontWeight:700,color:"#34C759"}},fmt(brutHak))
        ),

        // İbanıma Gelen Hizmet (tıklanır, kesinti)
        div({
          onClick:()=>setAltDetay({tip:"ibanHizmet"}),
          style:{
            padding:"14px",cursor:"pointer",
            borderBottom:"1px solid rgba(0,0,0,.06)",
            display:"flex",justifyContent:"space-between",alignItems:"center",gap:10
          }},
          div({style:{flex:1,minWidth:0}},
            div({style:{fontSize:14,fontWeight:600,color:"#1D1D1F",marginBottom:2}},
              "− İbanıma Gelen Hizmet Tutarı"),
            div({style:{fontSize:11,color:"#0071E3",display:"flex",alignItems:"center",gap:3}},
              ibanHizmetKayitlar.length+" kayıt",span({style:{fontSize:12}},"›"))
          ),
          div({style:{fontSize:16,fontWeight:700,color:"#FF9F0A"}},
            (ibanHizmetTop>0?"− ":"")+fmt(ibanHizmetTop))
        ),

        // İbanıma Gelen Ürün (tıklanır, kesinti)
        div({
          onClick:()=>setAltDetay({tip:"ibanUrun"}),
          style:{
            padding:"14px",cursor:"pointer",
            borderBottom:"1px solid rgba(0,0,0,.06)",
            display:"flex",justifyContent:"space-between",alignItems:"center",gap:10
          }},
          div({style:{flex:1,minWidth:0}},
            div({style:{fontSize:14,fontWeight:600,color:"#1D1D1F",marginBottom:2}},
              "− İbanıma Gelen Ürün Tutarı"),
            div({style:{fontSize:11,color:"#0071E3",display:"flex",alignItems:"center",gap:3}},
              ibanUrunKayitlar.length+" kayıt",span({style:{fontSize:12}},"›"))
          ),
          div({style:{fontSize:16,fontWeight:700,color:"#FF9F0A"}},
            (ibanUrunTop>0?"− ":"")+fmt(ibanUrunTop))
        ),

        // Çekilen Avanslar (tıklanır, kesinti)
        div({
          onClick:()=>setAltDetay({tip:"avans"}),
          style:{
            padding:"14px",cursor:"pointer",
            borderBottom:"2px solid rgba(0,0,0,.10)",
            display:"flex",justifyContent:"space-between",alignItems:"center",gap:10
          }},
          div({style:{flex:1,minWidth:0}},
            div({style:{fontSize:14,fontWeight:600,color:"#1D1D1F",marginBottom:2}},
              "− Çektiğim Avanslar"),
            div({style:{fontSize:11,color:"#0071E3",display:"flex",alignItems:"center",gap:3}},
              donemAvanslar.length+" kayıt",span({style:{fontSize:12}},"›"))
          ),
          div({style:{fontSize:16,fontWeight:700,color:"#FF9F0A"}},
            (avansTop>0?"− ":"")+fmt(avansTop))
        ),

        // ── NET HAKEDİŞ ──
        div({style:{
          padding:"18px 14px",
          background: negatif
            ? "linear-gradient(135deg,#FF3B30,#C0392B)"
            : "linear-gradient(135deg,#34C759,#22A24B)",
          display:"flex",justifyContent:"space-between",alignItems:"center",gap:10
        }},
          div(null,
            div({style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,.85)",fontWeight:700,marginBottom:3}},
              "Net Hakediş"),
            div({style:{fontSize:12,color:"rgba(255,255,255,.85)"}},
              negatif?"İşyerine borç":"Ödenecek tutar")
          ),
          div({style:{fontSize:24,fontWeight:800,color:"#fff",letterSpacing:-0.5}},fmt(netHak))
        )
      ),

      // Uyarı (negatifse)
      negatif && div({style:{
        padding:"14px",borderRadius:14,

      }},

          "İbanınıza gelen tutarlar ve çektiğiniz avanslar, hakedişinizi aştı. Bu durumda işyerinize borçlandınız. İşyerinin hesaplarının kesintiye uğramaması için bugün ödeme yapmak zorundasınız.")
      )
    )

// ── PERSONEL MAAŞ HESAP GÖRÜNÜMÜ (Yönetici için) ──────────────────────────
function PersonelMaasGorunum({personel, tumK, formul, onChange, showToast, tumPersoneller, giderler, avanslar, setAvanslar}) {
  const [periyot, setPeriyot] = React.useState("buAy");
  const [yeniAvansForm, setYeniAvansForm] = React.useState({tarih:TODAY(), tutar:"", not:""});
  const periyotBaslangic = React.useMemo(()=>{
    const d=new Date();
    if(periyot==="buHafta"){const g=d.getDay()||7;d.setDate(d.getDate()-g+1);}
    else if(periyot==="buAy"){d.setDate(1);}
    else if(periyot==="gecenAy"){d.setMonth(d.getMonth()-1);d.setDate(1);}
    else if(periyot==="buYil"){d.setMonth(0);d.setDate(1);}
    d.setHours(0,0,0,0);return d;
  },[periyot]);
  const periyotBitis = React.useMemo(()=>{
    if(periyot==="gecenAy"){
      const d=new Date();d.setDate(0);d.setHours(23,59,59,999);return d;
    }
    return new Date();
  },[periyot]);

  const filtreliK = (tumK||[]).filter(r=>{
    if(!r.tarih||r.gonderildi===false) return false;
    const rd = new Date(r.tarih+"T12:00:00");
    return rd>=periyotBaslangic && rd<=periyotBitis;
  });

  // Periyot içindeki giderleri topla
  const filtreliGider = (giderler||[]).filter(g=>{
    if(!g.tarih) return false;
    const gd = new Date(g.tarih+"T12:00:00");
    return gd>=periyotBaslangic && gd<=periyotBitis;
  });
  const toplamGider = filtreliGider.reduce((s,g)=>s+toN(g.tutar),0);

  const sonuc = hesaplaMaas({...personel, maasFormulu:formul}, filtreliK, {
    tumPersoneller: tumPersoneller||[],
    tumKayitlar: filtreliK,
    toplamGider
  });
  const periyotEt = {buHafta:"Bu Hafta",buAy:"Bu Ay",gecenAy:"Geçen Ay",buYil:"Bu Yıl"}[periyot];

  return div(null,
    // Maaş formülü editörü
    div({style:{background:"#FFFFFF",border:"1px solid rgba(0,0,0,.08)",borderRadius:12,padding:14,marginBottom:14}},
      div({style:{fontSize:12,fontWeight:700,color:"#0071E3",letterSpacing:1.2,textTransform:"uppercase",marginBottom:10}},
        "💰 MAAŞ/KOMİSYON FORMÜLÜ"),
      div({style:{fontSize:12,color:"#86868B",marginBottom:12,lineHeight:1.5}},
        "Bu personelin maaşı, aşağıdaki bileşenlerin toplamı olarak hesaplanır. Bileşenleri ekleyip kaldırabilirsiniz."),
      h(MaasFormulEditoru,{formul:formul||[], onChange, tumPersoneller})
    ),

    // Hesaplama önizlemesi
    (formul||[]).length>0&&div({style:{background:"#FAF9F6",border:"1px solid rgba(0,0,0,.08)",borderRadius:12,padding:14}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:8,flexWrap:"wrap"}},
        div({style:{fontSize:12,fontWeight:700,color:"#0071E3",letterSpacing:1.2,textTransform:"uppercase"}},
          "💵 HESAPLAMA"),
        div({style:{display:"flex",gap:4,flexWrap:"wrap"}},
          [["buHafta","Bu Hafta"],["buAy","Bu Ay"],["gecenAy","Geçen Ay"],["buYil","Bu Yıl"]].map(([id,lb])=>
            btn({key:id,style:{padding:"5px 9px",borderRadius:6,fontSize:11,cursor:"pointer",
              background:periyot===id?"rgba(0,113,227,.12)":"#fff",
              border:"1px solid "+(periyot===id?"rgba(0,113,227,.4)":"rgba(0,0,0,.10)"),
              color:periyot===id?"#0071E3":"#86868B",
              fontWeight:periyot===id?600:500},
              onClick:()=>setPeriyot(id)},lb)
          )
        )
      ),
      // Veri özeti
      sonuc.veriler&&div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}},
        [
          ["Hizmet Ciro",fmt(sonuc.veriler.hizmetCiro)],
          ["Ürün Ciro",fmt(sonuc.veriler.urunCiro)],
          ["Toplam Ciro",fmt(sonuc.veriler.toplamCiro)],
          ["Müşteri",sonuc.veriler.musteriSay+" kişi"],
          ["Kayıt",sonuc.veriler.kayitSay+" adet"],
          ["Ürün",sonuc.veriler.urunAdet+" adet"]
        ].map(([lb,v],i)=>
          div({key:i,style:{background:"#fff",border:"1px solid rgba(0,0,0,.06)",borderRadius:8,padding:"7px 8px",textAlign:"center"}},
            div({style:{fontSize:9.5,color:"#86868B",letterSpacing:.8,textTransform:"uppercase",marginBottom:2}},lb),
            div({style:{fontSize:12.5,color:"#1D1D1F",fontWeight:700}},v)
          )
        )
      ),
      // Bileşen detayları
      sonuc.detay.length>0&&div({style:{marginBottom:10}},
        sonuc.detay.map((d,i)=>
          div({key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,
            padding:"9px 12px",background:"#fff",border:"1px solid rgba(0,0,0,.06)",borderRadius:8,marginBottom:5}},
            div({style:{flex:1,minWidth:0}},
              div({style:{fontSize:12.5,fontWeight:600,color:"#1D1D1F"}},d.ad),
              div({style:{fontSize:11,color:"#86868B",marginTop:2}},d.aciklama)
            ),
            div({style:{fontSize:14,fontWeight:700,color:d.tutar>0?"#34C759":"#86868B",flexShrink:0}},fmt(d.tutar))
          )
        )
      ),
      // ── AVANSLAR BÖLÜMÜ ──
      (()=>{
        const periyotAvanslar = (avanslar||[]).filter(a=>{
          if(String(a.staffId)!==String(personel.id)) return false;
          if(!a.tarih) return false;
          const ad = new Date(a.tarih+"T12:00:00");
          return ad>=periyotBaslangic && ad<=periyotBitis;
        }).sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""));
        const toplamAvans = periyotAvanslar.reduce((s,a)=>s+toN(a.tutar),0);
        return div({style:{marginBottom:10,padding:14,background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:11}},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}},
            div({style:{fontSize:12,fontWeight:700,color:"#FF9F0A",letterSpacing:1.2,textTransform:"uppercase"}},
              "💵 AVANSLAR"),
            div({style:{fontSize:11,color:"#86868B"}},
              periyotAvanslar.length+" kayıt · "+periyotEt)
          ),
          // Yeni avans giriş formu
          div({style:{display:"grid",gridTemplateColumns:"110px 1fr 90px",gap:6,marginBottom:8}},
            h("input",{type:"date",className:"fi",style:{margin:0,fontSize:12.5,padding:"8px 9px"},
              value:yeniAvansForm.tarih||"",
              onChange:e=>setYeniAvansForm(p=>({...p,tarih:e.target.value}))}),
            inp({className:"fi",placeholder:"Not (opsiyonel)",style:{margin:0,fontSize:12.5,padding:"8px 9px"},
              value:yeniAvansForm.not||"",
              onChange:e=>setYeniAvansForm(p=>({...p,not:e.target.value}))}),
            inp({className:"fi",type:"number",inputMode:"decimal",placeholder:"Tutar",
              style:{margin:0,fontSize:12.5,padding:"8px 9px",textAlign:"right",fontWeight:700,color:"#FF9F0A"},
              value:yeniAvansForm.tutar||"",
              onChange:e=>setYeniAvansForm(p=>({...p,tutar:e.target.value}))})
          ),
          btn({style:{width:"100%",padding:"9px 0",borderRadius:9,border:"none",
            background:(yeniAvansForm.tarih&&toN(yeniAvansForm.tutar)>0)?"#FF9F0A":"rgba(0,0,0,.08)",
            color:(yeniAvansForm.tarih&&toN(yeniAvansForm.tutar)>0)?"#fff":"#86868B",
            fontSize:12.5,fontWeight:700,cursor:(yeniAvansForm.tarih&&toN(yeniAvansForm.tutar)>0)?"pointer":"not-allowed",
            marginBottom:periyotAvanslar.length>0?10:0},
            disabled:!(yeniAvansForm.tarih&&toN(yeniAvansForm.tutar)>0),
            onClick:()=>{
              if(!yeniAvansForm.tarih){showToast&&showToast("Tarih seçin","uy");return;}
              const t = toN(yeniAvansForm.tutar);
              if(t<=0){showToast&&showToast("Geçerli tutar girin","uy");return;}
              const yeni = {
                id: Date.now()+"-"+Math.random().toString(36).slice(2,8),
                staffId: personel.id,
                staffAd: personel.ad,
                tutar: t,
                tarih: yeniAvansForm.tarih,
                notlar: (yeniAvansForm.not||"").trim(),
                durum: "onaylandi",
                odendi: true,
                odendiTarih: TODAY()
              };
              setAvanslar&&setAvanslar(p=>[yeni, ...(p||[])]);
              setYeniAvansForm({tarih:TODAY(), tutar:"", not:""});
              showToast&&showToast("Avans işlendi","ba");
            }},
            "+ Avans Ekle"),
          // Avans listesi
          periyotAvanslar.length>0&&div(null,
            periyotAvanslar.map(a=>
              div({key:a.id,style:{display:"flex",alignItems:"center",gap:8,
                padding:"8px 11px",background:"#FBFBFD",border:"1px solid rgba(0,0,0,.06)",
                borderRadius:8,marginBottom:5}},

// ── GİDERLER MODÜLÜ (Masraflar) ────────────────────────────────────────────
function GiderlerModul({giderler, setGiderler, giderKategoriler, setGiderKategoriler, showToast}) {
  var FONT = "'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif";
  var kdvliKatlar  = giderKategoriler&&giderKategoriler.kdvli  ? giderKategoriler.kdvli  : [];
  var kdvsizKatlar = giderKategoriler&&giderKategoriler.kdvsiz ? giderKategoriler.kdvsiz : [];

  const [filtreMode,      setFiltreMode]      = React.useState("ay");
  const [filtreAy,        setFiltreAy]        = React.useState(function(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); });
  const [filtreBaslangic, setFiltreBaslangic] = React.useState("");
  const [filtreBitis,     setFiltreBitis]     = React.useState("");
  const [filtreTip,       setFiltreTip]       = React.useState("hepsi");
  const [yeniGider,       setYeniGider]       = React.useState(null);
  const [formTip,         setFormTip]         = React.useState("kdvli");

  var bugun = (function(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  var aylarSec = (function(){
    var s=new Set((giderler||[]).map(function(g){return (g.tarih||"").slice(0,7);}).filter(Boolean));
    var a=Array.from(s).sort().reverse();
    var c=bugun.slice(0,7);
    if(a.indexOf(c)===-1) a.unshift(c); return a;
  })();
  var ayEt = function(ym){ if(!ym||ym==="tum") return "Tüm Aylar"; var p=ym.split("-"); return new Date(parseInt(p[0]),parseInt(p[1])-1,1).toLocaleString("tr-TR",{month:"long",year:"numeric"}); };

  var filtreliGiderler = (giderler||[]).filter(function(g){
    var tarihOk=true;
    if(filtreMode==="ay"){ if(filtreAy&&filtreAy!=="tum") tarihOk=(g.tarih||"").startsWith(filtreAy); }
    else { if(filtreBaslangic) tarihOk=tarihOk&&(g.tarih||"")>=filtreBaslangic; if(filtreBitis) tarihOk=tarihOk&&(g.tarih||"")<=filtreBitis; }
    return tarihOk&&(filtreTip==="hepsi"||g.tip===filtreTip);
  }).sort(function(a,b){return (b.tarih||"").localeCompare(a.tarih||"");});

  var kdvliF  = filtreliGiderler.filter(function(g){return g.tip==="kdvli";});
  var kdvsizF = filtreliGiderler.filter(function(g){return g.tip==="kdvsiz";});
  var topK=kdvliF.reduce(function(s,g){return s+toN(g.tutar);},0);
  var topS=kdvsizF.reduce(function(s,g){return s+toN(g.tutar);},0);

  var giderEkle=function(){
    if(!yeniGider||!yeniGider.tarih||!yeniGider.kategori||!yeniGider.tutar){showToast("Tarih, kategori ve tutar zorunlu","uy");return;}
    var t=toN(yeniGider.tutar); if(t<=0){showToast("Tutar 0'dan büyük olmalı","uy");return;}
    var k={id:Date.now()+"-"+Math.random().toString(36).slice(2,8),tarih:yeniGider.tarih,kategori:yeniGider.kategori,tip:yeniGider.tip||formTip,tutar:t,aciklama:yeniGider.aciklama||"",olusturulma:new Date().toISOString()};
    if(yeniGider._editId){setGiderler(function(p){return p.map(function(g){return g.id===yeniGider._editId?Object.assign({},k,{id:yeniGider._editId}):g;});});showToast("Gider güncellendi","ba");}
    else{setGiderler(function(p){return [k].concat(p||[]);});showToast("Gider eklendi","ba");}
    setYeniGider(null);
  };
  var giderSil=function(id){ if(!confirm("Bu gideri silmek istediğinize emin misiniz?")) return; setGiderler(function(p){return p.filter(function(g){return g.id!==id;});}); showToast("Gider silindi","ba"); };
  var giderDuzenle=function(g){ setFormTip(g.tip||"kdvli"); setYeniGider({tarih:g.tarih,kategori:g.kategori,tip:g.tip||"kdvli",tutar:g.tutar,aciklama:g.aciklama,_editId:g.id}); };
  var giderBasla=function(tip){ setFormTip(tip||"kdvli"); setYeniGider({tarih:bugun,kategori:"",tip:tip||"kdvli",tutar:"",aciklama:""}); };

  var aktifKatlar=formTip==="kdvli"?kdvliKatlar:kdvsizKatlar;
  var katBos=!kdvliKatlar.length&&!kdvsizKatlar.length;

  // Tek tip kart stili (a,b,c,d hepsi aynı)
  var kartStil = {background:"#FFFFFF",border:"1px solid #E5E5EA",borderRadius:12,padding:"12px 10px",textAlign:"center",fontFamily:FONT};
  var kartBaslik = {fontSize:10,color:"#1D1D1F",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4,fontFamily:FONT};
  var kartTutar = {fontSize:18,fontWeight:800,color:"#1D1D1F",lineHeight:1.2,fontFamily:FONT};
  var kartAlt = {fontSize:10,color:"#86868B",marginTop:2,fontFamily:FONT};

  return div({style:{padding:"4px 0",fontFamily:FONT}},

    // ── FORM MODAL ──
    yeniGider&&div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
      div({style:{background:"#FFFFFF",borderRadius:18,padding:22,width:"100%",maxWidth:400,
        boxShadow:"0 24px 64px rgba(0,0,0,.28)",fontFamily:FONT}},

        // Baslik - hangi butondan acildiysa o isim sabit
        div({style:{fontSize:16,fontWeight:700,color:"#1D1D1F",marginBottom:18,fontFamily:FONT}},
          yeniGider._editId
            ? "Gider Düzenle"
            : (formTip==="kdvli" ? "Yeni KDV'li Gider" : "Yeni KDV'siz Gider")
        ),

        // Tarih + Tutar
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
          div(null,
            lbl({className:"fl",style:{fontFamily:FONT}},"Tarih *"),
            inp({className:"fi",type:"date",value:yeniGider.tarih||"",
              style:{fontFamily:FONT},
              onChange:function(e){setYeniGider(function(p){return Object.assign({},p,{tarih:e.target.value});}); }})
          ),
          div(null,
            lbl({className:"fl",style:{fontFamily:FONT}},"Tutar (₺) *"),
            inp({className:"fi",type:"number",placeholder:"0",value:yeniGider.tutar||"",
              style:{fontFamily:FONT},
              onChange:function(e){setYeniGider(function(p){return Object.assign({},p,{tutar:e.target.value});}); }})
          )
        ),

        // Kategori
        div({style:{marginBottom:12}},
          lbl({className:"fl",style:{fontFamily:FONT}},"Kategori *"),
          sel({className:"fi",value:yeniGider.kategori||"",
            style:{fontFamily:FONT},
            onChange:function(e){setYeniGider(function(p){return Object.assign({},p,{kategori:e.target.value});}); }},
            opt("","Seçin..."),
            aktifKatlar.map(function(k){return opt(k,k);})
          )
        ),
        katBos&&div({style:{fontSize:11,color:"#FF9500",marginBottom:8,fontFamily:FONT}},
          "⚠ Kategori listesi boş. Ayarlar → Listeler → Gider Listesi'nden ekleyin."),

        // Aciklama
        div({style:{marginBottom:18}},
          lbl({className:"fl",style:{fontFamily:FONT}},"Açıklama"),
          inp({className:"fi",placeholder:"Opsiyonel...",value:yeniGider.aciklama||"",
            style:{fontFamily:FONT},
            onChange:function(e){setYeniGider(function(p){return Object.assign({},p,{aciklama:e.target.value});}); }})
        ),

        // Butonlar
        div({style:{display:"flex",gap:10}},
          btn({style:{flex:1,padding:"12px 0",borderRadius:10,border:"1px solid #E5E5EA",
            background:"#F5F5F7",color:"#1D1D1F",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:FONT},
            onClick:function(){setYeniGider(null);}
          },"İptal"),
          btn({style:{flex:2,padding:"12px 0",borderRadius:10,border:"none",
            background:"#1D1D1F",color:"#FFFFFF",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:FONT},
            onClick:giderEkle
          },yeniGider._editId?"Güncelle":"Kaydet")
        )
      )
    ),

    // ── ÖZET (a, b, c — hepsi aynı stil) ──
    div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}},
      div({style:kartStil},
        div({style:kartBaslik},"KDV'Lİ"),
        div({style:kartTutar},fmt(topK)),
        div({style:kartAlt},kdvliF.length+" kayıt")
      ),
      div({style:kartStil},
        div({style:kartBaslik},"KDV'SİZ"),
        div({style:kartTutar},fmt(topS)),
        div({style:kartAlt},kdvsizF.length+" kayıt")
      ),
      div({style:kartStil},
        div({style:kartBaslik},"TOPLAM"),
        div({style:kartTutar},fmt(topK+topS)),
        div({style:kartAlt},filtreliGiderler.length+" kayıt")
      )
    ),

    // ── FİLTRE ──
    div({style:{background:"#FFFFFF",border:"1px solid #E5E5EA",borderRadius:12,padding:14,marginBottom:12,fontFamily:FONT}},
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        btn({style:{padding:"9px 0",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:FONT,
          border:"1.5px solid "+(filtreMode==="ay"?"#1D1D1F":"#E5E5EA"),
          background:filtreMode==="ay"?"#1D1D1F":"transparent",
          color:filtreMode==="ay"?"#FFFFFF":"#86868B"},
          onClick:function(){setFiltreMode("ay");}
        },"Aylık Filtre"),
        btn({style:{padding:"9px 0",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:FONT,
          border:"1.5px solid "+(filtreMode==="tarih"?"#1D1D1F":"#E5E5EA"),
          background:filtreMode==="tarih"?"#1D1D1F":"transparent",
          color:filtreMode==="tarih"?"#FFFFFF":"#86868B"},
          onClick:function(){setFiltreMode("tarih");}
        },"Tarih Aralığı")
      ),
      filtreMode==="ay"&&sel({className:"fi",value:filtreAy,
        onChange:function(e){setFiltreAy(e.target.value);},
        style:{margin:"0 0 12px",fontSize:13,fontFamily:FONT}},
        opt("tum","Tüm Aylar"),
        aylarSec.map(function(a){return opt(a,ayEt(a));})
      ),
      filtreMode==="tarih"&&div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        div(null,
          lbl({className:"fl",style:{fontFamily:FONT}},"Başlangıç"),
          inp({className:"fi",type:"date",value:filtreBaslangic,style:{fontFamily:FONT},onChange:function(e){setFiltreBaslangic(e.target.value);}})
        ),
        div(null,
          lbl({className:"fl",style:{fontFamily:FONT}},"Bitiş"),
          inp({className:"fi",type:"date",value:filtreBitis,style:{fontFamily:FONT},onChange:function(e){setFiltreBitis(e.target.value);}})
        )
      ),
      div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
        ["hepsi","kdvli","kdvsiz"].map(function(t){
          var lb=t==="hepsi"?"Hepsi":t==="kdvli"?"KDV'li":"KDV'siz";
          return btn({key:t,style:{padding:"8px 0",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,
            border:"1.5px solid "+(filtreTip===t?"#1D1D1F":"#E5E5EA"),
            background:filtreTip===t?"#1D1D1F":"transparent",
            color:filtreTip===t?"#FFFFFF":"#86868B"},
            onClick:function(){setFiltreTip(t);}},lb);
        })
      )
    ),

    // ── EKLE BUTONLARI (d — aynı stil) ──
    div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
      btn({style:{padding:"12px 0",borderRadius:10,border:"1px solid #E5E5EA",
        background:"#FFFFFF",color:"#1D1D1F",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:FONT},
        onClick:function(){giderBasla("kdvli");}
      },"+ KDV'li Gider"),
      btn({style:{padding:"12px 0",borderRadius:10,border:"1px solid #E5E5EA",
        background:"#FFFFFF",color:"#1D1D1F",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:FONT},
        onClick:function(){giderBasla("kdvsiz");}
      },"+ KDV'siz Gider")
    ),

    // ── LİSTE ──
    div({style:{background:"#FFFFFF",border:"1px solid #E5E5EA",borderRadius:12,padding:14,fontFamily:FONT}},
      div({style:{fontSize:11,fontWeight:700,color:"#1D1D1F",letterSpacing:1.5,
        textTransform:"uppercase",marginBottom:12,fontFamily:FONT}},
        "GİDER LİSTESİ ("+filtreliGiderler.length+")"),
      filtreliGiderler.length===0
        ? div({style:{textAlign:"center",padding:"30px 10px",color:"#86868B",fontSize:13,fontFamily:FONT}},
            "Seçilen kriterlere uygun gider bulunamadı.")
        : filtreliGiderler.map(function(g){
            return div({key:g.id,style:{padding:"12px",border:"1px solid #F2F2F7",
              borderRadius:10,marginBottom:6,background:"#FBFBFD",
              borderLeft:"3px solid "+(g.tip==="kdvli"?"#1D1D1F":"#C7C7CC")}},
              div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},
                div({style:{flex:1,minWidth:0}},
                  div({style:{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}},
                    h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:5,fontWeight:600,fontFamily:FONT,
                      background:g.tip==="kdvli"?"#1D1D1F":"#F2F2F7",
                      color:g.tip==="kdvli"?"#FFFFFF":"#86868B"}},
                      g.tip==="kdvli"?"KDV'li":"KDV'siz"),
                    h("span",{style:{fontSize:13,fontWeight:600,color:"#1D1D1F",fontFamily:FONT}},g.kategori),
                    h("span",{style:{fontSize:11,color:"#86868B",fontFamily:FONT}},
                      new Date(g.tarih+"T12:00:00").toLocaleDateString("tr-TR",{day:"numeric",month:"short",year:"numeric"}))
                  ),
                  g.aciklama&&div({style:{fontSize:12,color:"#86868B",fontStyle:"italic",fontFamily:FONT}},g.aciklama)
                ),
                div({style:{fontSize:15,fontWeight:700,color:"#1D1D1F",flexShrink:0,fontFamily:FONT}},
                  "-"+fmt(g.tutar))
              ),
              div({style:{display:"flex",gap:6,marginTop:8}},
                btn({style:{padding:"5px 12px",borderRadius:7,border:"1px solid #E5E5EA",
                  background:"#F5F5F7",color:"#1D1D1F",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:FONT},
                  onClick:function(){giderDuzenle(g);}
                },"Düzenle"),
                btn({style:{padding:"5px 12px",borderRadius:7,border:"1px solid #FFD6D6",
                  background:"#FFF5F5",color:"#FF3B30",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:FONT},
                  onClick:function(){var gid=g.id;giderSil(gid);}
                },"Sil")
              )
            );
          })
    )
  );
}

              const dusen = Math.min(yeni[i].kalan, kalan);
              yeni[i] = {...yeni[i], kalan: yeni[i].kalan - dusen};
